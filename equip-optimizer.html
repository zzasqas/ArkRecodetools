// ============================================================

function parseEquipJSON(raw){
  // ★ 強化等級 ≤9 的裝備不匯入（屬性太弱，配裝時也不會選到，過濾可簡化裝備庫）
  return(Array.isArray(raw)?raw:[]).filter(i=>i.LV>9).map(i=>{
    const sid=i.StaticID||"",pfx=sid.slice(0,-1),last=sid.slice(-1);
    const me=i.MainProp?.PropertyType||"",mt=PROP_MAP[me]||me,mv=i.MainProp?.Value||0;
    let slot;
    if(RELIABLE_PFX.has(pfx)&&"123456".includes(last))slot={1:"武器",2:"頭盔",3:"鎧甲",4:"項鍊",5:"戒指",6:"鞋子"}[last];
    else if(me==="AttackValue")slot="武器";else if(me==="HPValue")slot="頭盔";else if(me==="DefenceValue")slot="鎧甲";
    else if(me==="SpeedValue")slot="鞋子";else if(["CriticalRate","CriticalDamageRate"].includes(me))slot="項鍊";
    else if(["EffectHitRate","ResistanceRate"].includes(me))slot="戒指";else slot="項鍊";
    const subs={};(i.SubProps?.SourceValues||[]).forEach(s=>{const st=PROP_MAP[s.PropertyType]||s.PropertyType;subs[st]=(subs[st]||0)+s.Value;});
    return{oid:i._id?.$oid||("m"+Math.random().toString(36).slice(2)),sid,slot,set:SET_MAP[i.Set]||i.Set,lv:i.LV,mt,mv,subs};
  });
}
function parseCharCSV(text){
  // 過濾空行和 version: 開頭的備註行
  const lines=text.split("\n").map(l=>l.endsWith("\r")?l.slice(0,-1):l).filter(l=>l.trim()&&l.trim().slice(0,7).toLowerCase()!=="version");
  if(lines.length<2)return[];
  return lines.slice(1).map(line=>{
    const c=line.split(",");if(c.length<16)return null;
    const rawCr=+c[16]||0,rawCd=+c[17]||0;
    return{name:c[0],star:+c[1],element:c[2],job:c[3],
      base_atk:+c[4],base_def:+c[5],base_hp:+c[6],base_spd:+c[7],
      bonus_atk:+c[8],bonus_def:+c[9],bonus_hp:+c[10],bonus_spd:+c[11],
      innate_cr:(rawCr-15)/100,innate_cd:(rawCd-150)/100,
      innate_hit:(+c[18]||0)/100,innate_res:(+c[19]||0)/100,
      passive:(c.slice(20)||[]).join(",").split("(")[0].trim()};
  }).filter(Boolean);
}

// ============================================================
// CALC
// ============================================================
function calcSetBonus(equips){
  const cnt={};equips.forEach(e=>{cnt[e.set]=(cnt[e.set]||0)+1;});
  const bonus={},active=[];
  Object.entries(cnt).forEach(([sn,c])=>{
    const ef=SET_EFFECTS[sn];if(!ef)return;
    if((ef.type==="four"||ef.type==="four_trait")&&c>=4){Object.entries(ef.effect).forEach(([k,v])=>{bonus[k]=(bonus[k]||0)+v;});active.push(sn+"(4)");}
    else if(ef.type==="two"||ef.type==="two_trait"){const p=Math.floor(c/2);Object.entries(ef.effect).forEach(([k,v])=>{bonus[k]=(bonus[k]||0)+v*p;});for(let i=0;i<p;i++)active.push(sn+"(2)");}
  });return{bonus,active};
}
function calcFinal(char,equips,bondAtk=0,bondHp=0,breakBonus={}){
  const t={};
  equips.forEach(eq=>{t[eq.mt]=(t[eq.mt]||0)+eq.mv;Object.entries(eq.subs).forEach(([k,v])=>{t[k]=(t[k]||0)+v;});});
  const{bonus,active}=calcSetBonus(equips);
  Object.entries(breakBonus).forEach(([k,v])=>{t[k]=(t[k]||0)+v;});
  const pA=(t["攻擊%"]||0)+(bonus["攻擊%"]||0);
  const pD=(t["防禦%"]||0)+(bonus["防禦%"]||0);
  const pH=(t["生命%"]||0)+(bonus["生命%"]||0);
  const sPct=bonus["速度%_base"]||0;
  const atk=Math.floor(char.base_atk*(1+pA)+char.bonus_atk+(t["攻擊"]||0)+bondAtk);
  const def=Math.floor(char.base_def*(1+pD)+char.bonus_def+(t["防禦"]||0));
  const hp=Math.floor(char.base_hp*(1+pH)+char.bonus_hp+(t["生命"]||0)+bondHp);
  const spd=Math.floor(char.base_spd*(1+sPct)+char.bonus_spd+(t["速度"]||0));
  const cr=Math.floor((0.15+char.innate_cr+(t["爆率"]||0)+(bonus["爆率"]||0))*1000)/10;
  const cd=Math.floor((1.5+char.innate_cd+(t["爆傷"]||0)+(bonus["爆傷"]||0))*1000)/10;
  const hit=Math.floor((char.innate_hit+(t["命中"]||0)+(bonus["命中"]||0))*1000)/10;
  const res=Math.floor((char.innate_res+(t["抗性"]||0)+(bonus["抗性"]||0))*1000)/10;
  const tank=Math.floor(hp+def*10);
  // ★ 傷害指數：期望傷害，爆率依機率加權
  const crRate=Math.min(cr,100)/100;
  const dmg=Math.floor(atk*(crRate*(cd/100)+(1-crRate)*1));
  return{攻擊:atk,防禦:def,生命:hp,速度:spd,爆率:cr,爆傷:cd,命中:hit,抗性:res,套裝:active,坦度:tank,傷害指數:dmg};
}

function getHighlights(stats,allStats){
  const tags=[];
  const keys=["攻擊","生命","防禦","速度","爆率","爆傷","命中","抗性","坦度","傷害指數"];
  const labels={攻擊:"最高攻擊",生命:"最高生命",防禦:"最高防禦",速度:"最快速度",爆率:"最高爆率",爆傷:"最高爆傷",命中:"最高命中",抗性:"最高抗性",坦度:"最大坦度",傷害指數:"最高傷害"};
  const colors={攻擊:"#F87171",生命:"#4ADE80",防禦:"#60A5FA",速度:"#FBBF24",爆率:"#FB923C",爆傷:"#F87171",命中:"#A78BFA",抗性:"#34D399",坦度:"#FBBF24",傷害指數:"#F87171"};
  keys.forEach(k=>{
    const myVal=stats[k]??0;
    const maxVal=Math.max(...allStats.map(s=>s[k]??0));
    const minVal=Math.min(...allStats.map(s=>s[k]??0));if(allStats.length>1&&myVal===maxVal&&myVal>0&&maxVal!==minVal)tags.push({label:labels[k],color:colors[k],key:k});
  });
  return tags.slice(0,3);
}

// ============================================================
// OPTIMIZER — async time-sliced (non-blocking UI)
// ============================================================
function buildCandidates(char,allEquips,config){
  const{constraints={},spdMax=0,spdMinVal=0,hasSpdConstraint=false,spdPursueMax=false,optimize:opt={},requiredSets=[],excludedIds=new Set(),topK=8,goalType="",spdShoe=false,necklaceMt="",ringMt="",isModeB=false,poolCap=28}=config;
  const reqCounts={};requiredSets.forEach(s=>{reqCounts[s]=(reqCounts[s]||0)+getSetPcs(s);});
  const bySlot={};SLOTS.forEach(s=>{bySlot[s]=[];});
  allEquips.forEach(eq=>{if(!excludedIds.has(eq.oid)&&bySlot[eq.slot])bySlot[eq.slot].push(eq);});
  if(spdShoe)bySlot["鞋子"]=bySlot["鞋子"].filter(e=>e.mt==="速度");
  if(necklaceMt)bySlot["項鍊"]=bySlot["項鍊"].filter(e=>e.mt===necklaceMt);
  if(ringMt)bySlot["戒指"]=bySlot["戒指"].filter(e=>e.mt===ringMt);
  for(const slot of SLOTS){
    if(!bySlot[slot].length)return{error:"沒有「"+slot+"」部位的裝備，無法配裝"};
  }

  const scoreEqForCandidate=eq=>{
    const s={[eq.mt]:eq.mv};Object.entries(eq.subs).forEach(([k,v])=>{s[k]=(s[k]||0)+v;});
    let sc=0;
      // ★ 乘數設計目標：w=1 時，一件頂尖裝備（副屬全壓最高值）得分約 1000
    //   依副屬實測範圍（Legendary 5次全壓上限）正規化：
    //   速度上限≈20（max roll 4，×5次）→ ×50  爆率上限≈25% → ×40  爆傷上限≈35% → ×30
    //   命中/抗性上限≈40% → ×25  攻固上限≈230 → ×4.5  防固上限≈175 → ×6  血固上限≈1010 → ×1
    Object.entries(opt).forEach(([tgt,w])=>{if(w<=0)return;
      if(tgt==="生命"){sc+=(s["生命"]||0)*w;sc+=(s["生命%"]||0)*char.base_hp*w;}
      else if(tgt==="防禦"){sc+=(s["防禦"]||0)*w*6;sc+=(s["防禦%"]||0)*char.base_def*w*6;}
      else if(tgt==="攻擊"){sc+=(s["攻擊"]||0)*w*4.5;sc+=(s["攻擊%"]||0)*char.base_atk*w*4.5;}
      else if(tgt==="速度")sc+=(s["速度"]||0)*w*50;
      else if(tgt==="爆率")sc+=(s["爆率"]||0)*w*40;
      else if(tgt==="爆傷")sc+=(s["爆傷"]||0)*w*30;
      else if(tgt==="命中")sc+=(s["命中"]||0)*w*25;
      else if(tgt==="抗性")sc+=(s["抗性"]||0)*w*25;
    });
    if(goalType==="傷害"){sc+=(s["攻擊"]||0)*3;sc+=(s["攻擊%"]||0)*char.base_atk*3;sc+=(s["爆率"]||0)*30;sc+=(s["爆傷"]||0)*20;}
    if(goalType==="坦度"){sc+=(s["生命"]||0)*0.5;sc+=(s["生命%"]||0)*char.base_hp*0.5;sc+=(s["防禦"]||0)*4;sc+=(s["防禦%"]||0)*char.base_def*4;}
    if(goalType==="生命"){sc+=(s["生命"]||0)*1;sc+=(s["生命%"]||0)*char.base_hp*1;}
    if(goalType==="攻擊"){sc+=(s["攻擊"]||0)*4.5;sc+=(s["攻擊%"]||0)*char.base_atk*4.5;}
    if(goalType==="防禦"){sc+=(s["防禦"]||0)*6;sc+=(s["防禦%"]||0)*char.base_def*6;}
    if(goalType==="爆傷"){sc+=(s["爆傷"]||0)*30;}
    if(goalType==="命中"){sc+=(s["命中"]||0)*25;}
    if(goalType==="抗性"){sc+=(s["抗性"]||0)*25;}
    // Boost for required set membership
    if(reqCounts[eq.set]){const ef=SET_EFFECTS[eq.set];
      if(ef){Object.entries(ef.effect).forEach(([ek,ev])=>{if(ek==="生命%")sc+=ev*char.base_hp*0.5;else if(ek==="防禦%")sc+=ev*char.base_def*2.5;else if(ek==="攻擊%")sc+=ev*char.base_atk*0.5;});}
      if(ef?.type?.includes("trait"))sc+=5000;
    }else if(SET_EFFECTS[eq.set]?.type==="two"){const ef=SET_EFFECTS[eq.set];
      Object.entries(ef.effect).forEach(([ek,ev])=>{if(ek==="生命%"&&(opt["生命"]||0)>0)sc+=ev*char.base_hp*0.15;if(ek==="防禦%"&&(opt["防禦"]||0)>0)sc+=ev*char.base_def*0.8;});
    }
    return sc;
  };

  const numConstraints=Object.keys(constraints).length+(spdMax>0?1:0)+Object.keys(reqCounts).length;
  // ★ poolSize 控制基礎候選數；MAX_POOL_CAP 是每個 slot 的硬上限
  //   避免多屬性補充疊加後搜索空間爆炸 (e.g. 79^6 ≈ 2400億)
  const poolSize=isModeB?Math.max(20,topK+8):Math.max(topK+4,16);
  const MAX_POOL_CAP=poolCap; // 快速=14 / 標準=28 / 深度=42
  const candidates={};
  SLOTS.forEach(slot=>{
    const all=bySlot[slot];
    const sorted=all.slice().sort((a,b)=>scoreEqForCandidate(b)-scoreEqForCandidate(a));
    const combined=sorted.slice(0,poolSize);
    const seen=new Set(combined.map(e=>e.oid));
    // helper: 補充至多 n 件、且總數不超過 MAX_POOL_CAP
    const addTop=(arr,n)=>{
      let added=0;
      for(let i=0;i<arr.length&&added<n&&combined.length<MAX_POOL_CAP;i++){
        if(!seen.has(arr[i].oid)){combined.push(arr[i]);seen.add(arr[i].oid);added++;}
      }
    };
    const statGetters={
      速度:e=>(e.subs["速度"]||0)+(e.mt==="速度"?e.mv:0),
      命中:e=>(e.subs["命中"]||0)+(e.mt==="命中"?e.mv:0),
      防禦:e=>(e.subs["防禦"]||0)+(e.subs["防禦%"]||0)*char.base_def+(e.mt==="防禦"?e.mv:0)+(e.mt==="防禦%"?e.mv*char.base_def:0),
      生命:e=>(e.subs["生命"]||0)+(e.subs["生命%"]||0)*char.base_hp+(e.mt==="生命"?e.mv:0)+(e.mt==="生命%"?e.mv*char.base_hp:0),
      爆率:e=>(e.subs["爆率"]||0)+(e.mt==="爆率"?e.mv:0),
      爆傷:e=>(e.subs["爆傷"]||0)+(e.mt==="爆傷"?e.mv:0),
      攻擊:e=>(e.subs["攻擊"]||0)+(e.subs["攻擊%"]||0)*char.base_atk+(e.mt==="攻擊"?e.mv:0)+(e.mt==="攻擊%"?e.mv*char.base_atk:0),
    };
    // 套裝需求補充
    if(Object.keys(reqCounts).length){
      const setNeed={};
      Object.entries(reqCounts).forEach(([s,n])=>{setNeed[s]=n>=4?5:3;});
      Object.entries(setNeed).forEach(([s,n])=>{
        addTop(all.filter(e=>e.set===s).sort((a,b)=>scoreEqForCandidate(b)-scoreEqForCandidate(a)),n);
      });
    }
    // 速度約束補充
    if(hasSpdConstraint||spdPursueMax){
      const bySpd=all.slice().sort((a,b)=>statGetters.速度(b)-statGetters.速度(a));
      addTop(bySpd,5);
      if(spdMax>0) addTop([...bySpd].reverse(),3);
    }
    // 約束屬性 + Mode A opt 屬性：合併去重後各補 5 件（受 cap 保護，不重複補）
    const targetStats=new Set([
      ...Object.keys(constraints),
      ...Object.entries(opt).filter(([,w])=>w>0).map(([k])=>k),
      ...(goalType?[goalType]:[]),
    ]);
    targetStats.forEach(stat=>{
      const getter=statGetters[stat];if(!getter)return;
      addTop(all.slice().sort((a,b)=>getter(b)-getter(a)),5);
    });
    candidates[slot]=combined;
  });

  // Pre-compute per-equip speed contribution for fast pruning
  const eqSpd=new Map();
  SLOTS.forEach(slot=>{candidates[slot].forEach(eq=>{
    eqSpd.set(eq,(eq.subs["速度"]||0)+(eq.mt==="速度"?eq.mv:0));
  });});

  // Pre-compute per-slot max speed for upper-bound pruning
  const slotMaxSpd=SLOTS.map(s=>Math.max(...candidates[s].map(e=>eqSpd.get(e)||0)));
  // Pre-compute per-slot min speed for lower-bound pruning (spdMax)
  const slotMinSpd=SLOTS.map(s=>Math.min(...candidates[s].map(e=>eqSpd.get(e)||0)));

  return{candidates,reqCounts,eqSpd,slotMaxSpd,slotMinSpd};
}

function optimizeAsync(char,allEquips,config,bondAtk,bondHp,breakBonus,cancelRef,progressCb,onDone,maxTime=75000){
  const{constraints={},upperConstraints={},spdMax=0,spdMinVal=0,hasSpdConstraint=false,spdPursueMax=false,optimize:opt={},requiredSets=[],topK=8,goalType=""}=config;
  // Show preparing message immediately
  if(progressCb)progressCb({checked:0,total:1,found:0,elapsed:0,phase:"建立候選池..."});
  // Defer heavy work to next tick so UI can render the message
  setTimeout(()=>{
    if(!cancelRef.current){onDone({results:[],checked:0,poolInfo:{},cancelled:true});return;}
    const prep=buildCandidates(char,allEquips,config);
    if(prep.error){onDone({results:[],checked:0,error:prep.error});return;}
    const{candidates,reqCounts,eqSpd,slotMaxSpd,slotMinSpd}=prep;

  const spdBase=char.base_spd+char.bonus_spd;
  // With speed set bonus, max possible addition is 16%
  const spdSetMax=Math.ceil(char.base_spd*0.16);
  const pool=SLOTS.map(s=>candidates[s]);
  const totalEst=pool.reduce((a,p)=>a*p.length,1);
  const poolInfo=SLOTS.reduce((acc,s)=>{acc[s]=candidates[s].length;return acc;},{});
  const results=[];
  let checked=0,minScore=-Infinity,totalFound=0;
  const startTime=Date.now();

  // Flatten outer loop indices for time-slicing
  const n0=pool[0].length;
  let i0=0;
  const BATCH_TIME=40; // ms per batch, then yield to UI

  function scoreFn(stats){
    let score=0;

    if(goalType==="傷害")score+=stats.傷害指數*2;
    else if(goalType==="坦度")score+=stats.坦度*2;
    else if(goalType==="生命")score+=stats.生命*2;
    else if(goalType==="攻擊")score+=stats.攻擊*2;
    else if(goalType==="防禦")score+=stats.防禦*20;
    else if(goalType==="爆傷")score+=stats.爆傷*10;
    else if(goalType==="命中")score+=stats.命中*10;
    else if(goalType==="抗性")score+=stats.抗性*10;
    Object.entries(opt).forEach(([tgt,w])=>{if(w<=0)return;
      if(tgt==="生命")score+=stats.生命*w;
      else if(tgt==="防禦")score+=stats.防禦*w*10;
      else if(tgt==="攻擊")score+=stats.攻擊*w;
      else if(tgt==="速度"){
        if(spdPursueMax){score+=stats.速度*w*100;}
        else if(hasSpdConstraint){score+=Math.min(stats.速度,spdMinVal||spdMax||stats.速度)*w*100;}
        else{score+=stats.速度*w*100;}
      }
      else if(tgt==="爆率")score+=stats.爆率*w*10;
      else if(tgt==="爆傷")score+=stats.爆傷*w*5;
      else if(tgt==="命中")score+=stats.命中*w*10;
      else if(tgt==="抗性")score+=stats.抗性*w*5;
    });
    // ★ 零權重屬性微扣分：權重設0表示「不需要此屬性」
    //   裝備的此類屬性佔用了副屬欄位卻對配裝目標無貢獻，視作輕微浪費
    //   扣分比例很小（約等效0.02~0.05的權重），不影響主要排序邏輯，只在分數接近時偏好更純粹的配裝
    if(Object.keys(opt).length>0){
      const ZERO_PENALTY={生命:0.02,防禦:0.2,攻擊:0.02,爆率:0.2,爆傷:0.1,命中:0.2,抗性:0.1};
      Object.entries(opt).forEach(([tgt,w])=>{
        if(w>0)return;
        const pen=ZERO_PENALTY[tgt];if(!pen)return;
        const val=stats[tgt]||0;if(val<=0)return;
        // 正規化基準依副屬實測上限（5次全壓 Legendary）
        const base={生命:1010,防禦:175,攻擊:230,爆率:25,爆傷:35,命中:40,抗性:40}[tgt]||1;
        score-=(val/base)*pen*10;
      });
    }
    return score;
  }

  const reqCountEntries=Object.entries(reqCounts);
  const constraintEntries=Object.entries(constraints);
  const hasReqSets=reqCountEntries.length>0;

  function runBatch(){
    if(!cancelRef.current||i0>=n0){
      const cancelled=!cancelRef.current;
      onDone({results,checked,poolInfo,cancelled,totalFound});
      return;
    }
    const batchStart=Date.now();
    while(i0<n0&&cancelRef.current){
      const e0=pool[0][i0];
      const s0=eqSpd.get(e0)||0;
      for(let i1=0;i1<pool[1].length;i1++){
        const e1=pool[1][i1];
        const s01=s0+(eqSpd.get(e1)||0);
        for(let i2=0;i2<pool[2].length;i2++){
          const e2=pool[2][i2];
          const s012=s01+(eqSpd.get(e2)||0);

          // ★ Speed upper-bound pruning: remaining 3 slots can add at most slotMaxSpd[3]+[4]+[5]
          if(spdMinVal>0){
            const bestPossibleSpd=spdBase+s012+slotMaxSpd[3]+slotMaxSpd[4]+slotMaxSpd[5]+spdSetMax;
            if(bestPossibleSpd<spdMinVal)continue;
          }
          // ★ Speed lower-bound pruning (too fast): remaining slots add at least slotMinSpd
          if(spdMax>0){
            const slowestPossible=spdBase+s012+slotMinSpd[3]+slotMinSpd[4]+slotMinSpd[5];
            if(slowestPossible>spdMax+spdSetMax+5)continue;
          }

          for(let i3=0;i3<pool[3].length;i3++){
            const e3=pool[3][i3];
            const s0123=s012+(eqSpd.get(e3)||0);

            // ★ Tighter prune with 2 slots remaining
            if(spdMinVal>0){
              const bestSpd2=spdBase+s0123+slotMaxSpd[4]+slotMaxSpd[5]+spdSetMax;
              if(bestSpd2<spdMinVal)continue;
            }
            if(spdMax>0){
              const slowest2=spdBase+s0123+slotMinSpd[4]+slotMinSpd[5];
              if(slowest2>spdMax+spdSetMax+5)continue;
            }

            for(let i4=0;i4<pool[4].length;i4++){
              const e4=pool[4][i4];
              const s01234=s0123+(eqSpd.get(e4)||0);

              // ★ Prune with 1 slot remaining
              if(spdMinVal>0){
                const bestSpd1=spdBase+s01234+slotMaxSpd[5]+spdSetMax;
                if(bestSpd1<spdMinVal)continue;
              }
              // Upper bound prune (too fast)
              if(spdMax>0){
                const minSpd1=spdBase+s01234; // even if last slot adds 0 speed
                if(minSpd1>spdMax+spdSetMax+10)continue;
              }

              for(let i5=0;i5<pool[5].length;i5++){
                const e5=pool[5][i5];
                checked++;
                const combo=[e0,e1,e2,e3,e4,e5];

                // Speed raw prune
                if(hasSpdConstraint||spdPursueMax){
                  const rawSpd=spdBase+s01234+(eqSpd.get(e5)||0);
                  if(spdMinVal>0&&rawSpd<spdMinVal-spdSetMax-2)continue;
                  if(spdMax>0&&rawSpd>spdMax+spdSetMax+10)continue;
                }
                // Required sets check
                if(hasReqSets){
                  const sc={};for(let ci=0;ci<6;ci++)sc[combo[ci].set]=(sc[combo[ci].set]||0)+1;
                  let ok=true;for(const[sn,need]of reqCountEntries)if((sc[sn]||0)<need){ok=false;break;}
                  if(!ok)continue;
                }
                const stats=calcFinal(char,combo,bondAtk,bondHp,breakBonus);
                // Hard lower constraints (≥)
                let fail=false;
                for(const[k,v]of constraintEntries)if((stats[k]||0)<v){fail=true;break;}
                if(fail)continue;
                if(spdMax>0&&stats.速度>spdMax)continue;
                // Hard upper constraints (≤)
                const upperEntries=Object.entries(upperConstraints);
                if(upperEntries.length>0){
                  let failU=false;
                  for(const[k,v]of upperEntries)if((stats[k]||0)>v){failU=true;break;}
                  if(failU)continue;
                }

                const score=scoreFn(stats);
                totalFound++;
                if(results.length>=topK&&score<=minScore)continue;
                results.push({combo,stats,score});
                results.sort((a,b)=>b.score-a.score);
                if(results.length>topK)results.length=topK;
                minScore=results.length>0?results[results.length-1].score:-Infinity;
              }
            }
          }
        }
      }
      i0++;

      // Check time budget — yield if exceeded
      if(Date.now()-batchStart>BATCH_TIME)break;
    }

    // Report progress & schedule next batch
    const elapsed=Date.now()-startTime;

    // ★ 不設提前結束，讓深度模式跑滿設定時間
    if(elapsed>maxTime){
      if(progressCb)progressCb({checked,total:totalEst,found:results.length,totalFound,elapsed,phase:"超時自動停止"});
      onDone({results,checked,poolInfo,cancelled:false,timedOut:true,totalFound});
      return;
    }

    if(progressCb)progressCb({checked,total:totalEst,found:results.length,totalFound,elapsed,phase:elapsed>30000?"搜索中（"+Math.floor(elapsed/1000)+"s，將於75s自動停止）":"搜索中"});

    if(i0<n0&&cancelRef.current){
      scheduleNext();
    }else{
      const cancelled=!cancelRef.current;
      onDone({results,checked,poolInfo,cancelled,totalFound});
    }
  }

  // Emit pool info and start first batch
  if(progressCb)progressCb({checked:0,total:totalEst,found:0,totalFound:0,elapsed:0,phase:"候選池就緒（"+Object.values(poolInfo).join("×")+"），開始搜索..."});
  // ★ visibilitychange 防黑屏：頁面隱藏時用 setTimeout，可見時用 rAF
  function scheduleNext(){
    if(document.hidden){
      setTimeout(runBatch,50);
    }else{
      requestAnimationFrame(()=>setTimeout(runBatch,0));
    }
  }
  setTimeout(runBatch,0);
  },0); // end of deferred setTimeout
}

const fN=n=>n!=null?Math.floor(n).toLocaleString():"0";
const fP=n=>(n!=null?Math.floor(n*10)/10:0)+"%";
const fS=(k,v)=>["爆率","爆傷","命中","抗性"].includes(k)?fP(v):k==="速度"?String(Math.floor(v||0)):fN(v);
const fE=(k,v)=>["攻擊%","防禦%","生命%","爆率","爆傷","命中","抗性"].includes(k)?Math.floor((v||0)*100)+"%":String(Math.floor(v||0));

  },[sc,selSets]);

  const loadCharConfig=useCallback((charName)=>{
    if(!charName)return;
    try{
      const raw=localStorage.getItem("arkrecode_charConfig_"+charName);
      if(raw){const{sc:s,selSets:ss}=JSON.parse(raw);if(s)setSc(s);if(ss)setSelSets(ss);}
    }catch(e){}

  // ★ 自動從 repo 載入 chars.csv，版本不同時靜默更新
  //   CSV 第一列第一欄若包含 "version:" 則視為版本號（如 version:20260312）
  //   localStorage key: arkrecode_chars_version / arkrecode_chars_data
  useEffect(()=>{
    const CACHE_KEY="arkrecode_chars_data";
    const VER_KEY="arkrecode_chars_version";
    async function tryFetch(){
      try{
        const res=await fetch("./chars.csv?_="+Date.now());
        if(!res.ok)return;
        const text=await res.text();
        const firstLine=(text.split("\n")[0]||"").replace("\r","");
        const verMatch=firstLine.toLowerCase().startsWith("version:")?[null,(firstLine.split(":")[1]||"").split(",")[0].trim()]:null;
        const remoteVer=verMatch?verMatch[1]:"";
        const localVer=localStorage.getItem(VER_KEY)||"";
        if(remoteVer&&remoteVer===localVer){
          // 版本相同，從快取載入
          const cached=localStorage.getItem(CACHE_KEY);
          if(cached){const parsed=JSON.parse(cached);if(parsed.length){setChars(parsed);setHidden(parsed.filter(c=>c.star<=4).map(c=>c.name));return;}}
        }
        // 版本不同或無快取，解析並儲存
        const parsed=parseCharCSV(text);
        if(parsed.length){
          setChars(parsed);setHidden(parsed.filter(c=>c.star<=4).map(c=>c.name));
          try{localStorage.setItem(CACHE_KEY,JSON.stringify(parsed));if(remoteVer)localStorage.setItem(VER_KEY,remoteVer);}catch(e){}
        }
      }catch(e){/* fetch 失敗（本地開發/無網路）沿用 DEMO_CHARS */}
    }
    tryFetch();
  },[]);

  // ★ 啟動時載入裝備快取（版本+時間戳）
  useEffect(()=>{
    try{
      const meta=JSON.parse(localStorage.getItem("arkrecode_equips_meta")||"null");
      const raw=localStorage.getItem("arkrecode_equips");
      if(raw&&meta){
        const parsed=JSON.parse(raw);
        if(Array.isArray(parsed)&&parsed.length){setEquips(parsed);setEquipCacheMeta(meta);}
      }
    }catch(e){}
  },[]);

  // ★ URL 參數帶入（從 character-db 跳轉時）
  useEffect(()=>{
    try{
      const p=new URLSearchParams(window.location.search);
      const charName=p.get("char");
      const set1=p.get("set1"),set2=p.get("set2"),set3=p.get("set3");
      const speedShoes=p.get("speedShoes")==="1";
      const attrParam=p.get("attr"); // ★ 屬性篩選參數（火/水/木/光/暗）
      // 數值門檻
      const numFields=["速度下限","速度上限","爆率下限","爆率上限","爆傷下限","攻擊下限","防禦下限","生命下限","命中下限","抗性下限"];
      const weights=["攻擊","爆率","爆傷","命中","抗性","生命","防禦"];
      if(!charName)return;
      // ★ 有 attr 參數時切換元素 tab
      if(attrParam&&ELEM_LIST.includes(attrParam))setElemTab(attrParam);
      // 等 chars 載入後套角色
      const applyParams=(charList)=>{
        const c=charList.find(x=>x.name===charName);
        if(c){
          setSelChar(c);
          loadCharConfig(c.name);
        }
        // 套裝
        const sets=[set1,set2,set3].filter(Boolean);
        if(sets.length)setSelSets(sets);
        // 速度鞋
        if(speedShoes)setSc(prev=>({...prev,速度:{...prev.速度,speedShoes:true}}));
        // 數值門檻
        setSc(prev=>{
          const next={...prev};
          numFields.forEach(f=>{
            const v=p.get(f);
            if(!v)return;
            const num=parseFloat(v);
            if(isNaN(num))return;
            // map field name to sc key
            const map={"速度下限":"速度","速度上限":"速度","爆率下限":"爆率","爆率上限":"爆率","爆傷下限":"爆傷","攻擊下限":"攻擊","防禦下限":"防禦","生命下限":"生命","命中下限":"命中","抗性下限":"抗性"};
            const key=map[f];
            if(!key)return;
            if(!next[key])next[key]={...prev[key]};
            if(f.includes("下限"))next[key]={...next[key],min:num};
            else next[key]={...next[key],max:num};
          });
          // 權重：w >= 0.6 才自動勾 MAX
          weights.forEach(k=>{
            const v=p.get("w_"+k);
            if(v===null||v==="")return;
            const num=parseFloat(v);
            if(isNaN(num))return;
            if(!next[k])next[k]={...prev[k]};
            next[k]={...next[k],w:num,max:num>=0.6?true:(next[k]?.max||false)};
          });
          return next;
        });
        // 清掉 URL params 避免 refresh 重複套用
        window.history.replaceState({},"",window.location.pathname);
      };
      // chars 可能還沒載入，輪詢等待真實 CSV（>20 筆才算載入完成，DEMO_CHARS 只有 9 筆）
      let tries=0;
      const poll=setInterval(()=>{
        tries++;
        setChars(current=>{
          const realLoaded=current.length>20;
          const timeout=tries>20;
          if(realLoaded||timeout){
            clearInterval(poll);
            // 若目標角色是隱藏角色（四星），自動展開隱藏清單
            const found=current.find(x=>x.name===charName);
            if(found&&found.star<=4) setShowHid(true);
            applyParams(current);
          }
          return current;
        });
        if(tries>20)clearInterval(poll);
      },150);
    }catch(e){console.log("URL param parse error",e);}
  },[]);

  useEffect(()=>{setBreaks([]);},[selChar?.name]);

  // ★ 推薦配裝：優先讀 localStorage 快取，fallback fetch CSV
  useEffect(()=>{
    const CACHE_KEY="arkrecode_build_recom_data";
    try{
      const cached=localStorage.getItem(CACHE_KEY);
      if(cached){setBuildsData(JSON.parse(cached));return;}
    }catch(e){}
    fetch("./build_recom.csv?_="+Date.now()).then(r=>r.ok?r.text():null).then(text=>{
      if(!text)return;
      const lines=text.split("\n").map(l=>l.endsWith("\r")?l.slice(0,-1):l).filter(l=>l.trim());
      const dataLines=lines.filter(l=>l.trim().slice(0,7).toLowerCase()!=="version");
      if(dataLines.length<2)return;
      const headers=dataLines[0].split(",");
      const parsed={};
      for(let i=1;i<dataLines.length;i++){
        const vals=dataLines[i].split(",");
        if(vals.length<2)continue;
        const row={};headers.forEach((h,idx)=>{row[h.trim()]=(vals[idx]||"").trim();});
        const name=row["角色名"];if(!name)continue;
        if(!parsed[name])parsed[name]=[];
        parsed[name].push(row);
      }
      setBuildsData(parsed);
    }).catch(()=>{});
  },[]);

  const tsp=calcMode==="A"?selSets.reduce((a,s)=>a+getSetPcs(s),0):mb.sets.reduce((a,s)=>a+getSetPcs(s),0);
  const tspSets=calcMode==="A"?selSets:mb.sets;
  const setTspSets=calcMode==="A"?setSelSets:(fn)=>setMb(m=>({...m,sets:typeof fn==="function"?fn(m.sets):fn}));
  const breakBonus=useMemo(()=>{const b={};breaks.forEach(({prop,val})=>{if(prop&&val)b[prop]=(b[prop]||0)+val;});return b;},[breaks]);
  // lockedIds：配裝時排除的裝備
  // useIncludeLocked=true → 只排除 superLocked（預設，允許搜索已鎖定裝備）
  // useIncludeLocked=false → 排除其他角色鎖定裝備 + superLocked
  const lockedIds=useMemo(()=>{
    const ids=new Set(superLocked);
    if(!useIncludeLocked){
      Object.entries(locked).forEach(([charName,data])=>{
        if(charName===selChar?.name)return;
        (data.plans||[]).forEach(plan=>plan.eids?.forEach(id=>ids.add(id)));
      });
    }
    return ids;
  },[locked,selChar,useIncludeLocked,superLocked]);

  const fChars=useMemo(()=>{
    let list=chars;if(!showHid)list=list.filter(c=>!hidden.includes(c.name));
    if(search){const q=search.toLowerCase();list=list.filter(c=>c.name.toLowerCase().includes(q));}
    if(elemTab==="⭐")list=list.filter(c=>favs.includes(c.name));
    else if(elemTab)list=list.filter(c=>c.element===elemTab);
    return list.sort((a,b)=>{const af=favs.includes(a.name)?0:1,bf=favs.includes(b.name)?0:1;if(af!==bf)return af-bf;return b.star-a.star;});
  },[chars,search,elemTab,favs,hidden,showHid]);

  const fEquips=useMemo(()=>{
    let l=equips;if(eqF.slot)l=l.filter(e=>e.slot===eqF.slot);if(eqF.set)l=l.filter(e=>e.set===eqF.set);
    if(eqF.q){const q=eqF.q.toLowerCase();l=l.filter(e=>e.mt.includes(q)||e.set.includes(q)||Object.keys(e.subs).some(k=>k.includes(q)));}
    if(eqF.sort){
      const k=eqF.sort;
      l=[...l].sort((a,b)=>{
        const va=a.subs[k]||0;
        const vb=b.subs[k]||0;
        return vb-va;
      });
    }
    return l;
  },[equips,eqF]);

  const allHighlights=useMemo(()=>{
    if(!res?.results?.length)return[];
    const allStats=res.results.map(r=>r.stats);
    return res.results.map(r=>getHighlights(r.stats,allStats));
  },[res]);

  // Collect all unique highlights across results for quick-jump
  // Always show speed; expand related stats based on goal
  const uniqueHighlights=useMemo(()=>{
    if(!allHighlights.length||!res?.results?.length)return[];
    // Always-show keys
    const activeKeys=new Set(["速度"]);
    if(calcMode==="B"){
      const g=mb.goal;
      if(g==="坦度"){activeKeys.add("坦度");activeKeys.add("生命");activeKeys.add("防禦");}
      else if(g==="傷害"){activeKeys.add("傷害指數");activeKeys.add("攻擊");activeKeys.add("爆傷");}
      else if(g==="生命"||g==="防禦"){activeKeys.add(g);activeKeys.add("坦度");}
      else if(g==="攻擊"){activeKeys.add("攻擊");activeKeys.add("傷害指數");activeKeys.add("爆傷");}
      else if(g==="爆傷"){activeKeys.add("爆傷");activeKeys.add("傷害指數");activeKeys.add("攻擊");}
      else activeKeys.add(g);
      mb.constraints.forEach(c=>{if(c.stat&&c.val>0)activeKeys.add(c.stat);});
    }else{
      Object.entries(sc).forEach(([k,v])=>{
        if(k==="速度")return;
        if(v.max||v.w>0.3)activeKeys.add(k);
        if((k==="生命"||k==="防禦")&&(v.max||v.w>0.3))activeKeys.add("坦度");
        if((k==="攻擊"||k==="爆傷")&&(v.max||v.w>0.3))activeKeys.add("傷害指數");
      });
    }
    const allStats=res.results.map(r=>r.stats);
    const map={};
    allHighlights.forEach((hs,idx)=>{
      hs.forEach(h=>{
        if(activeKeys.has(h.key)&&!map[h.key]){
          const val=allStats[idx][h.key];
          map[h.key]={...h,idx,val};
        }
      });
    });
    return Object.values(map);
  },[allHighlights,calcMode,mb,sc,res]);

  const scrollToResult=(idx)=>{
    const el=resultRefs.current[idx];
    if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
  };

  const run=useCallback(()=>{
    if(!selChar){setRunError("請先選擇角色");return;}
    if(!equips.length){setRunError("請先匯入裝備");return;}
    // Stop any in-flight run
    cancelRef.current=false;
    setRunning(true);setRes(null);setRunError(null);setShowResults(true);
    cancelRef.current=true;
    setProgress({checked:0,total:1,found:0,elapsed:0,phase:"準備候選池..."});
    const _ba=bondAtk,_bh=bondHp,_bb={...breakBonus},_ch={...selChar},_eq=[...equips],_li=new Set(lockedIds);

    setTimeout(()=>{
      if(!cancelRef.current){setRunning(false);setProgress(null);return;}
      let config;
      const _poolCap=searchDur===30?14:searchDur===180?42:28;

      if(calcMode==="B"){
        // ── Mode B: pure constraint + single goal ──
        // ★ 單位說明：速度填整數(如 170)；爆率/爆傷/命中/抗性填最終%值(如 85 = 85%)
        //   calcFinal 回傳的 cr/cd/hit/res 已是乘以100後的%數值，與 constraints 比較單位一致。
        //   若未來修改 calcFinal 輸出格式，constraints 的輸入值需一併調整。
        const constraints={};
        const upperConstraints={};
        const _mb={...mb};
        if(_mb.spdMin>0)constraints["速度"]=_mb.spdMin;
        _mb.constraints.forEach(c=>{
          if(c.stat&&c.val>0){
            if(c.dir==="≤") upperConstraints[c.stat]=c.val;
            else constraints[c.stat]=c.val;
          }
        });
        // Score = purely the goal stat, speed never scores
        const optT={};
        // goalType drives scoreFn inside optimizeAsync
        config={
          constraints,
          upperConstraints,
          spdMax:_mb.spdMax||0,
          spdMinVal:_mb.spdMin||0,
          hasSpdConstraint:(_mb.spdMin>0)||(_mb.spdMax>0),
          spdPursueMax:false,
          optimize:optT, // empty — scoring is purely by goalType
          requiredSets:_mb.sets,
          excludedIds:_li,
          topK:8,
          goalType:_mb.goal,
          spdShoe:_mb.spdShoe||false,
          necklaceMt:_mb.necklaceMt||"",
          ringMt:_mb.ringMt||"",
          isModeB:true,
          poolCap:_poolCap,
        };
      }else{
        // ── Mode A: original weighted ──
        const _sc={...sc},_ss=[...selSets];
        const constraints={},optT={};
        const spdCfg=_sc["速度"];
        const spdMaxVal=spdCfg?.spdMax||0;
        const spdMinVal=spdCfg?.min||0;
        const spdPursueMax=spdCfg?.pursueMax||false;
        const hasSpdConstraint=spdMinVal>0||spdMaxVal>0;
        Object.entries(_sc).forEach(([k,v])=>{
          if(k==="速度"){
            if(spdMinVal>0)constraints["速度"]=spdMinVal;
            if(spdPursueMax||(spdMinVal>0&&spdMaxVal===0)) optT["速度"]=1.0;
          } else {
            if(v.min>0)constraints[k]=v.min;
            if(v.max||v.w>0)optT[k]=v.w;
          }
        });
        config={constraints,spdMax:spdMaxVal,spdMinVal,hasSpdConstraint,spdPursueMax,optimize:optT,requiredSets:_ss,excludedIds:_li,topK:8,goalType:"",spdShoe:_sc["速度"]?.spdShoe||false,necklaceMt:_sc["necklaceMt"]||"",ringMt:_sc["ringMt"]||"",poolCap:_poolCap};
      }

      optimizeAsync(_ch,_eq,config,_ba,_bh,_bb,cancelRef,
        (p)=>setProgress(p),
        (r)=>{
          if(r.error)setRunError(r.error);
          if(r.timedOut&&r.results.length>0)setRunError("搜索超時，從 "+(r.totalFound||r.results.length).toLocaleString()+" 組合格中取最佳 "+r.results.length+" 個方案");
          else if(r.timedOut&&r.results.length===0)setRunError("搜索超過 "+searchDur+" 秒未找到結果，請放寬速度區間或減少約束條件");
          else if(r.cancelled&&r.results.length>0)setRunError("已手動停止（已找到 "+r.results.length+" 個方案）");
          else if(r.cancelled&&r.results.length===0)setRunError("已手動停止，尚未找到符合條件的組合");
          setRes({...r,charName:_ch.name});
          setRunning(false);
          setProgress(null);
        },
        searchDur*1000
      );
    },30);
  },[selChar,equips,bondAtk,bondHp,breakBonus,sc,selSets,lockedIds,calcMode,mb,searchDur]);

  const stopRun=useCallback(()=>{cancelRef.current=false;},[]);

  // ★ 推薦配裝套用
  const applyBuild=useCallback((build)=>{
    if(!build)return;
    const sets=["套裝1","套裝2","套裝3"].map(k=>build[k]).filter(Boolean);
    if(sets.length)setSelSets(sets);else setSelSets([]);
    setSc(prev=>{
      const next={...prev};
      const numMap={"速度下限":"速度","速度上限":"速度","爆率下限":"爆率","爆率上限":"爆率","爆傷下限":"爆傷","攻擊下限":"攻擊","防禦下限":"防禦","生命下限":"生命","命中下限":"命中","抗性下限":"抗性"};
      Object.entries(numMap).forEach(([f,k])=>{
        const v=build[f];if(!v&&v!=="0")return;
        const num=parseFloat(v);if(isNaN(num))return;
        if(!next[k])next[k]={...prev[k]};
        if(f.includes("下限"))next[k]={...next[k],min:num};
        else next[k]={...next[k],max:num};
      });
      ["攻擊","爆率","爆傷","命中","抗性","生命","防禦"].forEach(k=>{
        const v=build["權重_"+k];if(v===undefined||v==="")return;
        const num=parseFloat(v);if(isNaN(num))return;
        if(!next[k])next[k]={...prev[k]};
        next[k]={...next[k],w:num,max:num>=0.6?true:(next[k]?.max||false)};
      });
      return next;
    });
    if(build["速度鞋"]==="1")setSc(prev=>({...prev,速度:{...prev["速度"],speedShoes:true}}));
    setTab("config");
    setBuildsOpen(false);
  },[]);

  // ★ 鎖定結果到指定方案號（1-3），覆蓋式 — 使用 res.charName 而非 selChar
  const lockRes=(idx,slotNum)=>{if(!res||!res.charName)return;const r=res.results[idx];const cn=res.charName;
    setLocked(p=>{
      const prev=p[cn]||{plans:[]};
      const plans=[...(prev.plans||[])];
      const newPlan={eids:r.combo.map(e=>e.oid),ba:bondAtk,bh:bondHp,stats:r.stats,combo:r.combo};
      plans[slotNum]=newPlan;
      setLockErr("");
      return{...p,[cn]:{...prev,plans}};
    });
  };
  // 手動配套輔助
  const getManualSlots=(cn)=>manualSlots[cn]||{};
  const getManualSaved=(cn)=>manualSaved[cn]||null;
  const setManualSlotFor=(cn,slot,oid)=>setManualSlots(p=>({...p,[cn]:{...getManualSlots(cn),[slot]:oid}}));
  const clearManualSlot=(cn,slot)=>setManualSlots(p=>{const s={...getManualSlots(cn)};delete s[slot];return{...p,[cn]:s};});
  const saveManualPlan=(cn)=>{
    const sl=getManualSlots(cn);
    if(Object.keys(sl).length<6)return false;
    setManualSaved(p=>({...p,[cn]:{...sl}}));
    // also push into locked as manual plan (labelled)
    setLocked(p=>{
      const prev=p[cn]||{plans:[]};
      const plans=[...(prev.plans||[])];
      const char=chars.find(c=>c.name===cn);
      const combo=SLOTS.map(s=>{const oid=sl[s];return oid?equips.find(e=>e.oid===oid):null;}).filter(Boolean);
      const stats=char?calcFinal(char,combo,bondAtk,bondHp,breakBonus):null;
      const newPlan={eids:combo.map(e=>e.oid),ba:bondAtk,bh:bondHp,stats,combo,isManual:true};
      plans[3]=newPlan;
      return{...p,[cn]:{...prev,plans}};
    });
    return true;
  };
  const unlockChar=n=>setLocked(p=>{const x={...p};delete x[n];return x;});
  const unlockPlan=(cn,planIdx)=>setLocked(p=>{
    const plans=[...(p[cn]?.plans||[])];
    plans[planIdx]=null;
    // if all plans are empty, remove the char entry
    if(!plans.some(Boolean)){const x={...p};delete x[cn];return x;}
    return{...p,[cn]:{...p[cn],plans}};
  });

  const canRun=selChar&&equips.length>0&&!running;
  const iCls="rounded-lg px-2 py-1 text-[14px] border border-slate-700/40 focus:outline-none focus:border-blue-700 transition-colors";
  const iSty={background:"#151D2E",color:"#CBD5E1"};
  const spdV=sc["速度"];

  // Per-% value display for selected character
  const perPctInfo=useMemo(()=>{
    if(!selChar)return null;
    return{
      "攻擊%":(selChar.base_atk*0.01).toFixed(1),
      "防禦%":(selChar.base_def*0.01).toFixed(1),
      "生命%":(selChar.base_hp*0.01).toFixed(1),
    };
  },[selChar]);

  return(
    <div className="min-h-screen text-slate-200" style={{fontFamily:"'Noto Sans TC',system-ui,sans-serif",background:"#0B0F1A"}}>
            {/* HEADER */}
      <div className="border-b border-slate-800/60 px-4 py-2 flex items-center justify-between" style={{background:"#0F1628"}}>
        <div className="flex items-center gap-3">

          {/* ── Hamburger Nav Menu ── */}
          <div className="relative">
            <button onClick={()=>setNavOpen(o=>!o)}
              className="flex flex-col justify-center items-center w-8 h-8 rounded-lg border border-slate-700/50 hover:border-blue-700/50 transition-colors gap-1"
              style={{background:"#151D2E"}}
              title="選單 Menu">
              <span className="block w-4 h-0.5 rounded" style={{background:navOpen?"#93C5FD":"#64748B"}}/>
              <span className="block w-4 h-0.5 rounded" style={{background:navOpen?"#93C5FD":"#64748B"}}/>
              <span className="block w-4 h-0.5 rounded" style={{background:navOpen?"#93C5FD":"#64748B"}}/>
            </button>
            {navOpen&&(
              <>
                {/* 點外部關閉 */}
                <div className="fixed inset-0 z-[9990]" onClick={()=>setNavOpen(false)}/>
                <div className="absolute left-0 top-full mt-2 z-[9999] rounded-xl border border-slate-600 overflow-hidden shadow-2xl"
                  style={{background:"#0F1628",minWidth:"200px"}}>
                  <div className="px-3 py-2 border-b border-slate-700/50">
                    <div className="text-[13px] text-slate-500 font-semibold tracking-widest uppercase">ArkRecode Tools</div>
                  </div>
                  {[
                    {icon:"📊",zh:"對戰記錄器",en:"Battle Recorder",href:"./index.html"},
                    {icon:"👤",zh:"角色資料庫",en:"Character DB",href:"./character-db.html"},
                    {icon:"⚙️",zh:"配裝計算器",en:"Equip Optimizer",href:"./equip-optimizer.html",active:true},
                  ].map(item=>(
                    <a key={item.href} href={item.href}
                      onClick={e=>{if(item.active){e.preventDefault();setNavOpen(false);}}}
                      className="flex items-center gap-3 px-3 py-2.5 transition-colors"
                      style={item.active
                        ?{background:"#1E3A5F",color:"#93C5FD",cursor:"default"}
                        :{color:"#94A3B8"}}>
                      <span className="text-base w-5 text-center shrink-0">{item.icon}</span>
                      <div>
                        <div className="text-[15px] font-medium">{item.zh}</div>
                        <div className="text-[13px] opacity-50">{item.en}</div>
                      </div>
                      {item.active&&<span className="ml-auto text-[13px] px-1.5 py-0.5 rounded-full" style={{background:"#3B82F622",color:"#93C5FD",border:"1px solid #3B82F644"}}>目前頁面</span>}
                    </a>
                  ))}
                </div>
              </>
            )}
          </div>

          <div className="flex items-center gap-2">
            <div className="w-6 h-6 rounded flex items-center justify-center text-sm" style={{background:"linear-gradient(135deg,#3B82F6,#8B5CF6)"}}>⚔</div>
            <h1 className="text-base font-bold tracking-wide" style={{color:"#93C5FD"}}>Ark Re:Code <span className="text-slate-500 font-normal">配裝計算器</span><span className="text-[15px] font-normal ml-2" style={{color:"#475569"}}>v1.3.5</span></h1>
          </div>
          <button onClick={()=>setShowHelp(!showHelp)} className="text-[14px] text-slate-500 hover:text-blue-400 transition-colors border border-slate-800 hover:border-blue-900 px-2 py-1 rounded-full">
            {showHelp?"✕ 關閉":"? 說明"}
          </button>
        </div>
        <div className="flex items-center gap-2 text-[15px]">
          <label className="cursor-pointer flex items-center gap-1.5 bg-slate-800/80 hover:bg-slate-700/80 px-2.5 py-1 rounded-lg border border-slate-700/50 text-slate-300 transition-colors">
            <span>👤</span><span>角色CSV</span>
            <input type="file" accept=".csv" className="hidden" onChange={e=>{const f=e.target.files?.[0];if(f){const r=new FileReader();r.onload=()=>{const parsed=parseCharCSV(r.result);const list=parsed.length?parsed:DEMO_CHARS;setChars(list);setHidden(list.filter(c=>c.star<=4).map(c=>c.name));};r.readAsText(f);}}}/>
          </label>
          <label className="cursor-pointer flex items-center gap-1.5 bg-slate-800/80 hover:bg-slate-700/80 px-2.5 py-1 rounded-lg border border-slate-700/50 text-slate-300 transition-colors">
            <span>📦</span><span>裝備JSON</span>
            <input type="file" accept=".json" className="hidden" onChange={e=>{const f=e.target.files?.[0];if(f){const r=new FileReader();r.onload=()=>{try{const parsed=parseEquipJSON(JSON.parse(r.result));setEquips(parsed);try{const m={ts:Date.now(),count:parsed.length};localStorage.setItem("arkrecode_equips",JSON.stringify(parsed));localStorage.setItem("arkrecode_equips_meta",JSON.stringify(m));setEquipCacheMeta(m);}catch(e){}}catch(err){alert("JSON解析錯誤: "+err.message)}};r.readAsText(f);}e.target.value="";}}/>
          </label>
          {equips.length>0&&<button onClick={()=>{setEquips([]);setEquipCacheMeta(null);try{localStorage.removeItem("arkrecode_equips");localStorage.removeItem("arkrecode_equips_meta");}catch(e){}}} className="flex items-center gap-1 bg-red-900/30 hover:bg-red-900/50 px-2.5 py-1 rounded-lg border border-red-800/50 text-red-400 transition-colors">🗑️ 清除</button>}
          <div className="text-slate-500 text-[14px] border border-slate-800 px-2 py-1 rounded-lg flex items-center gap-1">
            <span style={{color:"#93C5FD"}}>{chars.length}</span> 角 · <span style={{color:"#4ADE80"}}>{equips.length}</span> 裝
            {equipCacheMeta&&<span className="text-[13px] cursor-default" style={{color:"#475569"}} title={"快取："+equips.length+"件，"+new Date(equipCacheMeta.ts).toLocaleString()}>💾</span>}
          </div>
        </div>
      </div>

      {showHelp&&(
        <div className="border-b border-slate-800 px-5 py-4 text-sm text-slate-300 space-y-2" style={{background:"#0F1628"}}>
          <div className="font-bold text-blue-400 mb-1">📖 使用說明</div>

                            <div className="flex items-center gap-1.5 flex-wrap">
                              {activePlan.stats?.套裝?.map((st,si)=>{const nm=st.split("(")[0];return(
                                <span key={si} className="text-[12px] px-1.5 py-0.5 rounded-full font-bold"
                                  style={{background:getSetColor(nm)+"18",color:getSetColor(nm),border:"1px solid "+getSetColor(nm)+"33"}}>{st}</span>

                          </div>
                          {activePlan.stats&&(
                            <div className="rounded-lg border border-slate-700/40 px-2 py-1.5" style={{background:"#0B1120"}}>
                              <div className="grid grid-cols-4 gap-x-2 gap-y-0.5 text-[13px]">
                                {[["攻擊","#F87171",v=>fN(v)],["防禦","#4ADE80",v=>fN(v)],["生命","#4ADE80",v=>fN(v)],["速度","#FBBF24",v=>String(Math.floor(v||0))],
                                  ["爆率","#F87171",v=>fP(v)],["爆傷","#F87171",v=>fP(v)],["命中","#E2E8F0",v=>fP(v)],["抗性","#E2E8F0",v=>fP(v)]
                                ].map(([k,color,fmt])=>(
                                  <div key={k} className="flex flex-col items-center py-0.5">
                                    <span className="text-[11px] text-slate-600">{k}</span>
                                    <span className="font-mono font-bold text-[13px]" style={{color}}>{fmt(activePlan.stats[k])}</span>
                                  </div>
