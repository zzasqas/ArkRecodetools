                              </div>
                              <div className="flex gap-3 mt-1 pt-1 border-t border-slate-800/40 text-[12px]">
                                <span className="text-slate-600">🛡️ <span className="font-mono font-bold text-green-400">{fN(activePlan.stats.坦度)}</span></span>
                                <span className="text-slate-600">⚔️ <span className="font-mono font-bold text-red-400">{fN(activePlan.stats.傷害指數)}</span></span>
                              </div>
                            </div>
                          )}
                          {activePlan.combo&&(
                            <div className="grid grid-cols-2 gap-1.5">
                              {(()=>{const _s=[...activePlan.combo].sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot));const _sc=[0,3,1,4,2,5].map(i=>_s[i]).filter(Boolean);return _sc;})().map((eq,i)=>{
                                const isSL=superLocked.has(eq.oid);
                                return(
                                <div key={i} className="text-[12px] py-1 px-2 rounded border" style={{background:isSL?"#1A0A00":"#0B1120",borderColor:isSL?"#92400E44":"#1E293B33"}}>
                                  <div className="flex items-center gap-1">
                                    <span className="text-slate-600 w-4 shrink-0">{eq.slot}</span>
                                    <span className="font-bold" style={{color:getSetColor(eq.set)}}>[{eq.set}]</span>
                                    <span className="text-slate-300 truncate">{eq.mt} {fE(eq.mt,eq.mv)}</span>
                                    <button onClick={()=>setSuperLocked(prev=>{const n=new Set(prev);if(n.has(eq.oid))n.delete(eq.oid);else n.add(eq.oid);return n;})}
                                      className="ml-auto text-[10px] px-1 py-0.5 rounded border shrink-0 transition-colors"
                                      style={isSL?{borderColor:"#F59E0B55",color:"#F59E0B",background:"#1C1400"}:{borderColor:"#334155",color:"#475569",background:"#0D1525"}}
                                      title={isSL?"解除超級鎖":"超級鎖定"}>
                                      {isSL?"🔐":"🔓"}
                                    </button>
                                  </div>
                                  <div className="text-slate-600 mt-0.5 pl-5 text-[11px] leading-tight">{fmtSubs(eq.subs)}</div>
                                </div>
                                );
                              })}
                            </div>
                          )}
                          </>
                        ):(
                          <div className="text-[13px] text-slate-600 py-6 text-center">此方案尚未儲存</div>
                        )}
                      </div>
                    )}

                    {/* ── 手動配套內容（遊戲風格佈局） ── */}
                    {isManualTab&&(
                      <div className="p-2 space-y-2">
                        {/* 快速帶入 + 全部復原 */}
                        <div className="flex items-center gap-1.5 flex-wrap">
                          <span className="text-[11px] text-slate-600">帶入:</span>
                          {[0,1,2].map(n=>{
                            const p=plans[n];
                            return p?(
                              <button key={n} onClick={()=>{
                                const sl={};p.combo.forEach(eq=>{sl[eq.slot]=eq.oid;});
                                setManualSlots(prev=>({...prev,[cn]:sl}));
                              }}
                                className="text-[11px] px-2 py-0.5 rounded border transition-colors hover:border-blue-600/50"
                                style={{borderColor:"#3B82F644",color:"#93C5FD",background:"#0D1A2E"}}>
                                {(n+1)+"號"}
                              </button>
                            ):(
                              <button key={n} disabled className="text-[11px] px-2 py-0.5 rounded border opacity-30"
                                style={{borderColor:"#1E293B",color:"#475569",background:"#0D1525"}}>
                                {(n+1)+"號"}
                              </button>
                            );
                          })}
                          {hasAnyChange&&(
                            <button onClick={()=>{if(mSaved)setManualSlots(p=>({...p,[cn]:{...mSaved}}));}}
                              className="text-[11px] px-2 py-0.5 rounded border transition-colors ml-auto"
                              style={{borderColor:"#F59E0B55",color:"#F59E0B",background:"#1C1400"}}>
                              ↩ 全部復原
                            </button>
                          )}
                        </div>

                        {/* 數值列 + 坦度/傷害 */}
                        <div className="rounded-lg border border-slate-700/40 px-2 py-1.5" style={{background:"#0B1120"}}>
                          <div className="grid grid-cols-4 gap-x-2 gap-y-0.5 text-[12px]">
                            {[["攻擊","#F87171"],["防禦","#4ADE80"],["生命","#4ADE80"],["速度","#FBBF24"],["爆率","#F87171"],["爆傷","#F87171"],["命中","#94A3B8"],["抗性","#94A3B8"]].map(([k,col])=>{
                              const cur=stats?stats[k]:null;
                              const sv=savedStats?savedStats[k]:null;
                              const diff=cur!==null&&sv!==null?Math.round((cur-sv)*10)/10:null;
                              const isPct=["爆率","爆傷","命中","抗性"].includes(k);
                              const isDecimal=["爆率","爆傷"].includes(k);
                              const diffStr=diff===null?"":diff>0?"+"+(isDecimal?diff.toFixed(1):Math.round(diff))+(isPct?"%":""):diff<0?(isDecimal?diff.toFixed(1):Math.round(diff))+(isPct?"%":""):"";
                              return(
                                <div key={k} className="flex flex-col items-center">
                                  <span className="text-[10px] text-slate-600">{k}</span>
                                  <span className="font-mono font-bold text-[13px]" style={{color:cur!==null?col:"#334155"}}>
                                    {cur!==null?(isDecimal?cur.toFixed(1)+"%":isPct?cur+"%":Math.round(cur).toLocaleString()):"—"}
                                  </span>
                                  {diffStr&&<span className="text-[9px] font-semibold" style={{color:diff>0?"#4ADE80":"#F87171"}}>{diffStr}</span>}
                                </div>
                              );
                            })}
                          </div>
                          {stats&&(
                            <div className="flex gap-3 mt-1 pt-1 border-t border-slate-800/40 text-[11px]">
                              <span className="text-slate-600">🛡️ <span className="font-mono font-bold text-green-400">{fN(stats.坦度)}</span></span>
                              <span className="text-slate-600">⚔️ <span className="font-mono font-bold text-red-400">{fN(stats.傷害指數)}</span></span>
                            </div>
                          )}
                        </div>

                        {/* 六件裝備：左三(武頭甲) / 右三(鍊指鞋) — 仿遊戲佈局 */}
                        <div className="grid grid-cols-2 gap-1.5">
                          {[["武器","頭盔","鎧甲"],["項鍊","戒指","鞋子"]].map((group,gi)=>(
                            <div key={gi} className="space-y-1">
                              {group.map(s=>{
                                const eq=comboEqs[SLOTS.indexOf(s)];
                                const isA=manualCurSlot===s;
                                const svOid=mSaved?mSaved[s]:null;
                                const isChanged=svOid&&mSlots[s]!==svOid;
                                const isSL=eq&&superLocked.has(eq.oid);
                                return(
                                  <div key={s} onClick={()=>setManualCurSlot(s)}
                                    className="rounded-lg border px-2 py-1.5 cursor-pointer transition-all"
                                    style={{borderColor:isA?"#3B82F6":eq?"#16A34A44":"#1E293B",background:isA?"#0F1E35":"#0B1120"}}>
                                    <div className="flex items-center gap-1 mb-0.5">
                                      <span className="text-[10px] text-slate-500 w-4 shrink-0">{s}</span>
                                      {eq?(
                                        <>
                                        <span className="text-[10px] px-1 rounded-full" style={{background:(getSetColor(eq.set)||"#94A3B8")+"22",color:getSetColor(eq.set)||"#94A3B8"}}>{eq.set}</span>
                                        <span className="text-[11px] text-slate-200 truncate">{eq.mt} {fE(eq.mt,eq.mv)}</span>
                                        {isChanged&&<button onClick={e=>{e.stopPropagation();setManualSlots(p=>({...p,[cn]:{...(p[cn]||{}),[s]:svOid}}));}}
                                          className="text-[9px] px-1 rounded" style={{color:"#F59E0B",background:"#1C1400"}}>↩</button>}
                                        <button onClick={e=>{e.stopPropagation();setSuperLocked(prev=>{const n=new Set(prev);if(n.has(eq.oid))n.delete(eq.oid);else n.add(eq.oid);return n;});}}
                                          className="ml-auto text-[9px] px-1 py-0.5 rounded border shrink-0"
                                          style={isSL?{borderColor:"#F59E0B55",color:"#F59E0B",background:"#1C1400"}:{borderColor:"#334155",color:"#475569",background:"#0D1525"}}
                                          title={isSL?"解除超級鎖":"超級鎖定"}>
                                          {isSL?"🔐":"🔓"}
                                        </button>
                                        </>
                                      ):(
                                        <span className="text-[11px] text-slate-700">未選</span>
                                      )}
                                    </div>
                                    {eq&&<div className="text-[10px] text-slate-600 pl-5 leading-snug">{fmtSubs(eq.subs)}</div>}
                                  </div>
                                );
                              })}
                            </div>
                          ))}
                        </div>

                        {/* 儲存 */}
                        <div className="flex items-center gap-2">
                          <button onClick={()=>{saveManualPlan(cn);setManualSaved(p=>({...p,[cn]:{...mSlots}}));}}
                            className="flex-1 py-1.5 rounded-lg border text-[12px] font-semibold transition-all"
                            style={{borderColor:combo.length===6?"#16A34A55":"#1E293B",color:combo.length===6?"#4ADE80":"#475569",background:"#052e1699"}}>
                            {combo.length===6?"儲存手動配套":"還差 "+(6-combo.length)+" 件"}
                          </button>
                          {hasSaved&&(
                            <button onClick={()=>setManualSaved(p=>{const x={...p};delete x[cn];return x;})}
                              className="text-[11px] text-red-400 hover:text-red-300 px-2 py-1 rounded border border-red-800/30">清除</button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                  );
                  });
                })()}
                {Object.keys(locked).length>0&&<button onClick={()=>{if(confirm("確定全部解鎖?"))setLocked({})}} className="text-[13px] text-red-400 hover:text-red-300 transition-colors px-2 py-1">🗑️ 全部解鎖</button>}
              </div>
            )}
          </div>
        </div>

        {/* COL 3 — Results (collapsible) */}
        {showResults?(
        <div className="flex flex-col overflow-hidden flex-1 border-r border-slate-800/60" style={{background:"#0B0F1A",minWidth:"280px"}}>
          <div className="px-4 py-2 border-b border-slate-800/60 text-[15px] text-slate-500 flex items-center gap-2 shrink-0 flex-wrap" style={{background:"#0D1220"}}>
            <span className="text-slate-400 font-semibold">📊 配裝結果</span>
            {res?.charName&&(()=>{const rc=chars.find(x=>x.name===res.charName);return(
              <span className="text-[13px] font-bold" style={{color:rc?EC[rc.element]||"#94A3B8":"#94A3B8"}}>{res.charName}</span>
            );})()}
            {res&&!running&&res.results?.length>0&&(
              <span className="text-[13px] font-bold px-2 py-0.5 rounded-full" style={{background:"#1E3A5F",color:"#93C5FD",border:"1px solid #3B82F644"}}>
                {res.results.length} 個方案
              </span>
            )}
            {res&&<span className="text-slate-600">{"· 試算 "+(res.checked?.toLocaleString()||0)+" 組"+(res.totalFound>0?" · "+res.totalFound.toLocaleString()+" 組合格":"")}</span>}
            {res?.poolInfo&&(
              <span className="text-slate-700 text-[13px]">候選池：{Object.entries(res.poolInfo).map(([s,n])=>s+String(n)).join(" / ")}</span>
            )}
            {calcMode==="B"&&<span className="ml-auto" style={{color:"#93C5FD"}}>B模式 · 最大化: {MODE_B_GOALS.find(g=>g.key===mb.goal)?.label||mb.goal}</span>}
            <button onClick={()=>setShowResults(false)} className="ml-auto text-[12px] text-slate-600 hover:text-slate-400 px-1.5 py-0.5 rounded border border-slate-700/40 hover:border-slate-600 transition-colors shrink-0" title="收合結果面板">✕</button>
          </div>

          {/* Progress bar + stop button */}
          {running&&progress&&(
            <div className="px-6 py-6 flex-1 flex flex-col items-center justify-center" style={{background:"#0B0F1A"}}>
              <div className="w-full max-w-md space-y-4">
                <div className="text-center">
                  <div className="text-3xl mb-3 animate-spin inline-block">⏳</div>
                  <div className="text-blue-400 text-sm font-semibold">{progress.phase}</div>
                </div>
                <div className="w-full h-2 rounded-full bg-slate-800 overflow-hidden">
                  <div className="h-full rounded-full transition-all" style={{
                    width:Math.min(100,progress.elapsed>0?(progress.elapsed/(searchDur*1000)*100):(progress.total>0?(progress.checked/progress.total*100):0))+"%",
                    background:progress.elapsed>(searchDur*1000*0.8)?"linear-gradient(90deg,#F59E0B,#EF4444)":"linear-gradient(90deg,#3B82F6,#8B5CF6)"
                  }}/>
                </div>
                <div className="flex items-center justify-center gap-3 text-[15px] flex-wrap">
                  <span className="text-slate-500">已檢查 <span className="text-slate-300 font-mono">{progress.checked.toLocaleString()}</span></span>
                  <span className="text-slate-700">|</span>
                  <span className="text-green-400 font-semibold">
                    {(progress.totalFound||0)>progress.found
                      ?(progress.totalFound.toLocaleString()+" 組合格，取最佳 "+progress.found)
                      :((progress.totalFound||0)+" 組合格")}
                  </span>
                  <span className="text-slate-700">|</span>
                  <span className="text-slate-500">{(progress.elapsed/1000).toFixed(1)}s</span>
                </div>
                {progress.elapsed>30000&&(
                  <div className="text-center text-[14px] text-amber-400/80">
                    {progress.elapsed>(searchDur*1000*0.8)?"即將自動結束...":(Math.ceil((searchDur*1000-progress.elapsed)/1000)+"s 後將自動停止")}
                  </div>
                )}
                <div className="flex justify-center pt-2">
                  <button onClick={stopRun}
                    className="text-[14px] px-6 py-2 rounded-xl font-bold border-2 border-red-600/60 transition-all hover:bg-red-900/40"
                    style={{background:"#1C0A0A",color:"#F87171"}}>
                    ⏹ 停止搜索
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Quick jump highlights */}
          {!running&&uniqueHighlights.length>0&&(
            <div className="px-4 py-1.5 border-b border-slate-800/40 flex items-center gap-1.5 flex-wrap" style={{background:"#0D1424"}}>
              <span className="text-[13px] text-slate-600 mr-1">快速跳轉:</span>
              {uniqueHighlights.map((h,i)=>(
                <button key={i} onClick={()=>scrollToResult(h.idx)}
                  className="text-[13px] px-2 py-0.5 rounded-full font-bold transition-all hover:scale-105"
                  style={{background:h.color+"18",color:h.color,border:"1px solid "+h.color+"44"}}>
                  {h.label} {h.val!=null?fS(h.key,h.val):""} → #{h.idx+1}
                </button>
              ))}
            </div>
          )}

          {!running&&(
          <div className="flex-1 overflow-y-auto p-3 space-y-2.5">
            {!res&&<div className="text-slate-600 text-sm py-16 text-center leading-relaxed"><div className="text-2xl mb-3">⚔️</div>選擇角色 → 設定目標 → 開始配裝</div>}
            {runError&&<div className="text-red-400 text-sm py-6 text-center bg-red-950/20 rounded-xl border border-red-800/30 mx-2">⚠️ {runError}</div>}
            {!runError&&res?.results?.length===0&&(
              <div className="text-amber-400 text-sm py-6 text-center bg-amber-950/20 rounded-xl border border-amber-800/30 mx-2 space-y-2">
                <div>❌ 找不到滿足條件的組合</div>
                <div className="text-slate-500 text-[14px] space-y-1 text-left px-4">
                  <div className="font-semibold text-slate-400 mb-1">診斷建議：</div>
                  <div>• 多個下限同時存在時，請逐一放寬看哪個是關鍵瓶頸</div>
                  <div>• 套裝需求（6件）配合多個下限時組合空間極小，可嘗試移除套裝</div>
                  <div>• 速度上下限範圍太窄，可嘗試擴大範圍或只保留下限</div>
                  {res?.poolInfo&&<div className="text-slate-600 pt-1">候選池：{Object.entries(res.poolInfo).map(([s,n])=>s+"("+n+")").join(" ")}</div>}
                </div>
              </div>
            )}
            {lockErr&&<div className="mx-4 mb-2 text-[14px] text-amber-400 bg-amber-950/40 border border-amber-700/40 rounded-lg px-3 py-2">⚠️ {lockErr}</div>}
            {res?.results?.map((r,i)=>(
              <div key={i} ref={el=>{resultRefs.current[i]=el;}}>
                <ResCard idx={i} r={r} goalType={calcMode==="B"?mb.goal:""} highlights={allHighlights[i]||[]} onLock={(slotNum)=>{lockRes(i,slotNum);setTab("locked");setLockedPlanTab(p=>({...p,[res.charName]:slotNum}));}}/>
              </div>
            ))}
          </div>
          )}

          {/* Running without progress (brief initial state) */}
          {running&&!progress&&(
            <div className="flex-1 flex items-center justify-center" style={{background:"#0B0F1A"}}>
              <div className="text-blue-400 text-sm text-center"><div className="text-2xl mb-3 animate-spin inline-block">⏳</div><div>準備中...</div></div>
            </div>
          )}
        </div>
        ):(
          /* Collapsed results toggle */
          <div className="flex flex-col items-center py-3 px-1 border-r border-slate-800/60 cursor-pointer hover:bg-slate-800/30 transition-colors"
            style={{background:"#0D1220",writingMode:"vertical-rl"}}
            onClick={()=>setShowResults(true)}>
            <span className="text-[12px] text-slate-500 tracking-widest whitespace-nowrap">📊 結果{res?.results?.length>0?" ("+res.results.length+")":""}</span>
          </div>
        )}

        {/* COL 4 — Manual Picker (collapsible) */}
        {showEqPicker&&manualCharName&&manualOpen===manualCharName?(
        <div className="flex flex-col overflow-hidden" style={{background:"#0B0F1A",width:showResults?"340px":"100%",minWidth:"300px",flex:showResults?"none":"1"}}>
          <div className="px-3 py-2 border-b border-slate-800/60 flex items-center gap-2 shrink-0" style={{background:"#0D1220"}}>
            <span className="text-[14px] font-semibold" style={{color:"#4ADE80"}}>📦 裝備篩選</span>
            <span className="text-[13px] text-slate-500">{manualCharName}</span>
            <span className="text-[13px] px-2 py-0.5 rounded-full font-bold" style={{background:"#1E3A5F",color:"#93C5FD"}}>{manualCurSlot}</span>
            <button onClick={()=>setShowEqPicker(false)} className="ml-auto text-[12px] text-slate-600 hover:text-slate-400 px-1.5 py-0.5 rounded border border-slate-700/40 hover:border-slate-600 transition-colors shrink-0" title="收合篩選面板">✕</button>
          </div>
          <div className="flex-1 overflow-y-auto p-3">
            {(()=>{
              const cn=manualCharName;
              const mSlots=manualSlots[cn]||{};
              const mSaved=manualSaved[cn]||null;
              return(
                <ManualPicker
                  slot={manualCurSlot} equips={equips} selSlots={mSlots}
                  savedSlots={mSaved} eqF={mEqF} setEqF={setMEqF}
                  onSelect={(slot,oid)=>{
                    setManualSlots(p=>({...p,[cn]:{...(p[cn]||{}),[slot]:oid}}));
                  }}
                  onDeselect={(slot)=>{
                    setManualSlots(p=>{const s={...(p[cn]||{})};delete s[slot];return{...p,[cn]:s};});
                  }}
                />
              );
            })()}
          </div>
        </div>
        ):showEqPicker?(
          <div className="flex flex-col items-center justify-center px-4" style={{background:"#0B0F1A",width:"280px"}}>
            <div className="text-slate-600 text-[13px] text-center leading-relaxed">
              <div className="text-2xl mb-2">📦</div>
              請在「🔒 鎖定/手動」Tab<br/>點擊角色的「🖐 手動」分頁<br/>即可在此篩選裝備
            </div>
            <button onClick={()=>setShowEqPicker(false)} className="mt-4 text-[12px] text-slate-600 hover:text-slate-400 px-2 py-1 rounded border border-slate-700/40 transition-colors">收合</button>
          </div>
        ):null}
      </div>

    </div>
  );
}

// ============================================================
// RESULT CARD (enhanced UI)
// ============================================================
function ResCard({idx,r,goalType,highlights,onLock}){
  const[exp,setExp]=useState(idx===0);
  const[showLockMenu,setShowLockMenu]=useState(false);
  const s=r.stats;
  const statPairs=[["攻擊",s.攻擊,"#F87171"],["生命",s.生命,"#4ADE80"],["防禦",s.防禦,"#60A5FA"],["速度",s.速度,"#FBBF24"],["爆率",s.爆率,"#FB923C"],["爆傷",s.爆傷,"#F87171"],["命中",s.命中,"#A78BFA"],["抗性",s.抗性,"#34D399"]];
  return(
    <div className="rounded-xl border overflow-hidden transition-all" style={{background:"#0D1220",borderColor:highlights.length?"#1E3A5F":"#1E293B"}}>
      <div className="p-3">
        <div className="flex items-center justify-between mb-1.5">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-base font-bold px-2 py-0.5 rounded-md" style={{background:"#1E3A5F",color:"#93C5FD"}}>方案 {idx+1}</span>
            {highlights.map((h,hi)=>(
              <span key={hi} className="text-[13px] px-1.5 py-0.5 rounded-full font-bold"
                style={{background:h.color+"18",color:h.color,border:"1px solid "+h.color+"33"}}>{h.label}</span>
            ))}
          </div>
          <div className="flex items-center gap-1.5 shrink-0">
            <button onClick={()=>setExp(!exp)} className="text-[14px] text-slate-500 hover:text-slate-300 transition-colors px-2 py-1 rounded border border-slate-700/30 hover:border-slate-600">{exp?"▲ 收起":"▼ 詳情"}</button>
            <div className="relative">
              <button onClick={()=>setShowLockMenu(!showLockMenu)} className="text-[14px] px-3 py-1.5 rounded-lg border transition-all hover:bg-blue-900/30"
                style={{background:"#0D1A2E",color:"#60A5FA",borderColor:"#1D4ED844"}}>🔒 儲存方案</button>
              {showLockMenu&&(
                <>
                <div className="fixed inset-0 z-40" onClick={()=>setShowLockMenu(false)}/>
                <div className="absolute right-0 top-full mt-1 z-50 rounded-lg border border-slate-600/60 p-2 space-y-1 shadow-xl" style={{background:"#0D1525",minWidth:"140px"}}>
                  {[0,1,2].map(n=>(
                    <button key={n} onClick={()=>{onLock(n);setShowLockMenu(false);}}
                      className="w-full text-left text-[13px] px-2.5 py-1.5 rounded-md transition-colors hover:bg-blue-900/30"
                      style={{color:"#93C5FD"}}>{n+1} 號方案</button>
                  ))}
                </div>
                </>
              )}
            </div>
          </div>
        </div>
        <div className="flex flex-wrap gap-1 mb-2.5">
          {s.套裝?.map((st,i)=>{const nm=st.split("(")[0];return(
            <span key={i} className="text-[13px] px-1.5 py-0.5 rounded-full font-bold"
              style={{background:getSetColor(nm)+"18",color:getSetColor(nm),border:"1px solid "+getSetColor(nm)+"33"}}>{st}</span>
          );})}
        </div>
        <div className="grid grid-cols-2 gap-x-4 gap-y-0.5 text-[15px]">
          {statPairs.map(([k,v])=>{
            const hl=highlights.find(h=>h.key===k);
            return(
              <div key={k} className="flex justify-between items-center py-0.5">
                <span className={hl?"font-semibold":"text-slate-500"} style={hl?{color:hl.color}:{}}>{k}</span>
                <span className="font-mono font-semibold tabular-nums" style={hl?{color:hl.color}:{color:"#CBD5E1"}}>{fS(k,v)}</span>
              </div>
            );
          })}
        </div>
        <div className="mt-2 pt-2 border-t border-slate-800/40 grid grid-cols-2 gap-2">
          <div className="flex justify-between items-center px-2 py-1 rounded-lg" style={{background:highlights.some(h=>h.key==="坦度")?"#422006":"transparent"}}>
            <span className={`text-[14px] ${highlights.some(h=>h.key==="坦度")?"font-semibold text-amber-300":"text-slate-500"}`}>🛡️ 坦度</span>
            <span className={`font-mono text-base font-bold ${highlights.some(h=>h.key==="坦度")?"text-amber-300":"text-amber-500/60"}`}>{fN(s.坦度)}</span>
          </div>
          <div className="flex justify-between items-center px-2 py-1 rounded-lg" style={{background:highlights.some(h=>h.key==="傷害指數")?"#450A0A":"transparent"}}>
            <span className={`text-[14px] ${highlights.some(h=>h.key==="傷害指數")?"font-semibold text-rose-300":"text-slate-500"}`}>⚔️ 傷害指數</span>
            <span className={`font-mono text-base font-bold ${highlights.some(h=>h.key==="傷害指數")?"text-rose-300":"text-rose-500/60"}`}>{fN(s.傷害指數)}</span>
          </div>
        </div>
      </div>
      {exp&&(
        <div className="border-t border-slate-800/40 p-3 space-y-1.5" style={{background:"#080C14"}}>
          {[...r.combo].sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot)).map((eq,i)=>(
            <div key={i} className="text-[14px] flex items-start gap-1.5">
              <span className="text-slate-600 w-5 shrink-0 pt-0.5 text-center font-mono">{eq.slot}</span>
              <div className="flex-1">
                <div className="flex items-center gap-1.5">
                  <span className="font-bold" style={{color:getSetColor(eq.set)}}>[{eq.set}]</span>
                  <span className="text-slate-300">{eq.mt} {fE(eq.mt,eq.mv)}</span>
                </div>
                <div className="text-slate-500 mt-0.5 leading-relaxed">{fmtSubs(eq.subs)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// MANUAL FORM
// ============================================================
function ManualForm({onAdd,onCancel}){
  const[slot,setSlot]=useState("武器");const[set,setSet]=useState("速度");
  const[mt,setMt]=useState("攻擊");const[mv,setMv]=useState(500);
  const[subs,setSubs]=useState([{t:"生命%",v:0},{t:"速度",v:0},{t:"爆率",v:0},{t:"命中",v:0}]);
  useEffect(()=>{if(slot==="武器"){setMt("攻擊");setMv(500);}else if(slot==="頭盔"){setMt("生命");setMv(2700);}else if(slot==="鎧甲"){setMt("防禦");setMv(300);}},[slot]);
  const iCls="rounded-lg px-1.5 py-1 text-[14px] border border-slate-700/40 focus:outline-none focus:border-blue-700 transition-colors";
  const iSty={background:"#0B0F1A",color:"#CBD5E1"};
  return(
    <div className="rounded-xl border border-blue-800/30 p-3 space-y-2.5 text-[15px]" style={{background:"#0D1A2E"}}>
      <div className="font-bold text-sm text-blue-400">+ 新增裝備</div>
      <div className="grid grid-cols-3 gap-2">
        {[["部位",slot,setSlot,SLOTS],["套裝",set,setSet,ALL_SETS],["主屬",mt,setMt,PROPS]].map(([label,val,setter,opts])=>(
          <label key={label} className="space-y-1">
            <span className="text-slate-500 text-[13px] uppercase tracking-wide">{label}</span>
            <select className={`w-full ${iCls}`} style={iSty} value={val} onChange={e=>setter(e.target.value)}>
              {opts.map(o=><option key={o}>{o}</option>)}
            </select>
          </label>
        ))}
      </div>
      <div className="flex items-center gap-2">
        <span className="text-slate-500">主屬值</span>
        <input type="number" step="any" className={`w-20 ${iCls}`} style={iSty} value={mv} onChange={e=>setMv(+e.target.value)}/>
        <span className="text-[13px] text-slate-600">%類填小數，如爆率 0.6 = 60%</span>
      </div>
      <div>
        <div className="text-[14px] text-slate-500 mb-1.5">副屬</div>
        <div className="space-y-1.5">
          {subs.map((s,i)=>(
            <div key={i} className="flex gap-1.5 items-center">
              <select className={iCls} style={{...iSty,width:"80px"}} value={s.t} onChange={e=>setSubs(x=>x.map((y,j)=>j===i?{...y,t:e.target.value}:y))}>
                {PROPS.map(p=><option key={p}>{p}</option>)}
              </select>
              <input type="number" step="any" className={`w-20 ${iCls}`} style={iSty} value={s.v||""} onChange={e=>setSubs(x=>x.map((y,j)=>j===i?{...y,v:+e.target.value}:y))}/>
            </div>
          ))}
        </div>
      </div>
      <div className="flex gap-2 pt-1">
        <button onClick={onCancel} className="flex-1 py-1.5 rounded-lg border border-slate-700/40 text-slate-400 text-[15px] hover:bg-slate-800/40 transition-colors">取消</button>
        <button onClick={()=>{const so={};subs.forEach(s=>{if(s.v)so[s.t]=(so[s.t]||0)+s.v;});onAdd({slot,set,mt,mv,subs:so,lv:15,sid:"manual"});}}
          className="flex-1 py-1.5 rounded-lg font-bold text-[15px] text-white" style={{background:"linear-gradient(135deg,#1D4ED8,#4F46E5)"}}>新增</button>
      </div>
    </div>
  );
}

// ============================================================
// MANUAL PICKER — inline equip selector for 手動配套
// ============================================================
const MP_MT_BY_SLOT={武器:["攻擊"],頭盔:["生命"],鎧甲:["防禦"],
  項鍊:["爆率","爆傷","攻擊%","生命%","防禦%","攻擊","生命","防禦"],
  戒指:["命中","抗性","防禦%","生命%","攻擊%","防禦","生命","攻擊"],
  鞋子:["速度","攻擊%","生命%","防禦%","攻擊","生命","防禦"]};
const MP_ALL_SETS=["速度","爆傷","攻擊","生命","防禦","命中","抗性","暴擊","吸血","反擊","復仇","暴怒","創傷","夾擊","免疫","貫穿"];
const MP_ALL_SUBS=["速度","爆率","爆傷","攻擊","攻擊%","防禦","防禦%","生命","生命%","命中","抗性"];

function ManualPicker({slot,equips,selSlots,savedSlots,eqF,setEqF,onSelect,onDeselect}){
  const curMT=MP_MT_BY_SLOT[slot]||[];
  const sk=eqF.sort;
  const savedOid=savedSlots?savedSlots[slot]:null;

  const getSubN=(eq,s)=>(eq.subs[s]||0)+(eq.mt===s?eq.mv:0);
  const fmtMV=(mt,mv)=>{
    if(["攻擊%","防禦%","生命%"].includes(mt))return Math.round(mv*100)+"%";
    if(["爆率","爆傷","命中","抗性"].includes(mt))return Math.round(mv*100)+"%";
    if(mt==="速度")return"+"+mv;
    return Math.floor(mv);
  };
  const fmtSubV=(k,v)=>["爆率","爆傷","命中","抗性","攻擊%","防禦%","生命%"].includes(k)?Math.round(v*100)+"%":Math.floor(v)+"";

  const list=useMemo(()=>{
    let l=equips.filter(e=>e.slot===slot);
    if(eqF.main.length)l=l.filter(e=>eqF.main.includes(e.mt));
    if(eqF.sets.length)l=l.filter(e=>eqF.sets.includes(e.set));
    if(eqF.subs.length)l=l.filter(e=>eqF.subs.every(s=>s in e.subs||e.mt===s));
    if(sk)l.sort((a,b)=>getSubN(b,sk)-getSubN(a,sk));
    else l.sort((a,b)=>(b.lv||0)-(a.lv||0));
    // saved always first
    if(savedOid){const si=l.findIndex(e=>e.oid===savedOid);if(si>0){const[it]=l.splice(si,1);l.unshift(it);}else if(si<0){const se=equips.find(e=>e.oid===savedOid);if(se)l.unshift(se);}}
    return l;
  },[equips,slot,eqF.main,eqF.sets,eqF.subs,sk,savedOid]);

  const togglePill=(arr,val,max,key)=>{
    const next=arr.includes(val)?arr.filter(x=>x!==val):arr.length<max?[...arr,val]:arr;
    setEqF(f=>({...f,[key]:next}));
  };

  return(
    <div className="space-y-2">
      {/* Filters: 套裝 → 主屬 → 副屬 */}
      <div className="grid grid-cols-3 gap-2">
        {[["套裝",MP_ALL_SETS,"sets",3],["主屬",curMT,"main",2],["副屬含",MP_ALL_SUBS,"subs",3]].map(([label,opts,key,max])=>(
          <div key={key}>
            <div className="flex items-center gap-1.5 mb-1">
              <span className="text-[12px] text-slate-500 font-semibold">{label}</span>
              {eqF[key].length>0&&<button onClick={()=>setEqF(f=>({...f,[key]:[]}))} className="text-[11px] text-red-600 hover:text-red-400">清除</button>}
            </div>
            <div className="flex flex-wrap gap-1">
              {opts.map(o=>{const on=eqF[key].includes(o);const dim=!on&&eqF[key].length>=max;
                return(<span key={o} onClick={()=>!dim&&togglePill(eqF[key],o,max,key)}
                  className="text-[14px] px-2 py-0.5 rounded-full border cursor-pointer select-none transition-all"
                  style={{background:on?"#1E3A5F":"#0D1525",color:on?"#93C5FD":"#64748B",borderColor:on?"#3B82F688":"#1E293B",opacity:dim?0.3:1}}>{o}</span>);
              })}
            </div>
          </div>
        ))}
      </div>
      {/* Sort + count */}
      <div className="flex items-center gap-2">
        <span className="text-[10px] text-slate-600 uppercase tracking-wide">排序</span>
        <select value={sk} onChange={e=>setEqF(f=>({...f,sort:e.target.value}))}
          className="flex-1 text-[12px] rounded-lg px-1.5 py-1 border border-slate-700/40 outline-none" style={{background:"#0D1525",color:"#CBD5E1"}}>
          <option value="">預設（等級）</option>
          <option value="速度">速度 ↓</option>
          <option value="爆率">爆率 ↓</option><option value="爆傷">爆傷 ↓</option>
          <option value="攻擊%">攻擊% ↓</option><option value="攻擊">攻擊 ↓</option>
          <option value="防禦%">防禦% ↓</option><option value="防禦">防禦 ↓</option>
          <option value="生命%">生命% ↓</option><option value="生命">生命 ↓</option>
          <option value="命中">命中 ↓</option><option value="抗性">抗性 ↓</option>
        </select>
        <span className="text-[11px] text-slate-600">{list.length} 件</span>
      </div>
      {/* List */}
      <div className="space-y-1.5 pr-0.5">
        {list.slice(0,150).map(eq=>{
          const isSel=selSlots[slot]===eq.oid;
          const isSaved=savedOid===eq.oid;
          const sc=getSetColor(eq.set)||"#94A3B8";
          let subs=Object.entries(eq.subs);
          if(sk){const si=subs.findIndex(([k])=>k===sk);if(si>0){const[it]=subs.splice(si,1);subs.unshift(it);}}
          const subsH=subs.map(([k,v])=>{
            const isS=sk&&k===sk;const isF=eqF.subs.includes(k);
            const col=isS?"#FBBF24":isF?"#93C5FD":"#475569";
            const fw=isS||isF?600:400;
            return'<span style="color:'+col+";font-weight:"+fw+'">'+k+" "+fmtSubV(k,v)+"</span>";
          }).join('<span style="color:#1E293B"> · </span>');
          const savedBadge=isSaved?'<span style="font-size:10px;padding:1px 5px;border-radius:999px;background:#16A34A22;color:#4ADE80;border:1px solid #16A34A44;margin-left:4px">已儲存</span>':"";
          return(
            <div key={eq.oid}
              onClick={()=>isSel?onDeselect(slot):onSelect(slot,eq.oid)}
              className="px-2 py-1.5 rounded-lg border cursor-pointer transition-all text-[12px]"
              style={{background:isSel?"#052e16":"#0D1525",borderColor:isSel?"#16A34A":isSaved?"#16A34A44":"#1E293B"}}>
              <div className="flex items-center gap-1.5 mb-1">
                <span className="text-[10px] px-1.5 py-0.5 rounded-full" style={{background:sc+"22",color:sc,border:"1px solid "+sc+"44"}}>{eq.set}</span>
                <span className="font-medium text-slate-200">{eq.mt} {fmtMV(eq.mt,eq.mv)}</span>
                <span dangerouslySetInnerHTML={{__html:savedBadge}}/>
                <span className="ml-auto text-slate-600">Lv{eq.lv}</span>
              </div>
              <div className="leading-relaxed" dangerouslySetInnerHTML={{__html:subsH}}/>
            </div>
          );
        })}
        {list.length>150&&<div className="text-[11px] text-slate-600 text-center py-1">還有 {list.length-150} 件...</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
