                                                        e.target.nextElementSibling.textContent = tg(`將刪除 ${recordsToDelete.length} 筆記錄（${uploadedCount} 筆已上傳，${notUploadedCount} 筆未上傳）`, `Will delete ${recordsToDelete.length} record(s) (${uploadedCount} uploaded, ${notUploadedCount} not uploaded)`);
                                                    } else {
                                                        e.target.nextElementSibling.textContent = tg('沒有符合條件的記錄', 'No matching records');
                                                    }
                                                } else {
                                                    e.target.nextElementSibling.textContent = '';
                                                }
                                            }}
                                        />
                                        <span className="text-sm text-gray-600 ml-2"></span>
                                    </div>
                                    <button
                                        onClick={() => {
                                            const dateInput = document.querySelector('input[type="date"]');
                                            if (dateInput && dateInput.value) {
                                                onDeleteBatchByDate(dateInput.value);
                                                dateInput.value = '';
                                                dateInput.nextElementSibling.textContent = '';
                                            } else {
                                                alert(tg('請先選擇日期', 'Please select a date first'));
                                            }
                                        }}
                                        className="px-3 py-1 bg-red-500 text-white rounded text-sm hover:bg-red-600 transition-colors flex items-center gap-1"
                                    >
                                        <IconComponents.Trash size={14} />
                                        {t('批量刪除', 'Batch Delete')}
                                    </button>
                                </div>
                                <div className="text-sm text-gray-500">
                                    {t(`共 ${records.length} 筆記錄`, `${records.length} record(s) total`)}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        });

        // ==================== 主應用組件 ====================
        const App = () => {
            // 免責聲明狀態
            const [disclaimerAccepted, setDisclaimerAccepted] = useState(false);

            const [lang, setLang] = React.useState(
                localStorage.getItem('arkrecode_lang') || 'zh'
            );
            React.useEffect(() => {
                const handler = e => setLang(e.detail);
                window.addEventListener('arkrecode-lang', handler);
                return () => window.removeEventListener('arkrecode-lang', handler);
            }, []);
            const i18n = useMemo(() => ({
                lang,
                t: (zh, en) => (lang === 'en' && en !== undefined ? en : zh),
                cn: (name) => (lang === 'en' ? (CHAR_NAME_EN[name] || name) : name),
                rank: (r) => (lang === 'en' ? (RANK_EN[r] || r) : r),
                match: (m) => (lang === 'en' ? (MATCH_EN[m] || m) : m),
            }), [lang]);

            // 狀態定義
            const [currentView, setCurrentView] = useState('record');
            const [battleRecords, setBattleRecords] = useState([]);
            const [uploadProgress, setUploadProgress] = useState({ current: 0, total: 0, isUploading: false });
            const [sortBy, setSortBy] = useState('date'); // 新增排序狀態：'date' 或 'opponentId'
            
            // 別稱採疊加式：正式中英文名與預設別稱永遠來自母檔 MASTER_ALIASES；使用者自訂只疊加，另存 arkrecode_userAliases
            const [userAliases, setUserAliases] = useState({ extras: {}, customs: [] });
            const [aliasSearch, setAliasSearch] = useState(''); // 角色別稱設定的搜尋過濾
            const characterAliases = useMemo(() => {
                const extras = userAliases.extras || {};
                const merged = MASTER_ALIASES.map(c => {
                    const aliases = [...c.aliases];
                    (extras[c.name] || []).forEach(a => { if (a && !aliases.includes(a)) aliases.push(a); });
                    return { ...c, aliases };
                });
                (userAliases.customs || []).forEach(c => {
                    if (c && c.name) merged.push({ name: c.name, aliases: (c.aliases && c.aliases.filter(Boolean).length) ? c.aliases.filter(Boolean) : [c.name] });
                });
                return merged;
            }, [userAliases]);

            const [formData, setFormData] = useState({
                opponentTeam: ['', '', '', ''],
                myTeam: ['', '', '', ''],
                result: '勝', // 預設勝利
                opponentName: '', // 新增對手名稱欄位
                notes: '',
                rank: '',
                date: new Date().toISOString().split('T')[0],
                recorder: (localStorage.getItem('arkrecode_lang') === 'en' ? 'Player1' : '玩家1')
            });

            const [teamSuggestions, setTeamSuggestions] = useState([]);
            const [counterSuggestions, setCounterSuggestions] = useState([]);
            const [lookupOpponent, setLookupOpponent] = useState(['', '', '']);
            const [lookupSuggestions, setLookupSuggestions] = useState([]);
            const [showLookupSpeedCalc, setShowLookupSpeedCalc] = useState(true);
            
            const [counterDatabase, setCounterDatabase] = useState({
                '光鞭,蓋兒,光狙,血卡': [{ combo: ['水拳', '水馬', '水偶', 'LLB'], notes: '水系壓制' }],
                '河北,赤鬼,闆娘,水琴': [{ combo: ['光鞭', '暗飛', '蓋兒', '水琴'], notes: '光鞭體系' }]
            });

            const [communitySettings, setCommunitySettings] = useState({
                enabled: false,
                apiUrl: '',
                lastSync: null
            });

            // 社群GvG資料庫
            const COMMUNITY_GVG_URL = 'https://raw.githubusercontent.com/zzasqas/ArkRecodetools/main/data/community_gvg.json';
            const [communityDB, setCommunityDB] = useState({
                loaded: false,
                loading: false,
                mode: null,
                description: null,
                generated: null,
                source_records: 0,
                data: {}
            });

            // 常數定義（更新角色名稱）
            const commonCombos = useMemo(() => [
                { combo: ['光鞭', '暗飛', '蓋兒', '水琴'], winRate: 0.75 },
                { combo: ['蓋兒', '水琴', 'AOI', '光馬'], winRate: 0.72 },
                { combo: ['兔女郎', '暗飛', '血卡', '水琴'], winRate: 0.68 },
                { combo: ['蓋兒', '暗飛', '水琴', '血卡'], winRate: 0.70 },
                { combo: ['124', '蓋兒', 'AOI', '水琴'], winRate: 0.74 },
                { combo: ['水拳', '水馬', '水琴', 'LLB'], winRate: 0.73 },
                { combo: ['光鞭', '蓋兒', 'HKD', '光馬'], winRate: 0.69 },
                { combo: ['蓋兒', '124', '伊娃', '泳蘿'], winRate: 0.67 },
                { combo: ['光鞭', '蓋兒', '光狙', '木刺'], winRate: 0.71, name: '光鞭核爆' },
                { combo: ['河北', '赤鬼', '闆娘', '水琴'], winRate: 0.69, name: '河北國家隊' },
            ], []);

            const characterOptions = useMemo(() => {
                // 收集所有角色名稱和別稱
                const allOptions = [];
                characterAliases.forEach(char => {
                    // 添加正式名稱
                    allOptions.push(char.name);
                    // 添加英文正式名（讓英文玩家可直接輸入；比對時會收斂回中文正式名）
                    if (char.nameEN) allOptions.push(char.nameEN);
                    // 添加所有別稱
                    char.aliases.forEach(alias => {
                        if (alias && alias !== char.name) {
                            allOptions.push(alias);
                        }
                    });
                });
                // 去重並排序
                return [...new Set(allOptions)].sort();
            }, [characterAliases]);

            // 統計資料
            const stats = useMemo(() => {
                const total = battleRecords.length;
                const wins = battleRecords.filter(r => r.result === '勝').length;
                const winRate = total > 0 ? (wins / total * 100).toFixed(1) : 0;
                return { total, wins, winRate };
            }, [battleRecords]);

            // 核心函數
            const convertAlias = useCallback((input) => {
                return Utils.convertAlias(input, characterAliases);
            }, [characterAliases]);

            const getTeamSuggestions = useCallback((team) => {
                if (team.filter(x => x).length >= 2) {
                    const convertedTeam = team.map(convertAlias);
                    const inputCount = convertedTeam.filter(char => char).length; // 用戶實際輸入的角色數量
                    const allSuggestions = [];
                    
                    // 1. 預設組合建議 - 限制最多2個
                    const defaultSuggestions = commonCombos.filter(combo => 
                        convertedTeam.some(char => char && combo.combo.includes(char))
                    ).map(combo => ({ ...combo, source: 'default' }))
                    .slice(0, 2); // 限制最多2個預設推薦
                    
                    // 2. 近期80筆資料建議 - 根據輸入數量調整匹配要求
                    const recentRecords = battleRecords.slice(-80);
                    const historySuggestions = {};
                    
                    // 根據用戶輸入數量決定最低匹配要求
                    let requiredMatchCount = 2; // 默認至少2個匹配
                    if (inputCount >= 4) {
                        requiredMatchCount = 4; // 4個角色時要求完全匹配
                    } else if (inputCount >= 3) {
                        requiredMatchCount = 3; // 3個角色時要求至少3個匹配
                    }
                    
                    recentRecords.forEach(record => {
                        const recordOpponent = record.opponentTeam.filter(char => char).map(convertAlias);
                        const matchCount = convertedTeam.filter(char => char && recordOpponent.includes(char)).length;
                        
                        // 使用動態的匹配要求
                        if (matchCount >= requiredMatchCount && recordOpponent.length >= 3) {
                            // 改用完整組合作為key，不排序，保持原始順序
                            const comboKey = recordOpponent.join(',');
                            
                            if (!historySuggestions[comboKey]) {
                                historySuggestions[comboKey] = {
                                    combo: recordOpponent,
                                    count: 0,
                                    matchCount: matchCount,
                                    source: 'history'
                                };
                            }
                            
                            historySuggestions[comboKey].count += 1;
                        }
                    });
                    
                    // 轉換歷史建議為標準格式，按匹配度和出現次數排序，限制最多4個
                    const historyArray = Object.values(historySuggestions)
                        .filter(suggestion => suggestion.count >= 1) // 至少出現1次就顯示
                        .map(suggestion => ({
                            combo: suggestion.combo,
                            winRate: suggestion.count / recentRecords.length, // 用於排序的頻率比例
                            count: suggestion.count, // 實際出現次數
                            matchCount: suggestion.matchCount, // 匹配的角色數量
                            source: 'history'
                        }))
                        .sort((a, b) => {
                            // 先按匹配度排序，再按出現次數排序
                            if (a.matchCount !== b.matchCount) {
                                return b.matchCount - a.matchCount;
                            }
                            return b.count - a.count;
                        })
                        .slice(0, 4); // 限制最多4個歷史組合
                    
                    // 合併建議，歷史數據優先
                    allSuggestions.push(...historyArray, ...defaultSuggestions);
                    
                    // 去重：但這次用更精確的邏輯
                    const uniqueSuggestions = [];
                    const seenCombos = new Set();
                    
                    for (const suggestion of allSuggestions) {
                        // 對於去重，還是要排序比較
                        const comboKey = suggestion.combo.slice().sort().join(',');
                        if (!seenCombos.has(comboKey)) {
                            seenCombos.add(comboKey);
                            uniqueSuggestions.push(suggestion);
                        }
                    }
                    
                    // 最終限制：最多6個建議（4個歷史 + 2個預設）
                    setTeamSuggestions(uniqueSuggestions.slice(0, 6));
                } else {
                    setTeamSuggestions([]);
                }
            }, [commonCombos, convertAlias, battleRecords]);

            const getCounterSuggestions = useCallback((opponentTeam, setFn, maxHistory, skipHistory) => {
                const _setFn = setFn || setCounterSuggestions;
                const _maxHistory = maxHistory || 2;
                const fullOpponent = opponentTeam.filter(char => char).map(convertAlias);
                if (fullOpponent.length >= 3) {
                    const opponentKey = fullOpponent.sort().join(',');
                    const exactCounter = counterDatabase[opponentKey];
                    
                    let suggestions = [];
                    
                    if (exactCounter) {
                        suggestions = exactCounter.map(strategy => ({
                            ...strategy,
                            matchLevel: '完全匹配',
                            confidence: 0.95
                        }));
                    }

                    if (!skipHistory) {
                        const threeCharMatches = battleRecords
                            .filter(record => {
                                if (record.result !== '勝') return false;
                                const recordOpponent = record.opponentTeam.filter(char => char).map(convertAlias);
                                const matchCount = fullOpponent.filter(char => recordOpponent.includes(char)).length;
                                return matchCount >= 3 && recordOpponent.length >= 3;
                            })
                            .slice(-68);

                        if (threeCharMatches.length > 0) {
                            const historySuggestions = threeCharMatches.map(record => {
                                const recordOpponent = record.opponentTeam.filter(char => char).map(convertAlias);
                                const matchCount = fullOpponent.filter(char => recordOpponent.includes(char)).length;

                                const notesPart = record.notes ? ` - ${record.notes}` : '';
                                const opponentNamePart = record.opponentName ? `vs ${record.opponentName}` : '';
                                const combinedNotes = opponentNamePart + notesPart || '歷史勝場';

                                if (matchCount === 4) {
                                    return {
                                        combo: record.myTeam,
                                        notes: `${matchCount}/4角色匹配 - ${combinedNotes}`,
                                        matchLevel: '完全匹配',
                                        confidence: 0.95
                                    };
                                } else {
                                    return {
                                        combo: record.myTeam,
                                        notes: `${matchCount}/4角色匹配 - ${combinedNotes}`,
                                        matchLevel: '高度匹配',
                                        confidence: 0.70
                                    };
                                }
                            })
                            .sort((a, b) => b.confidence - a.confidence)
                            .slice(0, _maxHistory);

                            suggestions = [...suggestions, ...historySuggestions];
                        }
                    }

                    // 如果沒有任何匹配或建議較少，添加通用建議（查找模式不補通用建議）
                    if (!skipHistory && suggestions.length < 3) {
                        const generalSuggestions = [
                            { combo: ['水琴', '水馬', '光馬', '水偶'], notes: '水偶肉隊', matchLevel: '通用建議', confidence: 0.55 },
                            { combo: ['河北', '赤鬼', '闆娘', '暗拳'], notes: '河北國家隊', matchLevel: '通用建議', confidence: 0.52 },
                            { combo: ['光鞭', '蓋兒', '光狙', '木刺'], notes: '光鞭核爆', matchLevel: '通用建議', confidence: 0.52 }
                        ];
                        suggestions = [...suggestions, ...generalSuggestions.slice(0, 3 - suggestions.length)];
                    }

                    _setFn(suggestions);
                } else {
                    _setFn([]);
                }
            }, [convertAlias, counterDatabase, battleRecords]);

            const handleLookupChange = useCallback((value, idx) => {
                const newTeam = lookupOpponent.map((c, i) => i === idx ? value : c);
                setLookupOpponent(newTeam);
                getCounterSuggestions(newTeam, setLookupSuggestions, 5, true);
            }, [lookupOpponent, getCounterSuggestions]);

            // 單次上傳函數
            const uploadToCommunity = useCallback(async (record) => {
                if (!communitySettings.enabled || !communitySettings.apiUrl) {
                    console.log('Google Sheets同步未啟用或未配置');
                    return false;
                }

                // 驗證URL
                if (!SecurityUtils.validateGoogleSheetsUrl(communitySettings.apiUrl)) {
                    alert(tg('❌ 不正確的API URL，請檢查您的Google Sheets設定', '❌ Invalid API URL — please check your Google Sheets settings'));
                    return false;
                }

                if (record.uploaded) {
                    console.log('記錄已上傳，跳過');
                    return true;
                }

                try {
                    console.log('正在上傳資料到Google Sheets:', record);
                    
                    // 清理記錄數據 - 上傳時進行最終的清理
                    const sanitizedRecord = {
                        ...record,
                        recorder: SecurityUtils.cleanInput(record.recorder),
                        notes: SecurityUtils.cleanInput(record.notes, true),
                        opponentName: SecurityUtils.cleanInput(record.opponentName, true),
                        opponentTeam: record.opponentTeam.map(SecurityUtils.cleanInput),
                        myTeam: record.myTeam.map(SecurityUtils.cleanInput),
                        result: record.result === '勝' ? '贏' : record.result
                    };
                    
                    // 嘗試上傳到Google Sheets
                    await fetch(communitySettings.apiUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(sanitizedRecord)
                    });

                    // 由於no-cors無法檢查響應狀態，我們假設請求已發送成功
                    const currentTime = new Date().toISOString();
                    
                    // 立即更新本地狀態
                    setBattleRecords(prevRecords => {
                        console.log('更新記錄狀態, ID:', record.id);
                        return prevRecords.map(r => {
                            if (r.id === record.id) {
                                console.log('找到匹配記錄，更新上傳狀態');
                                return { ...r, uploaded: true, uploadedAt: currentTime };
                            }
                            return r;
                        });
                    });

                    setCommunitySettings(prev => ({
                        ...prev,
                        lastSync: currentTime
                    }));
                    
                    console.log('✅ 記錄已標記為上傳完成');
                    return true;
                    
                } catch (error) {
                    console.error('上傳失敗:', error);
                    // 即使發生錯誤，如果是網路問題但請求可能已發送，仍標記為已上傳
                    const currentTime = new Date().toISOString();
                    setBattleRecords(prevRecords => 
                        prevRecords.map(r => 
                            r.id === record.id 
                                ? { ...r, uploaded: true, uploadedAt: currentTime }
                                : r
                        )
                    );
                    setCommunitySettings(prev => ({
                        ...prev,
                        lastSync: currentTime
                    }));
                    return true; // 改為返回true，避免批量上傳中斷
                }
            }, [communitySettings]);

            // 批量上傳函數
            const uploadAllToCommunity = useCallback(async () => {
                if (!communitySettings.enabled || !communitySettings.apiUrl) {
                    alert(tg('請先配置Google Sheets同步功能', 'Please configure Google Sheets sync first'));
                    return;
                }

                // 驗證URL
                if (!SecurityUtils.validateGoogleSheetsUrl(communitySettings.apiUrl)) {
                    alert(tg('❌ 檢測到不正確的API URL，請重新配置', '❌ Invalid API URL detected — please reconfigure'));
                    return;
                }

                if (battleRecords.length === 0) {
                    alert(tg('沒有記錄可以上傳', 'No records to upload'));
                    return;
                }

                const unUploadedRecords = battleRecords.filter(record => !record.uploaded);

                if (unUploadedRecords.length === 0) {
                    alert(tg('🎉 所有記錄都已經上傳完成！', '🎉 All records are already uploaded!'));
                    return;
                }

                const recordSummary = unUploadedRecords.slice(0, 5).map((record, index) =>
                    `${index + 1}. ${SecurityUtils.sanitizeInput(record.recorder)} - ${record.date} (${record.result})`
                ).join('\n');

                const extraCount = unUploadedRecords.length > 5 ? tg(`\n...等共${unUploadedRecords.length}筆`, `\n...and ${unUploadedRecords.length} total`) : '';
                const confirmMessage = tg(
                    `準備批量上傳 ${unUploadedRecords.length} 筆記錄到您的私人Google Sheets：\n\n${recordSummary}${extraCount}\n\n確定要開始上傳嗎？`,
                    `About to batch-upload ${unUploadedRecords.length} record(s) to your private Google Sheets:\n\n${recordSummary}${extraCount}\n\nStart uploading?`
                );

                if (!confirm(confirmMessage)) {
                    return;
                }

                setUploadProgress({ current: 0, total: unUploadedRecords.length, isUploading: true });
                
                let successCount = 0;
                let errorCount = 0;
                
                for (let i = 0; i < unUploadedRecords.length; i++) {
                    const record = unUploadedRecords[i];
                    
                    setUploadProgress(prev => ({ ...prev, current: i + 1 }));
                    
                    try {
                        const success = await uploadToCommunity(record);
                        if (success) {
                            successCount++;
                        } else {
                            errorCount++;
                        }
                        
                        if (i < unUploadedRecords.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 800));
                        }
                    } catch (error) {
                        console.error('批次上傳失敗:', record.id, error);
                        errorCount++;
                    }
                }

                setUploadProgress({ current: 0, total: 0, isUploading: false });

                alert(tg(
                    `批量上傳完成！\n\n✅ 成功上傳：${successCount} 筆\n❌ 失敗/跳過：${errorCount} 筆\n📋 總處理：${successCount + errorCount} 筆\n\n請到您的私人Google Sheets檢查上傳結果`,
                    `Batch upload complete!\n\n✅ Uploaded: ${successCount}\n❌ Failed/skipped: ${errorCount}\n📋 Total processed: ${successCount + errorCount}\n\nCheck your private Google Sheets for the results`
                ));
            }, [communitySettings, battleRecords, uploadToCommunity]);

            // 事件處理函數
            const handleInputChange = useCallback((field, value, index = null) => {
                if (index !== null) {
                    const newArray = [...formData[field]];
                    newArray[index] = SecurityUtils.cleanInput(value);
                    setFormData(prev => ({ ...prev, [field]: newArray }));
                    
                    if (field === 'opponentTeam') {
                        getTeamSuggestions(newArray);
                        getCounterSuggestions(newArray);
                    }
                } else {
                    // 對於備註和對手名稱欄位，允許空白，其他欄位清理
                    let cleanValue;
                    if (field === 'notes' || field === 'opponentName') {
                        cleanValue = SecurityUtils.cleanInput(value, true);
                        // 對手名稱限制16個字符
                        if (field === 'opponentName' && cleanValue.length > 16) {
                            cleanValue = cleanValue.substring(0, 16);
                        }
                    } else {
                        cleanValue = SecurityUtils.cleanInput(value);
                    }
                    setFormData(prev => ({ ...prev, [field]: cleanValue }));
                }
            }, [formData, getTeamSuggestions, getCounterSuggestions]);

            const applySuggestion = useCallback((suggestion, isOpponent = true) => {
                const field = isOpponent ? 'opponentTeam' : 'myTeam';
                const combo = suggestion.combo || suggestion;
                const sanitizedCombo = combo.map(SecurityUtils.sanitizeInput);
                setFormData(prev => ({ ...prev, [field]: sanitizedCombo }));
                if (isOpponent) {
                    getCounterSuggestions(sanitizedCombo);
                }
            }, [getCounterSuggestions]);

            const handleSubmit = useCallback(() => {
                if (!formData.result || !formData.rank) {
                    alert(tg('請填寫完整的勝負結果和排位信息', 'Please fill in the result and rank'));
                    return;
                }

                const newRecord = {
                    id: Date.now(),
                    opponentTeam: formData.opponentTeam.map(char => convertAlias(SecurityUtils.cleanInput(char))),
                    myTeam: formData.myTeam.map(char => convertAlias(SecurityUtils.cleanInput(char))),
                    result: SecurityUtils.cleanInput(formData.result),
                    opponentName: SecurityUtils.cleanInput(formData.opponentName, true).substring(0, 16), // 限制16字符
                    notes: SecurityUtils.cleanInput(formData.notes, true), // 保存時允許空白
                    rank: SecurityUtils.cleanInput(formData.rank),
                    date: SecurityUtils.cleanInput(formData.date),
                    recorder: SecurityUtils.cleanInput(formData.recorder),
                    uploaded: false,
                    uploadedAt: null
                };
                
                setBattleRecords(prev => [...prev, newRecord]);
                
                // 保持記錄者和排位
                const lastRank = formData.rank;
                const lastRecorder = formData.recorder;
                
                setFormData({
                    opponentTeam: ['', '', '', ''],
                    myTeam: ['', '', '', ''],
                    result: '勝', // 重置為預設勝利
                    opponentName: '', // 重置對手名稱
                    notes: '',
                    rank: lastRank,
                    date: new Date().toISOString().split('T')[0],
                    recorder: lastRecorder
                });
                
                setTeamSuggestions([]);
                setCounterSuggestions([]);

                alert(tg('✅ 紀錄已保存！', '✅ Record saved!'));
            }, [formData, convertAlias]);

            const handleUploadSingle = useCallback(() => {
                if (!formData.result || !formData.rank) {
                    alert(tg('請先填寫完整資訊並保存紀錄', 'Please complete and save the record first'));
                    return;
                }
                const record = {
                    opponentTeam: formData.opponentTeam.map(char => convertAlias(SecurityUtils.cleanInput(char))),
                    myTeam: formData.myTeam.map(char => convertAlias(SecurityUtils.cleanInput(char))),
                    result: SecurityUtils.cleanInput(formData.result),
                    opponentName: SecurityUtils.cleanInput(formData.opponentName, true).substring(0, 16),
                    notes: SecurityUtils.cleanInput(formData.notes, true),
                    rank: SecurityUtils.cleanInput(formData.rank),
                    date: SecurityUtils.cleanInput(formData.date),
                    recorder: SecurityUtils.cleanInput(formData.recorder),
                    uploaded: false,
                    uploadedAt: null
                };
                uploadToCommunity(record);
            }, [formData, convertAlias, uploadToCommunity]);

            const addToCounterDatabase = useCallback((record) => {
                const opponentTeam = record.opponentTeam.filter(char => char).map(convertAlias);
                const myTeam = record.myTeam.filter(char => char);
                
                if (opponentTeam.length < 3) {
                    alert(tg('對手陣容角色數量不足', 'Not enough opponent characters'));
                    return;
                }

                const key = opponentTeam.sort().join(',');

                let shouldAdd = true;
                if (counterDatabase[key]) {
                    shouldAdd = confirm(tg(`已存在針對「${opponentTeam.join('+')}」的反制策略，是否覆蓋？`, `A counter strategy already exists for "${opponentTeam.join('+')}". Overwrite?`));
                }

                if (shouldAdd) {
                    const strategy = {
                        combo: myTeam,
                        notes: record.notes ? tg(`${SecurityUtils.cleanInput(record.notes, true)} (來自歷史)`, `${SecurityUtils.cleanInput(record.notes, true)} (from history)`) : tg(`${record.date} 勝場策略`, `${record.date} win strategy`)
                    };

                    setCounterDatabase(prev => ({
                        ...prev,
                        [key]: [strategy]
                    }));

                    alert(tg(`✅ 已將勝場策略加入反制資料庫！\n對手：${opponentTeam.join('+')}\n反制：${myTeam.join('+')}`, `✅ Win strategy added to the counter database!\nOpponent: ${opponentTeam.join('+')}\nCounter: ${myTeam.join('+')}`));
                }
            }, [convertAlias, counterDatabase]);

            const loadCommunityDB = useCallback(async () => {
                setCommunityDB(prev => ({ ...prev, loading: true }));
                try {
                    const resp = await fetch(COMMUNITY_GVG_URL + '?t=' + Date.now());
                    if (!resp.ok) throw new Error(tg('無法讀取社群資料庫', 'Could not load the community database'));
                    const json = await resp.json();
                    if (!json.counterDatabase || typeof json.counterDatabase !== 'object') {
                        throw new Error(tg('資料格式錯誤', 'Invalid data format'));
                    }
                    setCommunityDB({
                        loaded: true,
                        loading: false,
                        mode: json.mode || 'gvg_3v3',
                        description: json.description || '',
                        generated: json.generated || '',
                        source_records: json.source_records || 0,
                        data: json.counterDatabase
                    });
                    // merge 進 counterDatabase：玩家自訂排前，社群補充排後（同組合去重）
                    setCounterDatabase(prev => {
                        const merged = { ...json.counterDatabase };
                        Object.keys(prev).forEach(k => {
                            if (merged[k]) {
                                const userCombos = new Set(prev[k].map(s => (s.combo || []).join(',')));
                                merged[k] = [
                                    ...prev[k],
                                    ...merged[k].filter(s => !userCombos.has((s.combo || []).join(',')))
                                ];
                            } else {
                                merged[k] = prev[k];
                            }
                        });
                        return merged;
                    });
                    alert(tg('✅ 社群GvG資料庫已載入！\n來源筆數：', '✅ Community GvG database loaded!\nSource records: ') + (json.source_records || '?') + tg('\n產生日期：', '\nGenerated: ') + (json.generated || '?'));
                } catch (err) {
                    setCommunityDB(prev => ({ ...prev, loading: false }));
                    alert(tg('❌ 載入失敗：', '❌ Load failed: ') + err.message);
                }
            }, []);

            const clearCommunityDB = useCallback(() => {

                if (!confirm(tg('確定要清除社群GvG資料庫？您手動新增的策略不受影響。', 'Clear the community GvG database? Strategies you added manually are not affected.'))) return;
                setCounterDatabase(prev => {
                    const communityKeys = new Set(Object.keys(communityDB.data));
                    const cleaned = {};
                    Object.keys(prev).forEach(k => { if (!communityKeys.has(k)) cleaned[k] = prev[k]; });
                    return cleaned;
                });
                setCommunityDB({ loaded: false, loading: false, mode: null, description: null, generated: null, source_records: 0, data: {} });

            const deleteRecord = useCallback((recordId) => {

                    alert(tg('✅ 記錄已刪除！', '✅ Record deleted!'));
                }
            }, []);

            // 新增：按日期批量刪除記錄
            const deleteBatchByDate = useCallback((beforeDate) => {
                if (!beforeDate) {
                    alert(tg('請選擇日期', 'Please select a date'));
                    return;
                }

                // 過濾出要刪除的記錄
                const recordsToDelete = battleRecords.filter(record => {
                    const recordDate = new Date(record.date + 'T00:00:00');
                    const cutoffDate = new Date(beforeDate + 'T00:00:00');
                    return recordDate < cutoffDate;
                });

                if (recordsToDelete.length === 0) {
                    alert(tg('📅 沒有找到符合條件的記錄', '📅 No matching records found'));
                    return;
                }

                // 統計信息
                const uploadedCount = recordsToDelete.filter(r => r.uploaded).length;
                const notUploadedCount = recordsToDelete.length - uploadedCount;

                // 顯示詳細確認信息
                const previewList = recordsToDelete.slice(0, 5).map((record, index) =>
                    `${index + 1}. ${record.date} - ${SecurityUtils.sanitizeInput(record.recorder)} (${record.result}) ${record.uploaded ? '✅' : '⏳'}`
                ).join('\n');
                const confirmMessage = tg(
`⚠️ 準備刪除 ${beforeDate} 之前的所有對戰記錄：

📊 刪除統計：
• 總計：${recordsToDelete.length} 筆記錄
• 已上傳：${uploadedCount} 筆
• 未上傳：${notUploadedCount} 筆

📋 最近幾筆記錄預覽：
${previewList}${recordsToDelete.length > 5 ? `\n...等共${recordsToDelete.length}筆` : ''}

⚠️ 此操作將永久刪除這些記錄，無法復原！
建議在刪除前先進行完整備份。

確定要繼續嗎？`,
`⚠️ About to delete all battle records before ${beforeDate}:

📊 Deletion summary:
• Total: ${recordsToDelete.length} record(s)
• Uploaded: ${uploadedCount}
• Not uploaded: ${notUploadedCount}

📋 Preview of recent records:
${previewList}${recordsToDelete.length > 5 ? `\n...and ${recordsToDelete.length} total` : ''}

⚠️ This permanently deletes these records and cannot be undone!
A full backup before deleting is recommended.

Continue?`);

                if (!confirm(confirmMessage)) {
                    return;
                }

                // 二次確認
                if (!confirm(tg(`🔴 最後確認：您即將刪除 ${recordsToDelete.length} 筆記錄（包含 ${uploadedCount} 筆已上傳記錄）\n\n此操作不可復原，確定繼續嗎？`, `🔴 Final confirmation: you are about to delete ${recordsToDelete.length} record(s) (including ${uploadedCount} already uploaded)\n\nThis cannot be undone. Continue?`))) {
                    return;
                }

                // 執行刪除
                setBattleRecords(prev => {
                    const recordIdsToDelete = new Set(recordsToDelete.map(r => r.id));
                    const newRecords = prev.filter(record => !recordIdsToDelete.has(record.id));
                    
                    // 在狀態更新後顯示完成訊息
                    setTimeout(() => {
                        alert(tg(`✅ 批量刪除完成！\n\n📊 刪除統計：\n• 總計：${recordsToDelete.length} 筆\n• 已上傳：${uploadedCount} 筆\n• 未上傳：${notUploadedCount} 筆\n\n剩餘記錄：${newRecords.length} 筆`, `✅ Batch delete complete!\n\n📊 Summary:\n• Total: ${recordsToDelete.length}\n• Uploaded: ${uploadedCount}\n• Not uploaded: ${notUploadedCount}\n\nRemaining records: ${newRecords.length}`));
                    }, 0);
                    
                    return newRecords;

            }, [battleRecords]);

            const resetData = useCallback(() => {

                    // 清理localStorage
                    const keysToRemove = [
                        'arkrecode_dataVersion', 'arkrecode_battleRecords', 
                        'arkrecode_characterAliases', 'arkrecode_counterDatabase', 
                        'arkrecode_communitySettings', 'arkrecode_disclaimer_accepted',
                        'arkrecode_formData'
                    ];

                            console.error('清理localStorage失敗:', error);
                        }
                    });

                    setCommunitySettings({ enabled: false, apiUrl: '', lastSync: null });
                    alert(tg('資料已重置！', 'Data has been reset!'));

            const importData = useCallback((event) => {
                const file = event.target.files[0];

                // 檢查文件大小（最大10MB）

                    event.target.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        // 驗證導入的數據
                        if (data.battleRecords && Array.isArray(data.battleRecords)) {
                            const sanitizedRecords = data.battleRecords.map(record => ({
                                ...record,
                                recorder: SecurityUtils.cleanInput(record.recorder || ''),
                                notes: SecurityUtils.cleanInput(record.notes || '', true),
                                opponentName: SecurityUtils.cleanInput(record.opponentName || '', true).substring(0, 16),
                                opponentTeam: (record.opponentTeam || []).map(SecurityUtils.cleanInput),
                                myTeam: (record.myTeam || []).map(SecurityUtils.cleanInput),
                                // 簡單轉換：贏 -> 勝
                                result: record.result === '贏' ? '勝' : record.result
                            }));
                            setBattleRecords(sanitizedRecords);
                        }
                        
                        if (data.userAliases && typeof data.userAliases === 'object') {
                            const ext = {};
                            Object.keys(data.userAliases.extras || {}).forEach(k => {
                                ext[SecurityUtils.cleanInput(k)] = (data.userAliases.extras[k] || []).map(a => SecurityUtils.cleanInput(a)).filter(Boolean);
                            });
                            const cus = (data.userAliases.customs || []).map(c => ({
                                name: SecurityUtils.cleanInput(c.name || ''),
                                aliases: (c.aliases || []).map(SecurityUtils.cleanInput).filter(Boolean)
                            })).filter(c => c.name);
                            setUserAliases(sanitizeUserAliases({ extras: ext, customs: cus }));
                        } else if (data.characterAliases && Array.isArray(data.characterAliases)) {
                            // 舊版備份：整份別稱 → 轉成疊加式
                            const legacy = data.characterAliases.map(alias => ({
                                name: SecurityUtils.cleanInput(alias.name || ''),
                                aliases: (alias.aliases || []).map(SecurityUtils.cleanInput)
                            }));
                            setUserAliases(deriveUserAliasesFromLegacy(legacy));
                        }
                        
                        if (data.counterDatabase && typeof data.counterDatabase === 'object') {
                            setCounterDatabase(data.counterDatabase);
                        }
                        
                        if (data.communitySettings && typeof data.communitySettings === 'object') {
                            // 驗證Google Sheets URL
                            if (data.communitySettings.apiUrl && !SecurityUtils.validateGoogleSheetsUrl(data.communitySettings.apiUrl)) {
                                alert(tg('⚠️ 導入的Google Sheets URL不正確，已清除該設定', '⚠️ The imported Google Sheets URL is invalid and has been cleared'));
                                setCommunitySettings({ ...data.communitySettings, apiUrl: '' });
                            } else {
                                setCommunitySettings(data.communitySettings);
                            }
                        }

                        alert(tg('✅ 資料已導入！', '✅ Data imported!'));
                    } catch (error) {
                        console.error('導入資料錯誤:', error);
                        alert(tg('❌ 導入失敗：文件格式錯誤', '❌ Import failed: invalid file format'));
                    }
                };
                reader.onerror = () => {
                    alert(tg('❌ 檔案讀取失敗', '❌ Failed to read file'));
                };
                reader.readAsText(file);
                event.target.value = '';
            }, []);

            // 檢查免責聲明接受狀態
            useEffect(() => {
                const accepted = localStorage.getItem('arkrecode_disclaimer_accepted');
                if (accepted === 'true') {
                    setDisclaimerAccepted(true);
                }
                
                // 檢查瀏覽器存儲支援
                if (!SecurityUtils.checkStorageSupport()) {
                    alert(tg('⚠️ 您的瀏覽器不支援本地存儲，建議使用現代瀏覽器以確保最佳體驗', '⚠️ Your browser does not support local storage. Please use a modern browser for the best experience'));
                }
            }, []);

            // 接受免責聲明
            const handleAcceptDisclaimer = useCallback(() => {
                localStorage.setItem('arkrecode_disclaimer_accepted', 'true');
                setDisclaimerAccepted(true);
                alert(tg('✅ 歡迎使用 ArkRecode v2.9.2！您的資料將存儲在本機瀏覽器中。', '✅ Welcome to ArkRecode v2.9.2! Your data is stored locally in your browser.'));
            }, []);

            // 拒絕免責聲明
            const handleDeclineDisclaimer = useCallback(() => {
                alert(tg('感謝您的關注，為了您的安全，請在充分了解風險後再使用本工具。', 'Thanks for your interest. For your safety, please use this tool only after fully understanding the risks.'));
            }, []);

            // 資料持久化
            useEffect(() => {
                if (!disclaimerAccepted) return;
                
                try {
                    const savedRecords = localStorage.getItem('arkrecode_battleRecords');
                    const savedUserAliases = localStorage.getItem('arkrecode_userAliases');
                    const savedLegacyAliases = localStorage.getItem('arkrecode_characterAliases');
                    const savedCounters = localStorage.getItem('arkrecode_counterDatabase');
                    const savedCommunitySettings = localStorage.getItem('arkrecode_communitySettings');
                    const savedFormData = localStorage.getItem('arkrecode_formData');
                    const dataVersion = localStorage.getItem('arkrecode_dataVersion');
                    const hasVisitedBefore = localStorage.getItem('arkrecode_hasVisited');
                    
                    if (savedRecords) {
                        try {
                            const records = SecurityUtils.deobfuscateData(savedRecords);
                            if (records && Array.isArray(records)) {
                                const updatedRecords = records.map(record => ({
                                    ...record,
                                    uploaded: record.uploaded !== undefined ? record.uploaded : false,
                                    uploadedAt: record.uploadedAt || null,
                                    // 簡單轉換：贏 -> 勝
                                    result: record.result === '贏' ? '勝' : record.result
                                }));
                                
                                setBattleRecords(updatedRecords);
                                console.log(`載入 ${updatedRecords.length} 筆對戰紀錄`);
                            }
                            
                            if (!['2.7.0', '2.7.1', '2.8.0', '2.9.0', '2.9.1', '2.9.2'].includes(dataVersion)) {
                                // 舊版升級：清除別名快取
                                localStorage.removeItem('arkrecode_characterAliases');
                                console.log('已清除舊版別名快取，套用 v2.9.2 預設別名');
                            }
                            if (dataVersion !== '2.9.2') {
                                console.log(`版本從 ${dataVersion || '舊版'} 升級到 2.9.2`);
                                localStorage.setItem('arkrecode_dataVersion', '2.9.2');
                            }
                            
                        } catch (parseError) {
                            console.error('解析儲存資料失敗:', parseError);
                            if (hasVisitedBefore && confirm(tg('⚠️ 偵測到儲存資料可能損壞！\n是否要重置為預設資料？\n\n點擊「確定」重置，「取消」保持空白資料', '⚠️ Your saved data may be corrupted!\nReset to default data?\n\nClick "OK" to reset, "Cancel" to keep empty data'))) {
                                setBattleRecords([
                                    {
                                        id: Date.now() - 3000,
                                        recorder: '測試',
                                        date: '2025-08-01',
                                        opponentTeam: ['光鞭', '蓋兒', '光狙', '血卡'],
                                        myTeam: ['水拳', '水馬', '水琴', 'LLB'],
                                        result: '勝',
                                        rank: '挑戰者',
                                        notes: '測試記錄',
                                        opponentName: '測試對手',
                                        uploaded: false,
                                        uploadedAt: null
                                    }
                                ]);
                            }
                        }
                    } else {
                        if (!hasVisitedBefore) {
                            console.log('👋 歡迎首次使用 ArkRecode v2.9.2！');
                            setBattleRecords([]);
                            localStorage.setItem('arkrecode_hasVisited', 'true');
                        }
                        localStorage.setItem('arkrecode_dataVersion', '2.7.1');
                    }
                    
                    if (savedUserAliases) {
                        try {
                            const u = SecurityUtils.deobfuscateData(savedUserAliases);
                            if (u && typeof u === 'object') {
                                setUserAliases(sanitizeUserAliases({ extras: u.extras || {}, customs: u.customs || [] }));
                            }
                        } catch (error) {
                            console.warn('使用者別稱載入失敗，使用母檔預設值');
                        }
                    } else if (savedLegacyAliases) {
                        // 從舊版「整份取代」資料一次性遷移成疊加式
                        try {
                            const legacy = SecurityUtils.deobfuscateData(savedLegacyAliases);
                            if (Array.isArray(legacy)) {
                                setUserAliases(sanitizeUserAliases(deriveUserAliasesFromLegacy(legacy)));
                            }
                        } catch (error) {
                            console.warn('舊別稱資料遷移失敗，使用母檔預設值');
                        }
                    }
                    
                    if (savedCounters) {
                        try {
                            const counters = SecurityUtils.deobfuscateData(savedCounters);
                            if (counters && typeof counters === 'object') {
                                setCounterDatabase(counters);

                        } catch (error) {
                            console.warn('反制策略資料載入失敗，使用預設值');
                        }
                    }

                    if (savedCommunitySettings) {
                        try {
                            const settings = SecurityUtils.deobfuscateData(savedCommunitySettings);
                            if (settings && typeof settings === 'object') {
                                // 驗證Google Sheets URL
                                if (settings.apiUrl && !SecurityUtils.validateGoogleSheetsUrl(settings.apiUrl)) {
                                    console.warn('檢測到不正確的Google Sheets URL，已清除');
                                    setCommunitySettings({ ...settings, apiUrl: '', enabled: false });
                                } else {
                                    setCommunitySettings(settings);
                                }
                            }
                        } catch (error) {
                            console.warn('社群設定載入失敗，使用預設值');
                        }
                    }

                    // 載入保存的表單數據（記錄者和排位）
                    if (savedFormData) {
                        try {
                            const formDataSaved = SecurityUtils.deobfuscateData(savedFormData);
                            if (formDataSaved && typeof formDataSaved === 'object') {
                                setFormData(prev => ({
                                    ...prev,
                                    recorder: SecurityUtils.cleanInput(formDataSaved.recorder || prev.recorder),
                                    rank: SecurityUtils.cleanInput(formDataSaved.rank || prev.rank)
                                }));
                            }
                        } catch (error) {
                            console.warn('表單資料載入失敗，使用預設值');
                        }
                    }
                    
                    if (!hasVisitedBefore) {
                        localStorage.setItem('arkrecode_hasVisited', 'true');
                    }
                    
                } catch (error) {
                    console.error('整體載入資料失敗:', error);
                    alert(tg('⚠️ 資料載入時發生錯誤，可能需要重置應用程式', '⚠️ An error occurred while loading data — you may need to reset the app'));
                }
            }, [disclaimerAccepted]);

            // 自動保存
            useEffect(() => {
                if (!disclaimerAccepted) return;
                
                try {
                    const obfuscatedData = SecurityUtils.obfuscateData(battleRecords);
                    localStorage.setItem('arkrecode_battleRecords', obfuscatedData);
                } catch (error) {
                    console.error('保存對戰記錄失敗:', error);
                }
            }, [battleRecords, disclaimerAccepted]);

            useEffect(() => {
                if (!disclaimerAccepted) return;
                
                try {
                    const obfuscatedData = SecurityUtils.obfuscateData(userAliases);
                    localStorage.setItem('arkrecode_userAliases', obfuscatedData);
                } catch (error) {
                    console.error('保存使用者別稱失敗:', error);
                }
            }, [userAliases, disclaimerAccepted]);
            
            useEffect(() => {
                if (!disclaimerAccepted) return;
                
                try {
                    const obfuscatedData = SecurityUtils.obfuscateData(counterDatabase);
                    localStorage.setItem('arkrecode_counterDatabase', obfuscatedData);
                } catch (error) {
                    console.error('保存反制資料庫失敗:', error);
                }
            }, [counterDatabase, disclaimerAccepted]);

            useEffect(() => {
                if (!disclaimerAccepted) return;
                
                try {
                    const obfuscatedData = SecurityUtils.obfuscateData(communitySettings);
                    localStorage.setItem('arkrecode_communitySettings', obfuscatedData);
                } catch (error) {
                    console.error('保存社群設定失敗:', error);
                }
            }, [communitySettings, disclaimerAccepted]);

            useEffect(() => {

                    };

                    localStorage.setItem('arkrecode_formData', obfuscatedData);

                    console.error('保存表單資料失敗:', error);

            }, [formData.recorder, formData.rank, disclaimerAccepted]);

            // 如果尚未接受免責聲明，顯示免責聲明對話框
            if (!disclaimerAccepted) {

                    </I18nContext.Provider>
                );

            // 渲染主應用
