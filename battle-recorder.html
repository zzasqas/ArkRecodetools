        /* 自訂義Lucide圖標 */
        .lucide-icon {

            height: 1em;

            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* 備註欄位tooltip樣式 */
        .notes-cell {
            position: relative;
            cursor: help;
        }
        
        .notes-cell .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 16px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.05s, visibility 0.05s;
            z-index: 1000;
            min-width: 280px;
            max-width: 700px;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
        }

        .notes-cell .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1f2937;
        }

        .notes-cell:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        .notes-ellipsis {
            color: #60a5fa;
            font-weight: 700;
            margin-left: 2px;
            font-size: 11px;

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // ==================== 多語系 i18n ====================
        // 角色中文名 → 英文名：由共用母檔 char-name-data.js 的 nameEN 動態建立（單一資料來源）
        // 新增角色只需更新 char-name-data.js，這裡會自動同步；未收錄 nameEN 者 fallback 顯示中文
        const CHAR_NAME_EN = (() => {
            const map = {};
            const list = window.CHARACTER_ALIASES || [];
            // 先用別稱建立（讓改名/別稱也能翻譯，如 彩伽→Saika），再用正式名覆蓋（正式名優先，避免同名別稱誤譯）
            list.forEach(c => { if (c && c.nameEN && Array.isArray(c.aliases)) c.aliases.forEach(a => { if (a) map[a] = c.nameEN; }); });
            list.forEach(c => { if (c && c.name && c.nameEN) map[c.name] = c.nameEN; });
            return map;
        })();

        // 母檔（單一資料來源）：正式中英文名 + 預設別稱。使用者自訂只疊加於此之上，不取代。
        const MASTER_ALIASES = window.CHARACTER_ALIASES || [];
        // 母檔所有「正式名」與「別稱」集合：用來判斷某名稱是否其實已屬於母檔角色
        const MASTER_NAME_SET = new Set();
        const MASTER_ALIAS_SET = new Set();
        MASTER_ALIASES.forEach(c => { MASTER_NAME_SET.add(c.name); (c.aliases || []).forEach(a => { if (a) MASTER_ALIAS_SET.add(a); }); });
        // 清理使用者別稱：濾掉「其實是母檔角色（正式名或別稱）」的自訂角色，避免重複/雜訊
        const sanitizeUserAliases = (ua) => {
            const extras = (ua && ua.extras) ? ua.extras : {};
            const customs = ((ua && ua.customs) ? ua.customs : []).filter(c =>
                c && c.name && !MASTER_NAME_SET.has(c.name) && !MASTER_ALIAS_SET.has(c.name)
            );
            return { extras, customs };
        };
        // 把舊版「整份取代」的別稱資料，轉成疊加式（只保留使用者真正多加的別稱與全新角色）
        const deriveUserAliasesFromLegacy = (legacy) => {
            const byName = {};
            MASTER_ALIASES.forEach(c => { byName[c.name] = c; });
            const extras = {}; const customs = [];
            (legacy || []).forEach(c => {
                if (!c || !c.name) return;
                const m = byName[c.name];
                if (m) {
                    const add = (c.aliases || []).filter(a => a && !m.aliases.includes(a));
                    if (add.length) extras[c.name] = add;
                } else if (!MASTER_ALIAS_SET.has(c.name)) {
                    // 名稱不是母檔正式名、也不是母檔別稱 → 才視為真正的自訂角色
                    customs.push({ name: c.name, aliases: (c.aliases || []).filter(Boolean) });
                }
                // 否則：名稱其實是某母檔角色的別稱 → 略過（別稱已在母檔內）
            });
            return { extras, customs };
        };
        // 排位等級顯示對照（儲存值維持中文，僅切換顯示）
        const RANK_EN = { '金牌': 'Gold', '大師': 'Master', '挑戰者': 'Challenger', '優勝者': 'Champion', '前100': 'Top 100' };
        // 匹配度顯示對照（儲存值維持中文，僅切換顯示）
        const MATCH_EN = { '完全匹配': 'Exact match', '高度匹配': 'High match', '部分匹配': 'Partial match', '通用建議': 'General' };

        const I18nContext = React.createContext({
            lang: 'zh',
            t: (zh) => zh,
            cn: (name) => name,
            rank: (r) => r,
            match: (m) => m,
        });
        const useI18n = () => React.useContext(I18nContext);

        // 給非 React 環境（Utils、alert/confirm 等命令式訊息）使用的全域語言鏡像
        let CURRENT_LANG = localStorage.getItem('arkrecode_lang') || 'zh';
        window.addEventListener('arkrecode-lang', e => { CURRENT_LANG = e.detail; });
        const tg = (zh, en) => (CURRENT_LANG === 'en' && en !== undefined ? en : zh);
        // 非 React 環境（如 CSV 匯出）用：依目前語言把角色中文正式名轉英文
        const cng = (name) => (CURRENT_LANG === 'en' ? (CHAR_NAME_EN[name] || name) : name);

        // ==================== 工具函數 ====================
        const SecurityUtils = {
            // 基本輸入清理 - 用於實時輸入，備註欄位允許空白
            cleanInput: (input, allowSpaces = false) => {
                if (typeof input !== 'string') return input;
                let cleaned = input
                    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '') // 移除腳本
                    .replace(/<[^>]*>/g, ''); // 移除HTML標籤
                
                if (!allowSpaces) {
                    cleaned = cleaned.trim();
                } else {
                    // 備註欄位：允許空白但限制連續空白最多1個
                    cleaned = cleaned.replace(/\s{2,}/g, ' ');
                }
                
                return cleaned;
            },

            // XSS防護：清理用戶輸入 - 用於存儲和顯示
            sanitizeInput: (input) => {
                if (typeof input !== 'string') return input;
                return input
                    .replace(/&/g, '&amp;')  // 必須先處理 & 符號
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#x27;')
                    .replace(/\//g, '&#x2F;')
                    .trim();
            },

            // 清理HTML內容 - 用於顯示
            sanitizeHtml: (html) => {
                if (typeof html !== 'string') return html;
                return html
                    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
                    // 解碼常用的HTML實體
                    .replace(/&#x2F;/g, '/')
                    .replace(/&#x27;/g, "'")
                    .replace(/&quot;/g, '"')
                    .replace(/&lt;/g, '<')
                    .replace(/&gt;/g, '>')
                    .replace(/&amp;/g, '&');
            },

            // 驗證Google Sheets URL
            validateGoogleSheetsUrl: (url) => {
                if (!url || typeof url !== 'string') return false;
                
                try {
                    const urlObj = new URL(url);
                    const allowedHosts = [
                        'script.google.com',
                        'script.googleapis.com'
                    ];

                    if (urlObj.protocol !== 'https:') return false;
                    return allowedHosts.some(host =>
                        urlObj.hostname === host || urlObj.hostname.endsWith('.' + host)
                    );
                } catch {
                    return false;
                }
            },

            // 數據混淆（基礎保護）
            obfuscateData: (data) => {
                try {
                    return btoa(JSON.stringify(data));
                } catch {
                    return JSON.stringify(data);
                }
            },

            deobfuscateData: (data) => {
                try {
                    return JSON.parse(atob(data));
                } catch {
                    try {
                        return JSON.parse(data);
                    } catch {
                        return null;
                    }
                }
            },

            // 檢查瀏覽器存儲支援
            checkStorageSupport: () => {
                try {
                    const testKey = '__storage_test__';
                    localStorage.setItem(testKey, 'test');
                    localStorage.removeItem(testKey);
                    return true;
                } catch {
                    return false;
                }
            }
        };

                                <li>• {t(<>建議在<strong>私人設備</strong>上使用，避免在公用電腦操作</>, <>Use on a <strong>private device</strong>; avoid public computers</>)}</li>
                            </ul>

                            <ul className="text-sm text-green-600 space-y-1">

                                <li>• {t('如發現異常行為，請立即停止使用並清除資料', 'If you notice anything abnormal, stop using it immediately and clear your data')}</li>
                                <li>• {t('建議使用最新版本的現代瀏覽器', 'Use the latest version of a modern browser')}</li>
                            </ul>
                        </div>

                        <div className="disclaimer-section">
                            <h3 className="font-semibold text-purple-700 mb-2">{t('📞 聯絡資訊', '📞 Contact')}</h3>
                            <div className="text-sm text-gray-600">
                                <p>{t('如有問題或建議，歡迎回饋：', 'Questions or suggestions are welcome:')}</p>
                                <ul className="mt-2 space-y-1">
                                    <li>• {t('開發者：zzas', 'Developer: zzas')}</li>
                                    <li>• {t('版本：v2.9.2', 'Version: v2.9.2')}</li>
                                    <li>• {t('更新日期：', 'Updated: ')}{new Date().toLocaleDateString(t('zh-TW', 'en-US'))}</li>
                                </ul>
                            </div>
                        </div>

                        <div className="mt-6 flex gap-4 justify-end">
                            <button
                                onClick={onDecline}
                                className="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors"
                            >
                                {t('不同意，離開', 'Decline & Leave')}
                            </button>
                            <button
                                onClick={onAccept}
                                className="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors font-semibold"
                            >
                                {t('我已閱讀並同意上述條款', 'I have read and agree to the terms')}
                            </button>
                        </div>

                        <div className="mt-4 text-xs text-gray-500 text-center">
                            {t('點擊「我已閱讀並同意上述條款」即表示您已充分理解並接受所有使用條款與風險', 'Clicking "I have read and agree to the terms" confirms that you fully understand and accept all terms of use and risks')}
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== 圖標組件 ====================
        const IconComponents = {
            Plus: ({ size = 16, className = "" }) => (
                <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5v14"/>

            ),
            Settings: ({ size = 16, className = "" }) => (
                <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                    <circle cx="12" cy="12" r="3"/>

                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7,10 12,15 17,10"/>
                    <line x1="12" x2="12" y1="15" y2="3"/>
                </svg>
            ),
            Target: ({ size = 16, className = "" }) => (
                <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="6"/>
                    <circle cx="12" cy="12" r="2"/>
                </svg>
            ),
            Shield: ({ size = 16, className = "" }) => (
                <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            ),
            Calculator: ({ size = 16, className = "" }) => (
                <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24">
                    <rect width="16" height="20" x="4" y="2" rx="2"/>
                    <line x1="8" x2="16" y1="6" y2="6"/>
                    <line x1="16" x2="16" y1="14" y2="18"/>
                    <path d="m16 10-4 4-4-4"/>
                </svg>
            ),
            Trash: ({ size = 16, className = "" }) => (
                <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24">
                    <path d="M3 6h18"/>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                </svg>
            ),
            Users: ({ size = 16, className = "" }) => (
                <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            )
        };

        // ==================== 速度計算器組件 ====================
        const SpeedCalculator = React.memo(({ isVisible, onClose }) => {
            const { t } = useI18n();
            const [inputs, setInputs] = useState({
                ally: { speed: "", random: "", initial: "" },
                opponent1: { random: "", initial: "" },
                opponent2: { random: "", initial: "" },
                opponent3: { random: "", initial: "" }
            });
            const [results, setResults] = useState([]);

            const handleInputChange = useCallback((character, field, value) => {
                const cleanValue = SecurityUtils.cleanInput(value);
                setInputs((prev) => ({
                    ...prev,
                    [character]: { ...prev[character], [field]: cleanValue },
                }));
            }, []);

            const calculateOpponentSpeeds = useCallback(() => {
                const { ally, ...opponents } = inputs;
                
                // 檢查基本必填欄位
                if (!ally.speed || !ally.initial) {
                    alert(t('請填寫我方的速度和初始行動值！', 'Please enter your ally\'s speed and initial action value!'));
                    return;
                }
                
                const allySpeed = parseFloat(ally.speed);
                const allyInitial = parseFloat(ally.initial);
                const allyRandom = ally.random === "" ? null : parseFloat(ally.random);
                
                if (isNaN(allySpeed) || isNaN(allyInitial)) {
                    alert(t('請確認我方數據填寫正確！', 'Please make sure your ally\'s data is entered correctly!'));
                    return;
                }

                // 計算我方的速度比例範圍
                let allySpeedRatioMin, allySpeedRatioMax;
                
                if (allyRandom !== null) {
                    // 我方隨機值已知，精確計算
                    const allyActualInitial = allyInitial - allyRandom;
                    const allySpeedRatio = allySpeed / allyActualInitial;
                    allySpeedRatioMin = allySpeedRatioMax = allySpeedRatio;
                } else {
                    // 我方隨機值未知，假設0-5範圍
                    const allyActualInitialMin = allyInitial - 5; // 隨機值最大為5
                    const allyActualInitialMax = allyInitial - 0; // 隨機值最小為0
                    allySpeedRatioMin = allySpeed / allyActualInitialMax;
                    allySpeedRatioMax = allySpeed / allyActualInitialMin;
                }

                if (!isFinite(allySpeedRatioMin) || !isFinite(allySpeedRatioMax)) {
                    alert(t('計算出現錯誤，請檢查我方數據！', 'Calculation error — please check your ally\'s data!'));
                    return;
                }

                const opponentSpeeds = Object.entries(opponents).map(
                    ([character, data]) => {
                        const opponentInitial = parseFloat(data.initial);
                        if (isNaN(opponentInitial) || !data.initial) {
                            return {
                                character,
                                speedMin: null,
                                speedMax: null,
                                random: data.random,
                                initial: data.initial,
                                position: character.replace('opponent', ''),
                            };
                        }

                        const opponentRandom = data.random === "" ? null : parseFloat(data.random);
                        let speedMin, speedMax;
                        
                        if (opponentRandom !== null) {
                            // 對手隨機值已知
                            const opponentActualInitial = opponentInitial - opponentRandom;
                            speedMin = Math.round(opponentActualInitial * allySpeedRatioMin);
                            speedMax = Math.round(opponentActualInitial * allySpeedRatioMax);
                        } else {
                            // 對手隨機值未知，假設0-5範圍
                            const opponentActualInitialMin = opponentInitial - 5;
                            const opponentActualInitialMax = opponentInitial - 0;
                            speedMin = Math.round(opponentActualInitialMin * allySpeedRatioMin);
                            speedMax = Math.round(opponentActualInitialMax * allySpeedRatioMax);
                        }
                        
                        // 確保最小值不大於最大值
                        if (speedMin > speedMax) {
                            [speedMin, speedMax] = [speedMax, speedMin];
                        }

                        return {
                            character,
                            speedMin,
                            speedMax,
                            random: data.random,
                            initial: data.initial,
                            position: character.replace('opponent', ''),
                        };
                    }
                );

                setResults(opponentSpeeds);
            }, [inputs]);

            const clearInputs = useCallback(() => {
                setInputs({
                    ally: { speed: "", random: "", initial: "" },
                    opponent1: { random: "", initial: "" },
                    opponent2: { random: "", initial: "" },
                    opponent3: { random: "", initial: "" }
                });
                setResults([]);
            }, []);

            if (!isVisible) return null;

            return (
                <div className="bg-white rounded-lg shadow-lg p-4 mt-4 border-2 border-purple-200">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="text-lg font-semibold flex items-center gap-2">
                            <IconComponents.Calculator size={20} className="text-purple-500" />
                            {t('速度計算器', 'Speed Calculator')}
                        </h3>
                        <div className="flex gap-2">
                            <button
                                onClick={clearInputs}
                                className="px-3 py-1 text-sm bg-gray-500 text-white rounded hover:bg-gray-600"
                            >
                                {t('清空', 'Clear')}
                            </button>
                            <button
                                onClick={onClose}
                                className="px-3 py-1 text-sm bg-red-500 text-white rounded hover:bg-red-600"
                            >
                                {t('關閉', 'Close')}
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                        {/* 我方參考數據 */}
                        <div className="bg-blue-50 rounded-lg p-4 border border-blue-200">
                            <h4 className="font-medium text-blue-800 mb-3 text-center">{t('我方參考數據', 'Your Reference Data')}</h4>
                            <div className="space-y-2">
                                <input
                                    type="number"
                                    placeholder={t('速度 *', 'Speed *')}
                                    value={inputs.ally.speed}
                                    onChange={(e) => handleInputChange("ally", "speed", e.target.value)}
                                    className="w-full text-sm border rounded px-2 py-1 focus:ring-1 focus:ring-blue-500"
                                />
                                <input
                                    type="number"
                                    placeholder={t('隨機值 (可選)', 'Random value (optional)')}
                                    value={inputs.ally.random}
                                    onChange={(e) => handleInputChange("ally", "random", e.target.value)}
                                    className="w-full text-sm border rounded px-2 py-1 focus:ring-1 focus:ring-blue-500"
                                />
                                <input
                                    type="number"
                                    placeholder={t('初始行動值 *', 'Initial action value *')}
                                    value={inputs.ally.initial}
                                    onChange={(e) => handleInputChange("ally", "initial", e.target.value)}
                                    className="w-full text-sm border rounded px-2 py-1 focus:ring-1 focus:ring-blue-500"
                                />
                            </div>
                        </div>

                        {/* 對手數據 - 改為3個 */}
                        {["opponent1", "opponent2", "opponent3"].map((opponent, index) => (
                            <div key={opponent} className="bg-pink-50 rounded-lg p-4 border border-pink-200">
                                <h4 className="font-medium text-pink-800 mb-3 text-center">{t(`對手${index + 1}`, `Opponent ${index + 1}`)}</h4>
                                <div className="space-y-2">
                                    <input
                                        type="number"
                                        placeholder={t('隨機值 (可選)', 'Random value (optional)')}
                                        value={inputs[opponent].random}
                                        onChange={(e) => handleInputChange(opponent, "random", e.target.value)}
                                        className="w-full text-sm border rounded px-2 py-1 focus:ring-1 focus:ring-pink-500"
                                    />
                                    <input
                                        type="number"
                                        placeholder={t('初始行動值', 'Initial action value')}
                                        value={inputs[opponent].initial}
                                        onChange={(e) => handleInputChange(opponent, "initial", e.target.value)}
                                        className="w-full text-sm border rounded px-2 py-1 focus:ring-1 focus:ring-pink-500"
                                    />
                                </div>

                                {/* 計算結果直接顯示在輸入欄位下方 */}
                                {results.length > 0 && (
                                    <div className="mt-3 pt-3 border-t border-pink-200">
                                        {(() => {
                                            const result = results.find(r => r.character === opponent);
                                            if (!result) return null;

                                            return (
                                                <div>
                                                    <div className="bg-blue-100 text-blue-800 rounded p-2 text-center font-bold text-sm">
                                                        {t('速度: ', 'Speed: ')}{result.speedMin === null
                                                            ? t('無法計算', 'N/A')
                                                            : result.speedMin === result.speedMax
                                                            ? result.speedMin
                                                            : `${result.speedMin} - ${result.speedMax}`}
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="mt-4 text-center">
                        <button
                            onClick={calculateOpponentSpeeds}
                            className="px-6 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 font-medium"
                        >
                            {t('計算對手速度', 'Calculate Opponent Speeds')}
                        </button>
                    </div>

                    {/* 計算結果說明 - 移到計算按鈕下方 */}
                    {results.length > 0 && (
                        <div className="mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded text-sm">
                            <div className="font-medium text-yellow-800 mb-2">{t('💡 計算說明：', '💡 How it works:')}</div>
                            <ul className="text-yellow-700 space-y-1 text-xs">
                                <li>• {t(<><strong>精確計算</strong>：我方和對手隨機值都已知時，顯示確切速度</>, <><strong>Exact</strong>: when both your and the opponent's random values are known, shows the exact speed</>)}</li>
                                <li>• {t(<><strong>範圍計算</strong>：隨機值未知時，假設隨機值範圍0-5進行估算</>, <><strong>Range</strong>: when the random value is unknown, estimates assuming a 0-5 range</>)}</li>
                                <li>• {t(<><strong>我方未知</strong>：我方隨機值未填時，計算範圍會更大但更保險</>, <><strong>Ally unknown</strong>: if your random value is blank, the range is wider but safer</>)}</li>
                                <li>• {t(<><strong>僅供參考</strong>：此功能不保存數據，專注輔助實戰決策</>, <><strong>Reference only</strong>: this tool saves no data; it just aids in-battle decisions</>)}</li>
                                <li>• {t(<><strong>必填欄位</strong>：我方速度和初始行動值為必填項</>, <><strong>Required</strong>: your speed and initial action value are mandatory</>)}</li>
                            </ul>
                        </div>
                    )}
                </div>
            );
        });

        // ==================== 工具函數 ====================
        const Utils = {
            convertAlias: (input, characterAliases) => {
                if (!input) return input;
                
                // 先清理輸入
                const cleanInput = SecurityUtils.sanitizeInput(input);
                
                const lc = cleanInput.toLowerCase();
                for (const character of characterAliases) {
                    if (character.name.toLowerCase() === lc) {
                        return character.name;
                    }
                    // 英文正式名也可輸入，一律收斂回中文正式名（儲存基準不變）
                    if (character.nameEN && character.nameEN.toLowerCase() === lc) {
                        return character.name;
                    }
                    for (const alias of character.aliases) {
                        if (alias.toLowerCase() === lc) {
                            return character.name;
                        }
                    }
                }
                return cleanInput;
            },

            getRankIcon: (rank) => {
                const icons = {
                    '金牌': '⭐',
                    '大師': '💎',
                    '挑戰者': '👑',
                    '優勝者': '🏆',
                    '前100': '🥇'
                };
                return icons[rank] || '🎮';
            },

            exportToCSV: (battleRecords) => {
                try {
                    if (!battleRecords || battleRecords.length === 0) {
                        alert(tg('目前沒有紀錄可以匯出', 'No records to export'));
                        return;
                    }

                    const headers = tg(
                        ['紀錄者', '日期', '對手名稱', '對手陣容', '我方陣容', '勝負', '排位', '備註'],
                        ['Recorder', 'Date', 'Opponent Name', 'Opponent Team', 'My Team', 'Result', 'Rank', 'Notes']
                    );
                    const resultLabel = (r) => (CURRENT_LANG === 'en' ? ({ '勝': 'Win', '輸': 'Loss' }[r] || r) : r);
                    const rankLabel = (r) => (CURRENT_LANG === 'en' ? (RANK_EN[r] || r) : r);
                    const csvData = battleRecords.map((record) => [
                        SecurityUtils.cleanInput(record.recorder || tg('未知用戶', 'Unknown user')),
                        SecurityUtils.cleanInput(record.date || tg('未知日期', 'Unknown date')),
                        SecurityUtils.cleanInput(record.opponentName || ''),
                        (record.opponentTeam || []).filter(x => x).map(c => cng(SecurityUtils.cleanInput(c))).join(' + ') || tg('無', 'None'),
                        (record.myTeam || []).filter(x => x).map(c => cng(SecurityUtils.cleanInput(c))).join(' + ') || tg('無', 'None'),
                        resultLabel(SecurityUtils.cleanInput(record.result || tg('未知', 'Unknown'))),
                        rankLabel(SecurityUtils.cleanInput(record.rank || tg('未知', 'Unknown'))),
                        SecurityUtils.cleanInput(record.notes || '')
                    ]);
                    
                    const csvContent = [headers, ...csvData]
                        .map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(','))
                        .join('\n');
                    
                    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `ArkRecode對戰紀錄_${new Date().toISOString().split('T')[0]}.csv`;

                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    alert(tg('✅ CSV文件已下載！', '✅ CSV file downloaded!'));

                } catch (error) {
                    console.error('CSV匯出錯誤:', error);
                    alert(tg('❌ 匯出失敗：', '❌ Export failed: ') + error.message);
                }
            },

            exportData: (data) => {
                try {
                    const exportData = {
                        ...data,
                        exportDate: new Date().toISOString(),
                        version: '2.9.1',
                        security: {
                            sanitized: true,
                            exported_by: 'ArkRecode_v2.9.2'
                        }
                    };
                    
                    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `ArkRecode_完整備份_${new Date().toISOString().split('T')[0]}.json`;

                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    alert(tg('✅ 完整備份已下載！', '✅ Full backup downloaded!'));
                } catch (error) {
                    console.error('備份匯出錯誤:', error);
                    alert(tg('❌ 備份失敗：', '❌ Backup failed: ') + error.message);
                }
            }
        };

        // ==================== 表單組件 ====================
        const FormComponents = {
            TeamInput: React.memo(({ label, team, onChange, characterOptions, placeholder }) => (
                <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
                    <div className="grid grid-cols-4 gap-2">
                        {team.map((char, idx) => (
                            <div key={idx} className="relative">
                                <input
                                    type="text"
                                    placeholder={`${placeholder}${idx + 1}`}
                                    value={char}
                                    onChange={(e) => {
                                        const cleanValue = SecurityUtils.cleanInput(e.target.value);
                                        onChange(cleanValue, idx);
                                    }}
                                    className="w-full text-sm border rounded px-2 py-1 focus:ring-1 focus:ring-blue-500"
                                    list={`${placeholder}-${idx}-options`}
                                    maxLength="50"
                                />
                                <datalist id={`${placeholder}-${idx}-options`}>
                                    {characterOptions.map(option => (
                                        <option key={option} value={option} />
                                    ))}
                                </datalist>
                            </div>
                        ))}
                    </div>
                </div>
            )),

            ResultSelector: React.memo(({ result, onChange }) => {
                const { t } = useI18n();
                return (
                <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">{t('勝負結果', 'Result')}</label>
                    <div className="flex gap-2">
                        <label className="flex items-center cursor-pointer">
                            <input
                                type="radio"
                                name="result"
                                value="勝"
                                checked={result === '勝'}
                                onChange={(e) => onChange(SecurityUtils.cleanInput(e.target.value))}
                                className="sr-only"
                            />
                            <div className={`px-3 py-1 text-sm border-2 rounded font-medium transition-all flex items-center gap-1 ${
                                result === '勝'
                                    ? 'bg-green-500 text-white border-green-500'
                                    : 'bg-white text-green-600 border-green-300 hover:bg-green-50'
                            }`}>
                                {t('🏆 勝利', '🏆 Win')}
                            </div>
                        </label>
                        <label className="flex items-center cursor-pointer">
                            <input
                                type="radio"
                                name="result"
                                value="輸"
                                checked={result === '輸'}
                                onChange={(e) => onChange(SecurityUtils.cleanInput(e.target.value))}
                                className="sr-only"
                            />
                            <div className={`px-3 py-1 text-sm border-2 rounded font-medium transition-all flex items-center gap-1 ${
                                result === '輸'
                                    ? 'bg-red-500 text-white border-red-500'
                                    : 'bg-white text-red-600 border-red-300 hover:bg-red-50'
                            }`}>
                                {t('💔 失敗', '💔 Loss')}
                            </div>
                        </label>
                    </div>
                </div>
                );
            }),

            RankSelector: React.memo(({ rank, onChange }) => {
                const { t } = useI18n();
                return (
                <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">{t('排位等級', 'Rank Tier')}</label>
                    <select
                        value={rank}
                        onChange={(e) => onChange(SecurityUtils.cleanInput(e.target.value))}
                        className="w-32 text-sm border rounded px-2 py-1 focus:ring-1 focus:ring-blue-500"
                    >
                        <option value="">{t('選擇排位', 'Select rank')}</option>
                        <option value="金牌">{t('⭐ 金牌', '⭐ Gold')}</option>
                        <option value="大師">{t('💎 大師', '💎 Master')}</option>
                        <option value="挑戰者">{t('👑 挑戰者', '👑 Challenger')}</option>
                        <option value="優勝者">{t('🏆 優勝者', '🏆 Champion')}</option>
                        <option value="前100">{t('🥇 前100', '🥇 Top 100')}</option>
                    </select>
                </div>
                );
            })
        };

        // ==================== 備註欄位組件 ====================
        const NoteCell = ({ notes }) => {
            const [expanded, setExpanded] = React.useState(false);
            const MAX_LEN = 8;
            const sanitized = notes ? SecurityUtils.sanitizeHtml(notes) : '';
            const isMobile = window.innerWidth <= 640;
            const truncated = !isMobile && sanitized.length > MAX_LEN;

            return (
                <td className="py-2 px-2 max-w-32 text-xs notes-cell"
                    style={{ cursor: truncated ? 'pointer' : 'default' }}
                    onClick={() => truncated && setExpanded(e => !e)}>
                    {expanded ? (
                        <span className="whitespace-pre-wrap break-words">{sanitized}</span>
                    ) : (
                        <>
                            <span className="inline-block overflow-hidden whitespace-nowrap align-bottom"
                                  style={{ maxWidth: truncated ? 'calc(100% - 28px)' : '100%', textOverflow: 'ellipsis' }}>
                                {sanitized}
                            </span>
                            {truncated && <span className="notes-ellipsis">[...]</span>}
                            {truncated && <div className="tooltip">{sanitized}</div>}
                        </>
                    )}
                </td>
            );
        };

        // ==================== 建議組件 ====================
        const SuggestionComponents = {
            TeamSuggestions: React.memo(({ suggestions, onApply, title, bgColor }) => {
                const { t, cn } = useI18n();
                if (suggestions.length === 0) return null;

                return (
                    <div className={`mt-2 p-2 ${bgColor} rounded text-xs`}>
                        <div className="font-medium mb-1">{title}:</div>
                        <div className="flex flex-wrap gap-1">
                            {suggestions.map((suggestion, idx) => (
                                <button
                                    key={idx}
                                    type="button"
                                    onClick={() => onApply(suggestion)}
                                    className="px-2 py-1 bg-yellow-200 text-yellow-800 rounded hover:bg-yellow-300 text-xs"
                                >
                                    {suggestion.name ? `${SecurityUtils.sanitizeHtml(suggestion.name)}: ` : ''}
                                    {suggestion.combo.map(cn).join('+')}
                                    {suggestion.source === 'history' ? (
                                        <span> ({suggestion.count}{t('次', 'x')}
                                        {suggestion.matchCount && suggestion.matchCount > 2 && (
                                            <span>·{suggestion.matchCount}{t('/4匹配', '/4 match')}</span>
                                        )}) 📊</span>
                                    ) : (
                                        <span> ({(suggestion.winRate * 100).toFixed(0)}%)</span>
                                    )}
                                </button>
                            ))}
                        </div>

                        {/* 說明文字 */}
                        <div className="mt-2 text-xs text-gray-600">
                            {t('📊 = 近期數據 (出現次數·匹配度) | 預設組合 (推薦勝率)', '📊 = recent data (count·match) | preset combos (recommended win rate)')}
                        </div>
                    </div>

                for (const suggestion of suggestions) {

                        uniqueSuggestions.push(suggestion);

        // ==================== 歷史記錄表格組件 ====================  
        const HistoryTable = React.memo(({

            const { t, cn, rank: rankLabel, match } = useI18n();
            // 搜索狀態
            const [searchOpponents, setSearchOpponents] = useState(['', '', '', '']);
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [isSearching, setIsSearching] = useState(false);
            const [lastSearchTerms, setLastSearchTerms] = useState(['', '', '', '']);

            // 優化的角色別名轉換 - 使用緩存
            const aliasCache = useMemo(() => {
                const cache = new Map();
                characterOptions.forEach(option => {
                    const converted = convertAlias(option);
                    cache.set(option.toLowerCase(), converted);
                });
                return cache;
            }, [characterOptions, convertAlias]);

            // 快速角色轉換函數
            const fastConvertAlias = useCallback((input) => {
                if (!input) return input;
                const cleanInput = SecurityUtils.cleanInput(input);
                const cached = aliasCache.get(cleanInput.toLowerCase());
                return cached || convertAlias(cleanInput);
            }, [aliasCache, convertAlias]);

            // 執行搜索的函數
            const performSearch = useCallback(() => {
                setIsSearching(true);
                
                // 使用 setTimeout 讓 UI 有時間更新搜索狀態
                setTimeout(() => {
                    setLastSearchTerms([...searchOpponents]);
                    setIsSearching(false);
                    
                    // 自動顯示搜索結果（如果有結果的話）
                    const searchTeam = searchOpponents
                        .map(char => char ? fastConvertAlias(char) : '')
                        .filter(char => char);
                    
                    if (searchTeam.length >= 3) {
                        setShowSearchResults(true);
                    } else {
                        setShowSearchResults(false);
                    }
                }, 50);
            }, [searchOpponents, fastConvertAlias]);

            // 處理輸入欄失焦事件
            const handleInputBlur = useCallback((index) => {
                // 檢查當前輸入是否與上次搜索不同，且至少有3個角色
                const currentSearchTeam = searchOpponents.filter(char => char.trim()).length;
                const lastSearchTeam = lastSearchTerms.filter(char => char.trim()).length;
                
                if (currentSearchTeam >= 3 && 
                    (currentSearchTeam !== lastSearchTeam || 
                     searchOpponents.some((char, idx) => char !== lastSearchTerms[idx]))) {
                    performSearch();
                }
            }, [searchOpponents, lastSearchTerms, performSearch]);

            // 搜索結果 - 使用最後搜索的詞條
            const searchResults = useMemo(() => {
                const searchTeam = lastSearchTerms
                    .map(char => char ? fastConvertAlias(char) : '')
                    .filter(char => char);
                
                // 至少需要3個角色才開始搜索
                if (searchTeam.length < 3) {
                    return [];
                }

                // 根據輸入的角色數量決定最低匹配要求
                const requiredMatchCount = searchTeam.length === 4 ? 4 : 3;

                // 預處理所有記錄的對手陣容 - 避免重複計算
                const processedRecords = records.map(record => {
                    const recordOpponents = record.opponentTeam
                        .filter(char => char)
                        .map(fastConvertAlias);
                    return { ...record, processedOpponents: recordOpponents };
                });

                const matchingRecords = processedRecords.filter(record => {
                    const matchCount = searchTeam.filter(char => 
                        record.processedOpponents.includes(char)
                    ).length;
                    
                    // 根據輸入角色數量調整匹配要求
                    // 4個角色輸入時：只要完全匹配(4/4)
                    // 3個角色輸入時：要3個以上匹配(3/4或4/4)
                    return matchCount >= requiredMatchCount;
                }).map(record => {
                    const matchCount = searchTeam.filter(char => 
                        record.processedOpponents.includes(char)
                    ).length;
                    
                    return {
                        ...record,
                        matchCount,
                        matchLevel: matchCount === 4 ? '完全匹配' : matchCount === 3 ? '高度匹配' : '部分匹配'
                    };
                }).sort((a, b) => {
                    // 先按匹配度排序，再按日期排序
                    if (a.matchCount !== b.matchCount) {
                        return b.matchCount - a.matchCount;
                    }
                    return b.id - a.id;
                });

                return matchingRecords;
            }, [lastSearchTerms, records, fastConvertAlias]);

            // 自動顯示搜索結果
            useEffect(() => {
                if (lastSearchTerms.filter(c => c).length >= 3 && searchResults.length > 0) {
                    setShowSearchResults(true);
                } else if (lastSearchTerms.filter(c => c).length < 3) {
                    setShowSearchResults(false);
                }
            }, [lastSearchTerms, searchResults.length]);

            // 根據排序方式處理記錄
            const sortedRecords = useMemo(() => {
                const recordsToSort = showSearchResults ? searchResults : records;
                const recordsCopy = [...recordsToSort];
                
                if (sortBy === 'opponentId') {
                    return recordsCopy.sort((a, b) => {
                        const nameA = (a.opponentName || '').toLowerCase();
                        const nameB = (b.opponentName || '').toLowerCase();
                        
                        // 有名字的優先
                        if (nameA && !nameB) return -1;
                        if (!nameA && nameB) return 1;
            
                        // 都有名字或都沒名字時，按字母排序
                        if (nameA !== nameB) {
                        return nameA.localeCompare(nameB);
                        }

                        // 名字相同時，按創建時間排序（最新的在前）
                        return b.id - a.id;
                    });
                } else {
                    // 預設按創建時間排序（最新的在前）
                    return recordsCopy.sort((a, b) => b.id - a.id);
                }
            }, [records, searchResults, showSearchResults, sortBy]);

            // 計算最常見的紀錄者
            const mainRecorder = useMemo(() => {
                if (records.length === 0) return '我方';
                
                const recorderCount = {};
                records.forEach(record => {
                    const recorder = record.recorder || '未知';
                    recorderCount[recorder] = (recorderCount[recorder] || 0) + 1;
                });
                
                // 找出最常見的紀錄者
                let maxCount = 0;
                let mostCommonRecorder = '我方';
                for (const [recorder, count] of Object.entries(recorderCount)) {
                    if (count > maxCount) {
                        maxCount = count;
                        mostCommonRecorder = recorder;
                    }
                }
                
                return mostCommonRecorder;
            }, [records]);
