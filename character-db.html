            return (
                <div className="relative">
                    <button onClick={()=>setIsOpen(!isOpen)}
                        className={`flex items-center gap-2 px-3 py-3 rounded-lg border transition-all text-sm ${isOpen?'bg-blue-500 text-white border-blue-500':'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>
                        <IconComponents.Filter size={14}/>зҜ©йҒё
                    </button>
                    {isOpen && (
                        <div className="absolute top-full mt-2 left-0 bg-white rounded-lg shadow-lg border p-4 z-10 min-w-80">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <h4 className="font-medium text-gray-700 mb-2">еұ¬жҖ§зҜ©йҒё</h4>
                                    <div className="space-y-1">
                                        <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={filters.attributes.length===0} onChange={()=>onFilterChange('attributes',[])} className="rounded"/><span className="text-sm">е…ЁйғЁ</span></label>
                                        {Object.entries(ATTRIBUTES).map(([k,a])=>(
                                            <label key={k} className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" checked={filters.attributes.includes(k)} onChange={()=>onFilterChange('attributes',filters.attributes.includes(k)?filters.attributes.filter(x=>x!==k):[...filters.attributes,k])} className="rounded"/>
                                                <span className="text-sm flex items-center gap-1">{a.icon} {showEnglish?a.nameEN:a.name}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <h4 className="font-medium text-gray-700 mb-2">иҒ·жҘӯзҜ©йҒё</h4>
                                    <div className="space-y-1">
                                        <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={filters.jobs.length===0} onChange={()=>onFilterChange('jobs',[])} className="rounded"/><span className="text-sm">е…ЁйғЁ</span></label>
                                        {Object.entries(JOBS).map(([k,j])=>(
                                            <label key={k} className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" checked={filters.jobs.includes(k)} onChange={()=>onFilterChange('jobs',filters.jobs.includes(k)?filters.jobs.filter(x=>x!==k):[...filters.jobs,k])} className="rounded"/>
                                                <span className="text-sm flex items-center gap-1">{j.icon} {showEnglish?j.nameEN:j.name}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="mt-4 pt-4 border-t flex justify-end">
                                <button onClick={()=>setIsOpen(false)} className="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600 text-sm">й—ңй–ү</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== жҺ’еәҸ ====================
        const SortPanel = ({ sortBy, onSortChange, showEnglish }) => {
            const [isOpen, setIsOpen] = useState(false);
            const opts = [
                {value:'default',  label:'й җиЁӯжҺ’еәҸ',   labelEN:'Default'},
                {value:'attribute',label:'дҫқеұ¬жҖ§жҺ’еәҸ', labelEN:'By Attribute'},
                {value:'job',      label:'дҫқиҒ·жҘӯжҺ’еәҸ', labelEN:'By Job'},
            ];
            return (
                <div className="relative">
                    <button onClick={()=>setIsOpen(!isOpen)}
                        className={`flex items-center gap-2 px-3 py-3 rounded-lg border transition-all text-sm ${isOpen?'bg-green-500 text-white border-green-500':'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>
                        {showEnglish?'Sort':'жҺ’еәҸ'}
                    </button>
                    {isOpen && (
                        <div className="absolute top-full mt-2 left-0 bg-white rounded-lg shadow-lg border p-4 z-10 min-w-48">
                            <div className="space-y-1">
                                {opts.map(o=>(
                                    <label key={o.value} className="flex items-center gap-2 cursor-pointer p-2 rounded hover:bg-gray-50">
                                        <input type="radio" name="sort" value={o.value} checked={sortBy===o.value} onChange={e=>onSortChange(e.target.value)} className="rounded"/>
                                        <span className="text-sm">{showEnglish?o.labelEN:o.label}</span>
                                    </label>
                                ))}
                            </div>
                            <div className="mt-4 pt-4 border-t flex justify-end">
                                <button onClick={()=>setIsOpen(false)} className="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600 text-sm">й—ңй–ү</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== дё»жҮүз”Ё ====================
        const App = () => {
            const [characters, setCharacters] = useState(CHARACTER_DATA);
            const [searchTerm, setSearchTerm] = useState('');
            const [showEnglish, setShowEnglish] = useState(
                (localStorage.getItem('arkrecode_lang') || 'zh') === 'en'
            );
            React.useEffect(() => {
                const handler = e => setShowEnglish(e.detail === 'en');
                window.addEventListener('arkrecode-lang', handler);
                return () => window.removeEventListener('arkrecode-lang', handler);
            }, []);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editingCharacter, setEditingCharacter] = useState(null);
            const [contextMenu, setContextMenu] = useState({show:false,x:0,y:0,character:null});
            const [filters, setFilters] = useState({attributes:[],jobs:[],rarity:[]});
            const [sortBy, setSortBy] = useState('default');

            // в”Җв”Җ builds.csv в”Җв”Җ
            const [buildsData, setBuildsData] = useState({});
            const [buildsPopup, setBuildsPopup] = useState(null);

            useEffect(() => {
                async function loadBuilds() {
                    try {
                        const CACHE_KEY = 'arkrecode_build_recom_data';
                        const VER_KEY   = 'arkrecode_build_recom_version';
                        const res = await fetch('./build_recom.csv?_=' + Date.now());
                        if (!res.ok) return;
                        const text = await res.text();
                        const lines = text.split(/\r?\n/).filter(l => l.trim());
                        const verMatch = (lines[0]||'').match(/version[:\s]+([^\s,]+)/i);
                        const ver = verMatch ? verMatch[1] : '';
                        if (ver && ver === localStorage.getItem(VER_KEY)) {
                            const cached = localStorage.getItem(CACHE_KEY);
                            if (cached) { setBuildsData(JSON.parse(cached)); return; }
                        }
                        const dataLines = lines.filter(l => !/^version[:\s]/i.test(l.trim()));
                        if (dataLines.length < 2) return;
                        const headers = dataLines[0].split(',');
                        const parsed = {};
                        for (let i = 1; i < dataLines.length; i++) {
                            const vals = dataLines[i].split(',');
                            if (vals.length < 2) continue;
                            const row = {};
                            headers.forEach((h,idx) => { row[h.trim()] = (vals[idx]||'').trim(); });
                            const name = row['и§’иүІеҗҚ'];
                            if (!name) continue;
                            if (!parsed[name]) parsed[name] = [];
                            parsed[name].push(row);
                        }
                        setBuildsData(parsed);
                        if (ver) {
                            localStorage.setItem(CACHE_KEY, JSON.stringify(parsed));
                            localStorage.setItem(VER_KEY, ver);
                        }
                    } catch(e) { console.log('builds.csv load failed', e); }
                }
                loadBuilds();
            }, []);

            const handleFilterChange = useCallback((type,value)=>setFilters(p=>({...p,[type]:value})),[]);
            const handleAddCharacter = useCallback(c=>setCharacters(p=>[...p,c]),[]);
            const handleEditCharacter = useCallback(c=>{setEditingCharacter(c);setShowEditModal(true);},[]);
            const handleSaveEditCharacter = useCallback(c=>{setCharacters(p=>p.map(x=>x.id===c.id?c:x));setShowEditModal(false);setEditingCharacter(null);},[]);
            const handleContextMenu = useCallback((e,c)=>setContextMenu({show:true,x:e.clientX,y:e.clientY,character:c}),[]);
            const handleCloseContextMenu = useCallback(()=>setContextMenu({show:false,x:0,y:0,character:null}),[]);
            const handleViewBuilds = useCallback(c=>setBuildsPopup(c),[]);

            const filterDescription = useMemo(()=>{
                const conds=[];
                if(filters.attributes.length>0) conds.push(`еұ¬жҖ§: ${filters.attributes.map(a=>showEnglish?ATTRIBUTES[a].nameEN:ATTRIBUTES[a].name).join('гҖҒ')}`);
                if(filters.jobs.length>0) conds.push(`иҒ·жҘӯ: ${filters.jobs.map(j=>showEnglish?JOBS[j].nameEN:JOBS[j].name).join('гҖҒ')}`);
                return conds.length>0?` (${conds.join(' | ')})`:'';
            },[filters,showEnglish]);

            const filteredCharacters = useMemo(()=>{
                let f = characters.filter(c => {
                    if (searchTerm) {
                        const s = searchTerm.toLowerCase();
                        if (!c.nameCN.toLowerCase().includes(s) && !c.nameEN.toLowerCase().includes(s) && !c.aliases.some(a=>a.toLowerCase().includes(s))) return false;
                    }
                    if (filters.attributes.length>0 && !filters.attributes.includes(c.attribute)) return false;
                    if (filters.jobs.length>0 && !filters.jobs.includes(c.job)) return false;
                    return true;
                });
                if (sortBy==='attribute') {
                    const o=['fire','water','nature','light','dark'];
                    f.sort((a,b)=>o.indexOf(a.attribute)-o.indexOf(b.attribute)||a.nameCN.localeCompare(b.nameCN,'zh-TW'));
                } else if (sortBy==='job') {
                    const o=['warrior','defender','vanguard','caster','sniper','medic'];
                    f.sort((a,b)=>o.indexOf(a.job)-o.indexOf(b.job)||a.nameCN.localeCompare(b.nameCN,'zh-TW'));
                } else {
                    f.sort((a,b)=>a.id-b.id);
                }
                return f;
            },[characters,searchTerm,filters,sortBy]);

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">ArkRecode и§’иүІиіҮж–ҷеә«</h1>
                            <p className="text-gray-600">е…ұж”¶йҢ„ {CHARACTER_DATA.length} еҖӢеёёз”Ёи§’иүІ</p>
                        </div>

                        <div className="search-section bg-white rounded-lg shadow-lg p-6 mb-6">
                            <div className="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                                <div className="flex gap-3 flex-1 max-w-xl">
                                    <div className="relative flex-1">
                                        <IconComponents.Search size={20} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"/>
                                        <input type="text" placeholder="жҗңе°Ӣи§’иүІеҗҚзЁұжҲ–жҡұзЁұ..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
                                            className="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"/>
                                        {searchTerm && <button onClick={()=>setSearchTerm('')} className="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"><IconComponents.X size={20}/></button>}
                                    </div>
                                    <button onClick={()=>setShowEnglish(p=>!p)}
                                        className={`flex items-center gap-2 px-3 py-3 rounded-lg border transition-all text-sm ${showEnglish?'bg-green-500 text-white border-green-500':'bg-white text-gray-700 border-gray-300 hover:bg-gray-200'}`}>
                                        <IconComponents.Globe size={14}/>{showEnglish?'EN':'дёӯж–Ү'}
                                    </button>
                                    <SortPanel sortBy={sortBy} onSortChange={setSortBy} showEnglish={showEnglish}/>
                                </div>
                                <div className="flex items-center gap-3">
                                    <FilterPanel filters={filters} onFilterChange={handleFilterChange} showEnglish={showEnglish}/>
                                    <button onClick={()=>setShowAddModal(true)} className="flex items-center gap-2 px-3 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-all text-sm">
                                        <IconComponents.Plus size={14}/>ж–°еўһи§’иүІ
                                    </button>
                                </div>
                            </div>
                            <div className="mt-4 pt-4 border-t text-sm text-gray-600 flex items-center justify-between">
                                <div>йЎҜзӨә {filteredCharacters.length}/{characters.length} еҖӢи§’иүІ{filterDescription}{searchTerm&&<span className="ml-2 text-blue-600">жҗңе°Ӣ: "{searchTerm}"</span>}</div>
                                {(filters.attributes.length>0||filters.jobs.length>0) && <button onClick={()=>setFilters({attributes:[],jobs:[],rarity:[]})} className="text-red-500 hover:text-red-700 text-xs">жё…йҷӨзҜ©йҒё</button>}
                            </div>
                        </div>

                        {/* и§’иүІеҲ—иЎЁ */}
                        {filteredCharacters.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {filteredCharacters.map(c => (
                                    <CharacterCard key={c.id} character={c} showEnglish={showEnglish}
                                        onContextMenu={handleContextMenu}
                                        onViewBuilds={handleViewBuilds}
                                        hasBuilds={!!(buildsData[c.nameCN]?.length)}/>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-12">
                                <div className="text-6xl mb-4">рҹ”Қ</div>
                                <h3 className="text-xl font-medium text-gray-700 mb-2">жүҫдёҚеҲ°з¬ҰеҗҲжўқд»¶зҡ„и§’иүІ</h3>
                                <p className="text-gray-500 mb-4">{searchTerm?'и«Ӣеҳ—и©Ұе…¶д»–жҗңе°Ӣй—ңйҚөеӯ—':'и«ӢиӘҝж•ҙзҜ©йҒёжўқд»¶'}</p>
                                <button onClick={()=>{setSearchTerm('');setFilters({attributes:[],jobs:[],rarity:[]});}} className="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">жё…йҷӨжүҖжңүзҜ©йҒё</button>
                            </div>
                        )}

                        {/* зөұиЁҲ */}
                        <div className="mt-8 bg-white rounded-lg shadow-lg p-6">
                            <h3 className="text-lg font-semibold mb-4">иіҮж–ҷеә«зөұиЁҲ</h3>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                {Object.entries(ATTRIBUTES).map(([k,a])=>{
                                    const count=characters.filter(c=>c.attribute===k).length;
                                    return <div key={k} className="text-center"><div className={`mx-auto w-12 h-12 rounded-full stat-${k} flex items-center justify-center text-xl mb-2`}>{a.icon}</div><div className="text-sm font-medium">{showEnglish?a.nameEN:a.name}</div><div className="text-lg font-bold text-gray-800">{count}</div></div>;
                                })}
                            </div>
                            <div className="mt-6 pt-6 border-t">
                                <div className="grid grid-cols-3 md:grid-cols-6 gap-4 text-center">
                                    {Object.entries(JOBS).map(([k,j])=>{
                                        const count=characters.filter(c=>c.job===k).length;
                                        return <div key={k}><div className="text-lg mb-1">{j.icon}</div><div className="text-xs font-medium">{showEnglish?j.nameEN:j.name}</div><div className="text-sm font-bold text-gray-800">{count}</div></div>;
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* е·Ҙе…·е°ҺиҰҪеҲ— */}
                        <div className="mt-10 mb-4">
                            <div className="text-xs text-gray-400 text-center mb-3 tracking-widest uppercase">е·Ҙе…·е°ҺиҰҪ</div>
                            <div className="grid grid-cols-3 gap-3 max-w-xl mx-auto">
                                <a href="./battle-recorder.html"
                                    className="flex flex-col items-center gap-1.5 px-3 py-4 rounded-xl border border-blue-200 bg-blue-50 hover:bg-blue-100 transition-colors text-blue-700 text-center">
                                    <span className="text-2xl">рҹ“Ҡ</span>
                                    <span className="text-sm font-semibold">е°ҚжҲ°зҙҖйҢ„еҷЁ</span>
                                    <span className="text-xs text-blue-400">v2.8.0</span>
                                </a>
                                <a href="./character-db.html"
                                    className="flex flex-col items-center gap-1.5 px-3 py-4 rounded-xl border-2 border-purple-400 bg-purple-50 text-purple-700 text-center cursor-default">
                                    <span className="text-2xl">рҹ‘Ө</span>
                                    <span className="text-sm font-semibold">и§’иүІиіҮж–ҷеә«</span>
                                    <span className="text-xs text-purple-400">v1.5.0 вҶҗ зӣ®еүҚ</span>
                                </a>
                                <a href="./equip-optimizer.html"
                                    className="flex flex-col items-center gap-1.5 px-3 py-4 rounded-xl border border-teal-200 bg-teal-50 hover:bg-teal-100 transition-colors text-teal-700 text-center">
                                    <span className="text-2xl">вҡҷпёҸ</span>
                                    <span className="text-sm font-semibold">й…ҚиЈқиЁҲз®—еҷЁ</span>
                                    <span className="text-xs text-teal-400">v1.5.0</span>
                                </a>
                            </div>
                        </div>

                        {/* жҺЁи–Ұй…ҚиЈқ Popup */}
                        {buildsPopup && <BuildsPopup character={buildsPopup} builds={buildsData} onClose={()=>setBuildsPopup(null)}/>}

                        {/* еҸійҚөйҒёе–® */}
                        {contextMenu.show && <ContextMenu x={contextMenu.x} y={contextMenu.y} character={contextMenu.character} onEdit={handleEditCharacter} onClose={handleCloseContextMenu} onViewBuilds={handleViewBuilds}/>}

                        {/* Modals */}
                        <AddCharacterModal isOpen={showAddModal} onClose={()=>setShowAddModal(false)} onSave={handleAddCharacter}/>
                        <EditCharacterModal isOpen={showEditModal} character={editingCharacter}
                            onClose={()=>{setShowEditModal(false);setEditingCharacter(null);}}
                            onSave={handleSaveEditCharacter}/>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
