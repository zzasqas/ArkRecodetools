<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArkRecode 角色資料庫 v1.4</title>
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' https://unpkg.com https://cdn.tailwindcss.com 'unsafe-inline' 'unsafe-eval'; 
                   style-src 'self' https://cdn.tailwindcss.com 'unsafe-inline';">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .lucide-icon{display:inline-block;width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .character-card{transition:all 0.3s ease;cursor:pointer}
        .character-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.15)}
        .context-menu{position:fixed;background:white;border-radius:8px;box-shadow:0 8px 25px rgba(0,0,0,0.15);border:1px solid #e5e7eb;z-index:1000;min-width:160px}
        .context-menu-item{padding:8px 12px;cursor:pointer;transition:background-color 0.2s;display:flex;align-items:center;gap:8px;font-size:14px}
        .context-menu-item:hover{background-color:#f3f4f6}
        .context-menu-item:first-child{border-radius:8px 8px 0 0}
        .context-menu-item:last-child{border-radius:0 0 8px 8px}
        .attribute-fire{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#f87171!important}
        .attribute-water{background:linear-gradient(135deg,#eff8ff,#dbeafe);border-color:#93c5fd!important}
        .attribute-nature{background:linear-gradient(135deg,#f7fef8,#f0fdf4);border-color:#86efac!important}
        .attribute-light{background:linear-gradient(135deg,#fffef7,#fefce8);border-width:3px!important;border-color:#facc15!important}
        .attribute-dark{background:linear-gradient(135deg,#f5f3ff,#e9d5ff);border-width:3px!important;border-color:#a78bfa!important}
        .text-fire{color:#dc2626!important}.text-water{color:#2563eb!important}.text-nature{color:#16a34a!important}.text-light{color:#ca8a04!important}.text-dark{color:#7c3aed!important}
        .bg-fire{background-color:#fee2e2!important;color:#b91c1c!important}.bg-water{background-color:#eff6ff!important;color:#1e40af!important}.bg-nature{background-color:#f0fdf4!important;color:#166534!important}.bg-light{background-color:#fefce8!important;color:#a16207!important}.bg-dark{background-color:#f3f4f6!important;color:#581c87!important}
        .stat-fire{background-color:#fee2e2;color:#dc2626}.stat-water{background-color:#eff6ff;color:#2563eb}.stat-nature{background-color:#f0fdf4;color:#16a34a}.stat-light{background-color:#fefce8;color:#ca8a04}.stat-dark{background-color:#f5f3ff;color:#7c3aed}
        .author-info{position:fixed;bottom:4px;right:4px;font-size:8px;color:#9ca3af;opacity:0.3;z-index:10}
        .search-section{margin-top:15vh;min-height:15vh}
        /* 推薦配裝 hover 提示 */
        .build-hint{position:absolute;bottom:8px;left:8px;background:rgba(59,130,246,0.9);color:white;padding:4px 8px;border-radius:4px;font-size:11px;opacity:0;transition:opacity 0.2s;pointer-events:none}
        .character-card:hover .build-hint{opacity:1}
        /* Popup */
        .builds-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
        .builds-popup{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:500px;max-width:95vw;max-height:88vh;overflow-y:auto}
    </style>
</head>

            { id: 8,  nameCN: '聖誕的蜜拉貝兒',    nameEN: 'Christmas Mirabelle',  aliases: ['闆娘','露娜','火聖誕','版娘'],  attribute: 'fire',   job: 'warrior',  rarity: 5 },
            { id: 9,  nameCN: '赤鬼伯伯',          nameEN: 'Akaoni',               aliases: ['赤鬼'],                         attribute: 'fire',   job: 'sniper',   rarity: 5 },
            { id: 10, nameCN: '蓋兒',              nameEN: 'Gail',                 aliases: ['蓋兒','暗老頭'],                attribute: 'dark',   job: 'vanguard', rarity: 5 },
            { id: 11, nameCN: 'Aoi Hinamori',      nameEN: 'Aoi Hinamori',         aliases: ['AOI'],                          attribute: 'fire',   job: 'warrior',  rarity: 5 },
            { id: 12, nameCN: 'HongKongDoll',      nameEN: 'HongKongDoll',         aliases: ['HKD','萌王'],                   attribute: 'nature', job: 'warrior',  rarity: 5 },
            { id: 13, nameCN: '奧柏絲蒂恩',        nameEN: 'Obsidian',             aliases: ['LLB','暗LLB','暗剪刀'],         attribute: 'dark',   job: 'warrior',  rarity: 5 },
            { id: 14, nameCN: '複製體芭索蘿',      nameEN: 'Clone Bartholo',       aliases: ['光狗'],                         attribute: 'light',  job: 'warrior',  rarity: 4 },
            { id: 15, nameCN: '複製體瑪蒂爾達',    nameEN: 'Clone Matilda',        aliases: ['光狙','光修里'],                attribute: 'light',  job: 'sniper',   rarity: 4 },
            { id: 16, nameCN: '萊莎曼德',          nameEN: 'Laiisma',              aliases: ['光弓'],                         attribute: 'light',  job: 'sniper',   rarity: 5 },
            { id: 17, nameCN: '安泰西亞',          nameEN: 'Anastasia',            aliases: ['火貓','安泰','眼罩'],           attribute: 'fire',   job: 'warrior',  rarity: 5 },
            { id: 18, nameCN: '泳池魅影吉妮茲',    nameEN: 'Pool Phantom Janis',   aliases: ['泳蘿','雷姆'],                  attribute: 'water',  job: 'warrior',  rarity: 5 },
            { id: 19, nameCN: '璀璨誓約的伊娥絲',  nameEN: 'Radiant Vow Ith',      aliases: ['124','光LL','光124'],           attribute: 'light',  job: 'warrior',  rarity: 5 },
            { id: 20, nameCN: '路易絲',            nameEN: 'Louis',                aliases: ['木刺','木席德'],                attribute: 'nature', job: 'vanguard', rarity: 4 },
            { id: 21, nameCN: '菲莉西婭',          nameEN: 'Felicia',              aliases: ['暗拳'],                         attribute: 'dark',   job: 'warrior',  rarity: 5 },
            { id: 22, nameCN: '複製體吉妮茲',      nameEN: 'Clone Janis',          aliases: ['光蘿'],                         attribute: 'light',  job: 'warrior',  rarity: 4 },
            { id: 23, nameCN: '妮諾凱西',          nameEN: 'Nenookaasi',           aliases: ['香蕉','木GAY'],                 attribute: 'nature', job: 'vanguard', rarity: 5 },

            { id: 26, nameCN: '奧麗芙',            nameEN: 'Olive',                aliases: ['光埃及','光埃'],                attribute: 'light',  job: 'medic',    rarity: 5 },
            { id: 27, nameCN: '克萊兒',            nameEN: 'Claire',               aliases: ['光鐮刀','光鐮'],                attribute: 'light',  job: 'warrior',  rarity: 5 },
            { id: 28, nameCN: '朱音',              nameEN: 'Akane',                aliases: ['朱音'],                         attribute: 'fire',   job: 'vanguard', rarity: 5 },
            { id: 29, nameCN: '莎莉絲特',          nameEN: 'Celeste',              aliases: ['木串','木龍'],                  attribute: 'nature', job: 'warrior',  rarity: 5 },
            { id: 30, nameCN: '東雲 ft.坊橋夜泊',  nameEN: 'Shinonome ft. Fang',   aliases: ['東云','東雲'],                  attribute: 'nature', job: 'sniper',   rarity: 5 },
            { id: 31, nameCN: '伊娃',              nameEN: 'Eva',                  aliases: ['EVA','史哥'],                   attribute: 'dark',   job: 'warrior',  rarity: 5 },
            { id: 32, nameCN: '絕望的夏妮',        nameEN: 'Shani in Despair',     aliases: ['暗龍','熬夜夏尼'],              attribute: 'dark',   job: 'defender', rarity: 5 },
            { id: 33, nameCN: '歐貝恩絲',          nameEN: 'Aubrynn',              aliases: ['暗飛','暗飛刀'],                attribute: 'dark',   job: 'sniper',   rarity: 5 },
            { id: 34, nameCN: '貓祭',              nameEN: 'Neko Matsuri',         aliases: ['貓祭','紅丸'],                  attribute: 'fire',   job: 'warrior',  rarity: 5 },
            { id: 35, nameCN: '繼任者彌卡伊勒',    nameEN: 'Successor Mikael',     aliases: ['小總理','小公主','利希'],        attribute: 'water',  job: 'warrior',  rarity: 5 },
            { id: 36, nameCN: '歸還者璐茜婭',      nameEN: 'Redeemer Lucia',       aliases: ['路雅','滷鴨'],                  attribute: 'water',  job: 'sniper',   rarity: 5 },
            { id: 37, nameCN: '南瓜鬼怪萊拉',      nameEN: 'Pumpkin Pixie Layla',  aliases: ['捷克O','jko','南瓜'],           attribute: 'fire',   job: 'warrior',  rarity: 5 },
            { id: 38, nameCN: '彼岸花茱莉亞',      nameEN: 'Spider Lily Julia',    aliases: ['大哥','暗蘋果','暗大哥'],        attribute: 'dark',   job: 'vanguard', rarity: 5 },
        ];

        // ==================== ICON ====================
        const IconComponents = {
            Search:   ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
            Globe:    ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>,
            Filter:   ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46"/></svg>,
            X:        ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>,
            Plus:     ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg>,
            Edit:     ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="m18.5 2.5 a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>,
            BarChart: ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></svg>,
            Home:     ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>,
            Wrench:   ({size=16,className=""}) => <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
        };

        // ==================== 屬性職業 ====================
        const ATTRIBUTES = {
            fire:   { name:'火', nameEN:'Fire',   icon:'🔥', color:'red'    },
            water:  { name:'水', nameEN:'Water',  icon:'💧', color:'blue'   },
            nature: { name:'木', nameEN:'Nature', icon:'🌿', color:'green'  },
            light:  { name:'光', nameEN:'Light',  icon:'☀️', color:'yellow' },
            dark:   { name:'暗', nameEN:'Dark',   icon:'🌙', color:'purple' },
        };
        const JOBS = {
            warrior:  { name:'戰士', nameEN:'Warrior',  icon:'⚔️' },
            defender: { name:'盾',   nameEN:'Tank',     icon:'🛡️' },
            vanguard: { name:'先鋒', nameEN:'Vanguard', icon:'🚀' },
            caster:   { name:'術士', nameEN:'Caster',   icon:'🪄' },
            sniper:   { name:'狙擊', nameEN:'Sniper',   icon:'🎯' },
            medic:    { name:'醫療', nameEN:'Medic',    icon:'💚' },
        };

        // ==================== TAG 顏色 ====================
        const TAG_COLORS = {
            '速度型':         '#3B82F6',
            '輸出型(高速)':   '#EF4444',
            '輸出型(低速)':   '#F97316',
            '坦克型':         '#10B981',
            '肉輸出':         '#8B5CF6',
            '控制型':         '#EC4899',
            '對策額外回合':   '#F59E0B',
            '對策非攻擊技能': '#84CC16',
            '非攻擊技能':     '#06B6D4',
            '絕對一速':       '#6366F1',
            '解控型':         '#14B8A6',
            '拉條型':         '#A855F7',
        };

        // ==================== 推薦配裝 Popup ====================
        const TAG_COLORS = {
            '速度型':         '#3B82F6',
            '輸出型(高速)':   '#EF4444',
            '低速輸出':       '#F97316',
            '輸出型(低速)':   '#F97316',
            '坦克型':         '#10B981',
            '肉輸出':         '#8B5CF6',
            '控制型':         '#EC4899',
            '對策額外回合':   '#F59E0B',
            '對策非攻擊技能': '#84CC16',
            '對策非攻':       '#84CC16',
            '非攻擊技能':     '#06B6D4',
            '絕對一速':       '#6366F1',
            '解控':           '#14B8A6',
            '解控型':         '#14B8A6',
            '拉條型':         '#A855F7',
        };

        const BuildsPopup = ({ character, builds, onClose }) => {
            const charBuilds = (builds[character.nameCN] || [])
                .slice().sort((a,b) => parseInt(a['方案編號']||0) - parseInt(b['方案編號']||0));
            const [selIdx, setSelIdx] = useState(0);
            const build = charBuilds[selIdx] || null;

            const goToOptimizer = () => {
                const base = './equip-optimizer.html';
                if (!build) { window.location.href = `${base}?char=${encodeURIComponent(character.nameCN)}`; return; }
                const p = new URLSearchParams();
                p.set('char', character.nameCN);
                // 套裝 (最多3個)
                ['套裝1','套裝2','套裝3'].forEach((k,i) => { if (build[k]) p.set(`set${i+1}`, build[k]); });
                // 速度
                if (build['速度下限']) p.set('速度下限', build['速度下限']);
                if (build['速度上限']) p.set('速度上限', build['速度上限']);
                // 數值下限
                ['爆率下限','爆率上限','爆傷下限','攻擊下限','防禦下限','生命下限','命中下限','抗性下限']
                    .forEach(f => { if (build[f]) p.set(f, build[f]); });
                // 權重 (Mode A，空白=0)
                ['攻擊','爆率','爆傷','命中','抗性','生命','防禦'].forEach(k => {
                    const v = build[`權重_${k}`];
                    if (v !== undefined && v !== '') p.set(`w_${k}`, v);
                });
                if (build['速度鞋'] === '1') p.set('speedShoes', '1');
                window.location.href = `${base}?${p.toString()}`;
            };

            const Chip = ({ label, value, color }) => (
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium"
                    style={{background:color+'18', color, border:`1px solid ${color}44`}}>
                    {label}{value ? ` ${value}` : ''}
                </span>
            );

            return (
                <div className="builds-overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
                    <div className="builds-popup">
                        {/* Header */}
                        <div className="flex items-center justify-between px-5 py-4 border-b">
                            <div>
                                <div className="text-xs text-gray-400 mb-0.5">推薦配裝</div>
                                <div className="flex items-center gap-2">
                                    <h2 className="text-lg font-bold text-gray-800">{character.nameCN}</h2>
                                    <span className="text-sm text-gray-400">{character.nameEN}</span>
                                </div>
                            </div>
                            <button onClick={onClose}
                                className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition text-lg">
                                ✕
                            </button>
                        </div>

                        {charBuilds.length === 0 ? (
                            <div className="px-5 py-12 text-center">
                                <div className="text-5xl mb-4">⚙️</div>
                                <div className="text-gray-700 font-medium mb-1">暫無推薦配裝</div>
                                <div className="text-sm text-gray-400 mb-6">可前往配裝計算器自行設定</div>
                                <button onClick={goToOptimizer}
                                    className="px-5 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition text-sm font-medium">
                                    前往配裝計算器 →
                                </button>
                            </div>
                        ) : (<>
                            {/* 方案 Tab */}
                            {charBuilds.length > 1 && (
                                <div className="flex border-b px-4 pt-3 gap-0.5 bg-gray-50">
                                    {charBuilds.map((b, i) => (
                                        <button key={i} onClick={() => setSelIdx(i)}
                                            className={`px-4 py-2 rounded-t-lg text-sm font-medium transition-all border-b-2 -mb-px ${
                                                selIdx === i
                                                    ? 'text-blue-600 border-blue-500 bg-white'
                                                    : 'text-gray-500 border-transparent hover:text-gray-700 hover:bg-white/60'
                                            }`}>
                                            {b['方案名稱'] || `方案 ${i+1}`}
                                        </button>
                                    ))}
                                </div>
                            )}

                            {build && (
                                <div className="px-5 py-4 space-y-3">
                                    {/* 方案說明 */}
                                    <div className="text-sm text-gray-600 leading-relaxed bg-blue-50 border border-blue-100 rounded-lg px-3 py-2.5">
                                        {build['方案說明'] || '—'}
                                    </div>

                                    {/* 套裝 */}
                                    {[build['套裝1'], build['套裝2'], build['套裝3']].filter(Boolean).length > 0 && (
                                        <div>
                                            <div className="text-xs text-gray-400 mb-1.5 font-medium">套裝</div>
                                            <div className="flex items-center gap-2 flex-wrap">
                                                {[build['套裝1'], build['套裝2'], build['套裝3']].filter(Boolean).map((s,i) => (
                                                    <span key={i} className="px-2.5 py-1 bg-purple-50 text-purple-700 border border-purple-200 rounded-lg text-xs font-medium">
                                                        {s} 套裝
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* 數值門檻 */}
                                    {(() => {
                                        const rows = [
                                            ['速度', build['速度下限'], build['速度上限'], '#6366F1'],
                                            ['爆率', build['爆率下限'], build['爆率上限'], '#EF4444'],
                                            ['爆傷', build['爆傷下限'], null, '#F97316'],
                                            ['攻擊', build['攻擊下限'], null, '#DC2626'],
                                            ['防禦', build['防禦下限'], null, '#10B981'],
                                            ['生命', build['生命下限'], null, '#3B82F6'],
                                            ['命中', build['命中下限'], null, '#F59E0B'],
                                            ['抗性', build['抗性下限'], null, '#8B5CF6'],
                                        ].filter(([,lo,hi]) => lo || hi);
                                        if (!rows.length) return null;
                                        return (
                                            <div>
                                                <div className="text-xs text-gray-400 mb-1.5 font-medium">數值門檻</div>

                    try {
                        const CACHE_KEY = 'arkrecode_build_recom_data';
                        const VER_KEY   = 'arkrecode_build_recom_version';
                        const res = await fetch('./build_recom.csv?_=' + Date.now());
                        if (!res.ok) return;
                        const text = await res.text();
                        const lines = text.split(/\r?\n/).filter(l => l.trim());
                        const verMatch = (lines[0]||'').match(/version[:\s]+([^\s,]+)/i);
                        const ver = verMatch ? verMatch[1] : '';
                        if (ver && ver === localStorage.getItem(VER_KEY)) {
                            const cached = localStorage.getItem(CACHE_KEY);
                            if (cached) { setBuildsData(JSON.parse(cached)); return; }
                        }
                        const dataLines = lines.filter(l => !/^version[:\s]/i.test(l.trim()));
                        if (dataLines.length < 2) return;
                        const headers = dataLines[0].split(',');
                        const parsed = {};
                        for (let i = 1; i < dataLines.length; i++) {
                            const vals = dataLines[i].split(',');
                            if (vals.length < 2) continue;
                            const row = {};
                            headers.forEach((h,idx) => { row[h.trim()] = (vals[idx]||'').trim(); });
                            const name = row['角色名'];
                            if (!name) continue;
                            if (!parsed[name]) parsed[name] = [];
                            parsed[name].push(row);
                        }
                        setBuildsData(parsed);
                        if (ver) {
                            localStorage.setItem(CACHE_KEY, JSON.stringify(parsed));
                            localStorage.setItem(VER_KEY, ver);
                        }
                    } catch(e) { console.log('builds.csv load failed', e); }

                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">ArkRecode 角色資料庫</h1>
                            <p className="text-gray-600">共收錄 {CHARACTER_DATA.length} 個常用角色</p>
                        </div>

                        <div className="search-section bg-white rounded-lg shadow-lg p-6 mb-6">
                            <div className="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                                <div className="flex gap-3 flex-1 max-w-xl">
                                    <div className="relative flex-1">
                                        <IconComponents.Search size={20} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"/>
                                        <input type="text" placeholder="搜尋角色名稱或暱稱..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
                                            className="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"/>
                                        {searchTerm && <button onClick={()=>setSearchTerm('')} className="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"><IconComponents.X size={20}/></button>}
                                    </div>
                                    <button onClick={()=>setShowEnglish(p=>!p)}
                                        className={`flex items-center gap-2 px-3 py-3 rounded-lg border transition-all text-sm ${showEnglish?'bg-green-500 text-white border-green-500':'bg-white text-gray-700 border-gray-300 hover:bg-gray-200'}`}>
                                        <IconComponents.Globe size={14}/>{showEnglish?'EN':'中文'}
                                    </button>
                                    <SortPanel sortBy={sortBy} onSortChange={setSortBy} showEnglish={showEnglish}/>
                                </div>
                                <div className="flex items-center gap-3">
                                    <FilterPanel filters={filters} onFilterChange={handleFilterChange} showEnglish={showEnglish}/>
                                    <button onClick={()=>setShowAddModal(true)} className="flex items-center gap-2 px-3 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-all text-sm">
                                        <IconComponents.Plus size={14}/>新增角色
                                    </button>
                                </div>
                            </div>
                            <div className="mt-4 pt-4 border-t text-sm text-gray-600 flex items-center justify-between">
                                <div>顯示 {filteredCharacters.length}/{characters.length} 個角色{filterDescription}{searchTerm&&<span className="ml-2 text-blue-600">搜尋: "{searchTerm}"</span>}</div>
                                {(filters.attributes.length>0||filters.jobs.length>0) && <button onClick={()=>setFilters({attributes:[],jobs:[],rarity:[]})} className="text-red-500 hover:text-red-700 text-xs">清除篩選</button>}
                            </div>
                        </div>

                        {/* 角色列表 */}
                        {filteredCharacters.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {filteredCharacters.map(c => (
                                    <CharacterCard key={c.id} character={c} showEnglish={showEnglish}
                                        onContextMenu={handleContextMenu}
                                        onViewBuilds={handleViewBuilds}
                                        hasBuilds={!!(buildsData[c.nameCN]?.length)}/>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-12">
                                <div className="text-6xl mb-4">🔍</div>
                                <h3 className="text-xl font-medium text-gray-700 mb-2">找不到符合條件的角色</h3>
                                <p className="text-gray-500 mb-4">{searchTerm?'請嘗試其他搜尋關鍵字':'請調整篩選條件'}</p>
                                <button onClick={()=>{setSearchTerm('');setFilters({attributes:[],jobs:[],rarity:[]});}} className="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">清除所有篩選</button>
                            </div>
                        )}

                        {/* 統計 */}
                        <div className="mt-8 bg-white rounded-lg shadow-lg p-6">
                            <h3 className="text-lg font-semibold mb-4">資料庫統計</h3>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                {Object.entries(ATTRIBUTES).map(([k,a])=>{
                                    const count=characters.filter(c=>c.attribute===k).length;
                                    return <div key={k} className="text-center"><div className={`mx-auto w-12 h-12 rounded-full stat-${k} flex items-center justify-center text-xl mb-2`}>{a.icon}</div><div className="text-sm font-medium">{showEnglish?a.nameEN:a.name}</div><div className="text-lg font-bold text-gray-800">{count}</div></div>;
                                })}
                            </div>
                            <div className="mt-6 pt-6 border-t">
                                <div className="grid grid-cols-3 md:grid-cols-6 gap-4 text-center">
                                    {Object.entries(JOBS).map(([k,j])=>{
                                        const count=characters.filter(c=>c.job===k).length;
                                        return <div key={k}><div className="text-lg mb-1">{j.icon}</div><div className="text-xs font-medium">{showEnglish?j.nameEN:j.name}</div><div className="text-sm font-bold text-gray-800">{count}</div></div>;
                                    })}
                                </div>
                            </div>
                        </div>

                        <div className="text-center mt-8">
                            <button onClick={()=>window.location.href='./'}
                                className="inline-flex items-center gap-2 px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                                <IconComponents.Home size={16}/>返回對戰記錄器
                            </button>
                        </div>

                        {/* 推薦配裝 Popup */}
                        {buildsPopup && <BuildsPopup character={buildsPopup} builds={buildsData} onClose={()=>setBuildsPopup(null)}/>}

                        {/* 右鍵選單 */}
                        {contextMenu.show && <ContextMenu x={contextMenu.x} y={contextMenu.y} character={contextMenu.character} onEdit={handleEditCharacter} onClose={handleCloseContextMenu} onViewBuilds={handleViewBuilds}/>}

                        {/* Modals */}
                        <AddCharacterModal isOpen={showAddModal} onClose={()=>setShowAddModal(false)} onSave={handleAddCharacter}/>
                        <EditCharacterModal isOpen={showEditModal} character={editingCharacter}
                            onClose={()=>{setShowEditModal(false);setEditingCharacter(null);}}
                            onSave={handleSaveEditCharacter}/>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
